front:
  text: 太上洞淵神呪經卷之三始三
  hash: sha256:a3b29b92028d7e72ed43899b3f896813ca0cfabb50fd7f703080057810356cb7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_003-001a, image: hfl/0170/0170-056.png}
body:
  text: 縛鬼品道言自今戊寅歲癸未之年大劫之運惡人不信道法天遣疫鬼行七十二種病病殺惡人世間浩浩鬼兵流毒奈何奈何若有奉持三洞之人吾當遣力士四十九萬人為此法師縛枉橫之鬼若道士救人經行之處魔王等當助道士縛此鬼兵等矣道言三天玉女與大梵天王夫人等八千萬人來下聽經而自誓言曰自今以去天下之人若有此三洞法師作齊救人轉此神咒經之處我等當護之不令疫鬼一切邪精來干犯法師也若不去者我等先坐矣爾時九天大魔王并及玊女八十億萬人亦俱來下白太上曰自今以去若有道士轉此經文救人疾病之處若有殺鬼故來撓之不肯去者我等當共縛之令法師不亂病人得瘥得瘥者我等之力衆聖亦喜魔王等各各自誓縛疫鬼矣太上爾時乃說偈曰吾今說神呪呪神皆滅形所誅自有主為惡不相聽汝等既伏誓共來聽吾經自今當助道一一相經營勿復相吹噓共作妖惡情若作妖惡情力士縛汝靈湯煮火復燒往返刀山亭汝若從善者亦不苦相征道言壬午年有赤鬼三萬九千人來殺惡人有人值此三洞法師者疫鬼斥去千里若自今以去刑獄疾病但轉此經此經有八十萬大神三萬力士四十萬玉女三十萬童子一切來共守之所轉經之處鬼兵與魔王來縛此疫鬼矣道言吾昔在五嶽玄景宫中為一切衆生說三昧經時有七天魔王三十萬人一合來下自誓言自今以去若有法師得救病人之處轉此神呪經救人我當為開道不令有惡惡鬼逺走天人來助可治之令疾病除瘥刑獄之人悉皆解脫若復無益者我等自受腰斬死亦不恨矣道言自壬午年辛已後必有疫癘之鬼八千萬人來殺惡人惡人不信道故三天玉女九天大梵王三十六萬人一合來下啓太上曰自今以去若有法師經行之處我等亦當護之令疾病者愈官事之人速得解了若疫鬼復來圗害良民者我等亦當縛之耳道言自今以去有奉三洞之人者九天大兵七十萬人三十六天大魔王七十萬人各來護此法師也若今有疾病官事之家急轉此經此經有大神力自令官事散了病人自瘥若有不伏者三天魔王自來縛之疫鬼赤兵自然死盡中外殃𦍙男女之鬼斥去萬里十方力士覆護法師矣爾時太上乃說偈曰三洞大乘法真道理自陳若非積劫緣無由得授聞轉讀救黎蒙消滅衆鬼羣天真相擁護妖精莫敢前若有犯法者身破成百分又偈曰大象本無形經言即為道道轉無形中妖魔靡不掃清濁各有分天官來相考念子為凶逆使我常悲惱反縛裂子頭劒樹令汝抱道言今觀世間惡人聚生六夷交侵自共相殘至壬午年天下浩浩人民不安刀兵疫氣殺害惡人惡人不信大法故令死耳自今有奉三洞之經者自得上仙耳世人愚癡見道士亦死惡人亦死不知分别有異直見同死無有異也惡人死者入三塗惡道道士死者生天上人間或為大王若便仙去終不生惡處也或白日上仙者千年服藥先著年華也若有奉三洞尊師受經苦身行道得升此仙萬劫無有死矣自今以去若有道士救人之處魔王等共收縛鬼精矣道言吾昔為中國仙人東嶽直連子等三萬人各各持信受經之具上山作壇拜謁五方五帝與之為信乃折銀環一具以劵分之與師飲丹自約誓曰今日飲丹受經供養終身不犯有疾病急厄宅中不利口舌官事刑徒在獄者為其轉經作齊悉依齊法清淨道士以此為常仙人等以授受經化行國土為萬民治病一切鬼王悉皆潜伏道言世人多不信道有一人受經衆共笑之謂曰妖魅不欲生活入山避人不求生官不知此人天上生來見世間濁惡自求仙道度一切人人不識真反更𥬇之奈何奈何如此人等後有重罪罪入赤連地獄水火之中三千億劫無有出期罪畢作人有人之形無人之情或癡聾瘖啞不知人事復作六畜食草飲水以肉供人生便艱苦苦無所告此之罪人輪還如此無有出期子等思吾言矣爾時太上乃說偈曰頑逆不知法見世積罪人不但自不信反𥬇他習真不知天上來不久在人羣子等無所識相與共評論言出禍亦入響應須㬰間死受荼毒報罪結在赤連轉輪五苦中考對億劫年出生無人情六疾所縈纒身設六畜形詎復識形神罪非修大乘何由免形殘因緣自如是子等思吾言道言世人多有惡心之者不信真言天遣橫行伐殺將軍八千萬人仍遊天下取此惡人今有奉三洞之人魔王三千人護之也隨遂覆救若欲作齊齊集之日為其明朗不令風雨天人助之若道士行處人見愛樂道氣盈溢不令病痛也若惡人罵辱道士為作口舌縣官欺圗者即為收其人魂魄殺之以明大道有神之驗也急急如律令道言世有烏丸鬼王身長七尺八尺各有九千萬人赤兵月月下來取人氣命令天下人枉死甲戌甲午旬中仍下來取人命行三萬九千種病病殺人小口男女自今以去有道士轉此經處汝等收汝下兵令斥去萬里若不去者斬汝烏丸三億萬人敢不從之矣道言甲辰之旬有八千九天大魔王威都等將下人無數月月病人下九千種病病不可治與下土死將鬼兵合來殺人自今以去攝汝鬼兵勿枉善民也若有道士男女之官行道之處汝等助之若不用吾教者子等頭破作八十分矣道言辛巳壬午年人民橫死天下不安死者衆多鬼王烏丸與地下赤氣殺人人多瘟病病者門門十有三四死矣奈何奈何唯有村村大㑹清齊拜謁五帝之神自保家口令天神知之鬼王烏丸自伏不復殺人矣道言自奉受此經師為開示有病作齊及官事刑徒宅中多鬼仕宦不遷田蠶不收悉作此齊耳作此齊天人來護即得心願萬無不利矣奉此經者鬼王自伏也自今以始若有此三洞法師所施行之處鬼王護之苦有道士疾病者汝等鬼王頭破作八十分矣道言庚辰之年國主自慎大臣相輔天下浩浩無不畏也小人相苦貴人無道天下九十種病病殺惡人鬼王名壇支領三十六鬼王等七天大魔王明主之下行萬病病不可治當爾之時惡人多多有不信道受經者其有受三洞者大魔王等四十九億萬人悉來下護助此法師耳道言此三洞法師入人門戶宅中萬鬼避之治病救民無不瘥也惡人多故故令鬼殺人耳太上多哀哀念一切衆生特為呪此鬼王等令攝萬毒耳自今以去若道士有厄有病者此鬼王等頭破作八十分矣爾時太上乃說偈曰道法真中真真中復有靈三洞入人門萬鬼皆滅形妖邪僞且濁道性本來清救護一切人普濟於衆生太上布大慈消却天魔兵萬毒自攝氣不得馳汝精頭破八十分送汝付天丁天丁相剪截罪招非恕情太上無彼我分别使法明道言世多愚人聖人不教之耳自今大水來近刀兵之厄國中不信道枉攪萬民萬民憂苦不勤不知唯告太上恐鬼王枉殺天下善人盡乃說三洞之經化行天下自今以去若有枉厄道士者吾當助之不令道士有刑獄口舌疾病也若一旦不如法者大魔王拘民鬼王烏丸等百萬衆頭破作十二分矣道言天下之人自壬午年受道者三萬九千人青州秦川男女得仙者王方張玄杜蜀漢羅道安費頭然李英張石孫洪媚侯進袁道此人等甲申之年乃得仙也鬼王各各護助此三洞之人不令疾病也若人有忿怒法師罵辱欺打圗謀殺害者此人等悉令身亡滅門七劫無形託風倚雨依塵附草令萬劫乃復人身鬼王等護助此三洞法師若有不信吾言者大魔王拂旦烏丸悉頭破作九十分矣道言三十六王大魔之鬼自國人不信有奉三洞之者天上來也大魔王及鬼子一切護之若道士作齊救治百姓者汝等為却惡氣令道士治病速瘥自今以去不伏者烏丸大鬼王等悉頭破作八十九分矣道言門戶之鬼名承伯開閉之鬼名阿倫然井竈之鬼名真連子四籬之鬼名士伯供道上之鬼名烏子丁舍宅之鬼名玄子都一合來下繞人舍宅萬重不為一人殺害萬民來久自今以去斥逺萬里若欲來疾病人者鬼王等頭破作十二分矣爾時太上乃說偈曰告汝門戶鬼爰及井竈神籬上行者汝莫犯良民汝欲作惡者風力解身但當助道化斥却邪鬼君莫復泄心招換尸𦍙群汝若伏誓者時時當相申如其不從令令汝身首分又偈曰大道自然法賞善而罰逆罰逆逆即消勿令與道隔汝雖欲作惡正法必科責威仗擁天兵誅剪諸邪僻汝其自去者可得免斯厄道言世有十萬赤連鬼鬼長三尺六寸百萬人有三十萬長頭鬼手提赤棒棒殺萬民自及壬午年壬辰之嵗殺人大水來矣國王不治民多暴死甲申之災死絶矣奈何奈何也道士化愚人令受三洞可得脫免九厄之中耳道言天下亂矣人民死盡多是鬼王殺人善人不死惡者入三塗自今有枉死者天亦助之耳自今以去有作道士三洞法師者大魔王護之若令道士危厄疾病者鬼王等負罪頭破作八十分矣道言鬼王自今以去不得枉殺萬民苦道士經行之處救療病人當助治之莫令不瘥若不瘥者不用吾言枉殺善人汝等頭破作百二十分矣急急如太上口勑消災護人律令太上洞淵神呪經卷之三
