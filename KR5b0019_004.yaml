front:
  text: 太上洞淵神呪經卷之四始四
  hash: sha256:c29e7be79d9cacbd5d1f9d9f8c3c378123817d11b2e62788277fbd8a12b684b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_004-001a, image: hfl/0170/0170-078.png}
body:
  text: 殺鬼品道言自伏羲以來壞軍敗將舉衆形殘刀兵腥死萬萬為羣或有露尸骨節分張身首他處或飛或揚精神不得集聚或有身無頭有足無手有口無目千千萬億遊託自守依山倚木取人年命人不備知怪亂人心動欲作祟祟耗田蠶凡百不利惱人家親張生異端令生人大小疾病六畜暴死口舌官事水火數起令人不吉此都是汝等世間客死之鬼與雲中李子敖浮遊雲間來往海濵東西南北乘風駕雀捉人雞犬鳥獸妄作妖怪夭橫生人求其血食俗師所占恐怖生人卜言家親共作其禍遂生俗道汝等小鬼聞之因便承峻放石無有不下以凶重加無往不衰害人元元自謂汝等如是以來世人枉死者半自今以去大魔王四十八億萬王王有八億萬小王等各各勑下收取世間一切小鬼何者疾病主人主人令病危厄甚為困篤恐不全活汝等速收病人之鬼急去千里若不從命吾遣大煞將軍九億萬人次次逐汝等斬之不恕也魔王等各各急攝之矣道言自今若有口舌向人云云者太隂官一十四萬人殺汝妬鬼若有官事刑獄囚繫之者尊示君七十二萬人殺汝木索斗枷之鬼若有水火之氣者吾遣宋銑文曰領風水將軍二十八萬人殺之令瓦解丁零鬼山圖木子鬼大殃走死鬼六畜人形鬼五木百魅鬼蠻夷氐獠鬼北狄羌虜鬼山上鬼山下鬼水中鬼火中鬼射公萬種鬼十二亂病鬼六畜奴婢鬼自剌自殺鬼一切大小鬼子自今以入地千尺勿復令人病困官事者了鬼氣自散若不去者斬汝等不恕之矣道言自今以去道士為人治病病人家來迎子等子等先為作符安十二辰及門戶井竈各各丹書懸之又作吞符三七道一日三時與病人服之夜亦三服之道士三時為中庭北向上口章請於轉經行道用三時步虛若不能作大齋者但即慕道士三時行道若能作大齋者一一如法耳亦説布施布施者天神為人可利人耳若不布施經神不祐令人有病即不瘥矣十六符白素朱書依方鎮貼第一二懸大門第三戶上第四第五巽第六午第七坤第八酉第九乾第十子十一艮十二家庭十三竈上十四厠上十五水中令病人吞服十六宜書二十一道三時服之懸之天門懸之大門置之戶上東方卯位東南巽位南方午位西南坤位西方酉位西北乾位北方子位東北艮位鎮之家庭安之竈上貼之厠上置水中令病人吞符二七道吞服符道言今有三洞大法師法師中最上矣若三界之中有道士男女之人有受者鬼王護之令治病悉瘥人鬼無他自今以去若有道士轉此經疾病不愈仕宦不遷刑獄不解者鬼王青真大魔王等頭破作十二分矣道言十方諸鬼一切真偽等神一萬八千道氣三千六萬赤鬼自今以去各各攝汝等下兵士一切剌之令斥去萬里莫令病虐萬民也及此間土地之靈若道士行經之處病自瘥愈萬願從心若一旦不如法者汝等大倫鬼王頭破作三十分矣道言今世人病者連子所為也天遣十二種力士收之自今聞太上三洞法師道士救護病人轉經行道男女之人作齋之家若不助道士令生人病復不瘥者斬殺之不恕矣道言連子等八千萬人專行毒氣令人瘟氣重病今連子三十六萬人下行目痛自今以去汝等攝汝下絶若復不去者鬼王等頭破作六十分矣道言世間無善人善人者天上來耳國王大信道亦天上來也今有奉三洞之者先世有其重緣今則聞見也自今以去若道士化行之地鬼王追逐佐助之有病令瘥矣勿使死也若一旦不如法者斬之不恕矣道言世人不信大法是以多有罪人罪人入地獄鬼兵亂行善惡不别今有一受道者大魔王紫真孔倫馬延帥崇仇淵等各各助為作力令道心堅固國主奉之開化愚人若道士治病之處鬼氣自攝斥去千里若不伏者魔王等斬之不恕矣道言今十方之鬼則魔王所統也自今以去不得枉殺良善晝藏夜行取人男女道士行處鬼王佐助莫令惡人邪鬼粗犯道士也若有人鬼圖向道士施其惡心者一一誅之令人鬼俱死以明道心太上至言汝等慎之慎之若一旦不從斬之不恕矣道言世間罪人有八十九種殺鬼山林水火風土大鬼三千九百衆大和鬼王領之行萬種病三十六種六畜之鬼鬼王名都奴領八十萬小鬼下行惡瘡下血之病復有三千烏鬼鬼王名文慶子行赤病白癩病病不可治有作惡逆不信三洞之要者悉值此惡鳥飛來下此病病者萬不可瘥也自今以去若有道士所救之處便令疾病除瘥萬願從心矣鬼王等遷功萬等也道言中國有三千九萬人應仙秦川漢蜀三吳之中孫道留王子寧唐萬生焦石子劉光之馬承慶荀太初司馬平郭秀之丁太倫樂法護謝英安費侯王子林元伯任元孫支道林等三千人為杜蘭香採藥悉來武當宫中今世道士一心受此三洞法亦得與此仙人等相伹耳道士但努力自救萬民有厄之者令得無他汝等行道轉經之地魔王自伏耳若不伏者次次轉之不恕矣道言三洞之法神呪為要何以故此經伏一切大魔王魔王不敢撓之也自今以去若有道士經行之處魔王等四十九王烏川連子文吉休馮鄰子等三千六百小王各各護持此道士勿令粗犯此道士也若爾者當遷汝等令升仙無為矣若不救此道士助惡為勢壞亂正法令道士救治不瘥所為不允一旦有惡者魔王等悉坐斬之不恕一一如太上口勑急急如律令道言天下有四十九萬惡鬼鬼來令人殗死行萬種惡氣氣來殺人得道士轉經之時其疾則止國王因亦信道奉受三洞子孫傳貴大魔王王子烏純林期八千萬人壬午癸亥之年領萬鬼殺人巳知汝名字自今以去不得枉殺良民如此者大魔王小鬼等惠信忿陽之徒各各斬之不恕矣道言中國壬辰年有真君出世三千萬人主者一人耳時世多病男女之人壬午年入山勸化愚人愚人不信道法不受三洞水來淹殺刀兵交興奈何奈何唯有受經道士魔王護之終不橫死當令道士治病病無不瘥也若一旦違法魔王等頭破作十八分矣道言天下多惡人不知有道見者不從是以多死耳今有三洞法師人鬼所奉若自今以去道士轉經行道之處魔王等不得撓之也若一旦違命鬼王等天斧斬之不恕矣急急如太上口勑律令道言一一告下三十六天魔王魔王子等一切敬受奉行太上洞淵神呪經卷之四
