front:
  text: 太上洞淵神呪經卷之五始五
  hash: sha256:31a5b28812867ecd249bf6f51d823ff180ad0bc99298884e3942f589d96abc1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_005-001a, image: hfl/0170/0170-100.png}
body:
  text: 禁鬼品道言吾在杜陽宫中爲諸王女說大驅經導化衆生爾時中國有真人唐平來告曰比來死亡狼籍不審自今以去何年瘥也太上曰自今以去到戊寅年壬午之歲疫鬼殺惡人至甲午年乃瘥耳至癸未之歳疫氣流行國中刀兵父子君臣自共相害人民多惡不信大法奉受三洞者悉是天上來也非世間生也道言自今以去若有道士受此三洞經力行化求道遵奉三尊救度愚人者我亦遣十方天丁三十六天力士覆護法師所治之處爲禁疫鬼不去者令力士次次斬之矣道言自今以去若有男女疫病聞此法師轉經之時一心静聽合門信敬中外殃𦍙一切邪精山林社祀寒竈熱竈宅中萬殃悉令自伏若有不瘥動亂生人家親者天丁力士四梵天王合來誅之我今勑下魔王令禁疫鬼子等但好化人受持此經甲申垂至大災不久道士努力救度百姓焉三天大魔王一合來下自誓曰自今以去若有道士救人經行之處若疫鬼敢行兇心病痛急疾令萬姓官事苦劇者我自誓願頭破作十八分矣道士化人我亦助之有疾病亦佐治之有口舌官事之者當爲廻化之耳道言自今至辛已年必有疫鬼行害萬民萬民死盡柰何柰何世人不信道法有三洞妙經經法流布福力昇天天人來助之然而得免愚人頑心不欲受之甲申之災水來没之已死之後悔無及也惡人轉多天遣八億萬赤殺大鬼行疫氣誅之至壬午之年天下洪波鬼兵來誅殺惡人道士救之天人自護爲禁百鬼耳道言甲子旬年中有八千赤疫鬼有三萬九千來殺人人有知者時得明能道士受此三洞之人爲其轉經疫鬼自然禁絶鬼王名曰憂連身長三丈七尺手捉赤索入人宅中令人口舌闘争自今以去有法師經行之處當爲禁之耳道言甲戌之年有三十二種病病殺惡人自今以去法師轉經之者三天大魔王自來禁之令不殺人甲申之年有七十萬惡鬼來殺人若時得法師救者天人悉來佐道士禁疫鬼矣道言甲午之歳有八十種疫鬼來殺惡人惡人不信大法壞我道士道士不化之甲辰甲寅年有三十六萬疫鬼來殺惡人惡人多故天遣力士來下誅之道士急行化愚人愚人不信此爲大迷迷人不悟矣柰何自今以去若有疫病官事之處我當遣三天魔王十方主者來下誅之及轉此三洞之地療救之家逐鬼禁之矣道言中玄者太上於此說經已在八景宫中九合之室端坐思惟何國苦樂劫數近逺衆生悠悠何所趣向也三災垂及愚人不覺自共相欺枉濫誹謗不用真言不遵有德見人作善反更𥬇之當入地獄火車劒樹此痛難忍伏之如何自作自任無人代之吾今通變視見一切豈不遵之乃爲衆生集大法師三洞道士十方仙人諸天官屬八方大魔魔王男女禁戒神呪恐世人枉死大水將至無有知之𠡠魔鬼王令不枉萬姓教化愚人使受此經經中之王神化神呪凡有四卷太上爲將來濁亂故演說之若世有縁得見此經此經消災受之不在災中天人來迎得見真君矣道言上清無量三昧令人昇仙神化神呪伏一切魔道士受之山林人間不畏驅除受此二十卷亦可不用餘經此經令人得仙速矣坐中男女聞大歡喜各各求受悉共起曰不審此經受之如何供養法作何等唯願天尊具示誨示之我等亦當奉持若得知者可正供辦之耳道言此經伏魔除一切災若有受者鬼兵不撓自然安穏若官事疾病久在困地彌月無救聞見此經其苦自解萬災自消矣若有受者仙人來侍奉師如日月愛經如珠玉先當祀太始五帝乃破契受之竟然後依教而傳有病之家道士爲轉經轉經之時先作八符置八方門戸之上乃爲轉經行道之家内鬼外𦍙一切聞此神呪自然散滅善神助子萬福歸身護經力士自然祐人耳道言大劫垂至水流九萬三災之交鬼兵驅除世人死盡吾今乗青龍將天人力士四十八萬人遮截疫鬼勑下魔王自來世間化度愚人令受此經受此經者仙人注簿得在玉曆之中脫免水厄九害之中汝等自今以去能得聞經受持之者吾遣天丁力士四十億萬人常來逐子耳道言中國人今受此神呪經二十卷處處流行道士有受此經者無不昇仙也胡國亦持此經自今以去若有男女受持此經者十方大兵守經力士八億萬人當護經師受經之人終不横死惡鬼不敢近也道言今世濁亂人民多惡不信道法其中有一人聞見歡喜受持供養吾當遣甲卒力士十方赤騎四十九億萬人常逐汝身令汝聦明所願從心仕宦髙遷百福自然得免三災九厄之中也道言三運促近鬼兵縱横大水浩浩子等知否太上恐一切衆生没在其中可不悲哉柰何柰何世濁人僞各各導化勸誘衆生令出三途汝等道士若自受不誨人汝等死矣吾不虚言智士受之勸人令知之自今以去有受持者天人護助力士守門百惡疫炁不使撓人也道言自今以去若有受此神化神呪經四卷者吾遣十方甲卒功曹使者仙人玉女赤車力士常當逐汝受經之人不令有惡大災之時龍轝來迎子等受經之者不令枉死若有重病亦受此經若有官事亦受此經若男女不安亦受此經宅中不利亦受此經此經如藥能治萬病汝等道士信經受之若用吾言吾復何憂矣道言吾今告下十方鬼王自今以去世有病困危厄道士來救轉此經者汝等護之莫令枉濫也重勑司命都籍使者若轉此經之處病人應死者當爲生之若名入石函死籍巳定當爲逐之若久病官事爲其考責如吾之教若不用吾言賊害良民者鬼王等斬之萬段身分千寸不恕汝等慎之慎之矣道言末運之世世促人惡多不信道受經之人得免大災仙人玉女伺候水來若急之日龍轝來迎轝者縱廣八萬四千里如此之轝四十九萬轝來迎人時應上者不覺自上天下浩浩無處不水唯有受經之人乃得免耳道言中國男女於甲戌之年有信道受經入山精思不可稱數坐中大衆聞經歡喜悉合求受三十萬衆一時俱起繞太上七遍三禮曰願受此契太上曰善哉善哉當爲汝等授之道言五濁荒世人多横死不以理皆不信道鬼兵驅除大災欲至愚人不知汝等若能受此經二十卷供養者大水來時仙人來迎不愁死也子等信吾言吾復何憂矣道言自今以去受吾經契者令善神助之主人自然不令有惡汝等道士信之勸化一切使愚人得免三災若有受持此經不度三河者吾不名聖人不在世化也十方大神一切惡鬼邪魔大王重禁勑之自今以去轉此經處百病自瘥官事解了受此經者萬願從心坐中大衆聞經歡喜各各受契行之矣道言汝等道士但受此神呪經二十卷亦令得仙耳何以故此經伏祛一切魔王善神守之若有受經之人先世有仙骨天上來下非世常人中國男女六夷來世亦有伏化之者呉蜀之國人多信道四方流離智者入山甲申壬辰凶運知之道士勤自相化化度一切若有親受此經者天人祐汝終不横死矣道言汝等雖受上清靈寳無量三昧經不受此經者不得仙也若不受此經不名道士不得救治萬病但受此經家中供養一切鬼伏生死蒙恩道不虚言汝等信之坐中大小各各求之太上哀念一切悉受之戒之汝等受此經不得輕師不得慢經終身奉行思神念道後得昇仙九龍來迎大衆聞之心中踊躍悉各驚起稽首三禮道言汝等受此經當冩經卷立期静室空舍之中静處髙座舉之月旦十五日燒香朝拜十方并復朝師師去方所四拜拜之若師同住徃而朝大衆得教各各三禮奉行矣太上洞淵神呪經卷之五
