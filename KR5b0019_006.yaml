front:
  text: 太上洞淵神呪經卷之六始六
  hash: sha256:5d0011964922a5e817e56dac483a7fc668d080a19f44acda4d9887a9ac62352a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_006-001a, image: hfl/0171/0171-004.png}
body:
  text: 誓𦍙品道言自今以去至甲戌壬午年人多衰厄死亡奔波下土道氣日盛盛在江南漢蜀之中三洞流布六夷死盡鬼兵縱泆毒害百姓行疫殺人不唯一方自今以去若有奉此經者天護人民及有殃𦍙之鬼一切邪精吾當與誓自今有法師所救之人令官事者解疾病者瘥若復不瘥太上遣三天力士四十九萬人收天下外𦍙男女之鬼斥去千里道士療治無不瘥愈十方大神助此法師治病來矣道言自今以去若有疾病之人得三洞之師轉此經處一切疫鬼聞之速走萬里不得來干亂也當令官事囚徒自然銷散若不去者我遣千萬力士天丁來下殺汝矣道言辛巳壬午癸未之年天下七十二種病病殺惡人惡人多不信道法故殺之也自今以去中國若有法師救此病人之處我遣九天主者為斷誓外𦍙一切惡鬼悉令逺斥他方不得犯此法師所救之者急急如太上中天禁令若不伏者天丁力士來下誅汝等斬之不恕矣道言自今以去若有道士為人轉經行道之處便為太上玄堂天人所止之處也若有官事疫病者悉令瘥愈口舌不生囚徒自了何以故此太上妙言金口所說故令三天力士誅其疫鬼也道言於今有法師不貪世宦自求三洞專行世間見世危厄一心療濟有官事疾病為其人救之如此之人先世大福福流中國令故來生為衆生之師耳我今見此法師治救之處與一切疫鬼誓不復來矣道言自今以去天下洪波鬼兵流行甲戌壬午之年多有赤幘鬼布在九州千二百郡萬八千縣三億鄉中殺害良善病痛急疾𦤺使太上真民死不以理於今方兹至甲子壬辰之嵗流殃萬丈皆汝等之妖鬼古之死將國主大臣下官故氣世間鬼賊或男女之𦍙水火刀兵之𦍙行客之鬼因世之人有衰競來祟之圖害萬民取其名譽希其血食千千萬億繞人宅舍作其光怪令人口舌刑徒自今以去若有不信吾言徘徊此宅不欲去者十方殺鬼大將軍三十萬人斬汝鬼等不得停留急急如太上口勑若不去者魔王俱留子二十萬衆頭破作十二分矣道言三天魔王句婆羌十二萬人汝往世間自今以始若有赤丁火鬼各領七十八萬人作其疫病枉殺善人者建和吏兵三萬六千捉縛之令付九天之獄令天下良民疾病除愈人口平安刑獄自止萬事解了口舌不起圖求者得以明大道無極之施若不用吾言百丈鬼主身斬之急急如太上口勑律今若不如其言汝等鬼當害民不去者七天魔王汝頭破作二十分矣道言甲戌壬午年有黑足鬼身長三丈六尺其目赤黃或化為赤鳥名曰足日行病千萬為羣飛來人屋上令人急病病苦身黃寒熱淋瀝下痢赤黑面目焦青乍來乍去不用飲食飲食便吐血尿俱流目赤頭痛筋攣手腳不拘此皆黑足鬼等此鬼王名大頭盧兄弟八千萬人為羣吾巳知汝名字急去千里若不去者斬汝不恕急急如律令道言自今以去甲辰之歲有四十九萬黑面鬼王名章常行下人間四十六萬億人遊行天下行於痢疾或有胸背腰痛目中水出謦咳不利令人家口舌貧窮鬼兵繞舍倚人門戶四方八角取人小口老人死亡狼籍悉是此鬼等自今以去不去者怨黎殺汝不原鬼王頭破作八十六分矣道言復有二十萬赤索鬼鬼王自領四十九萬女鬼春來取人男子秋若取人女子冬便取小口夏來取老者晝日在水中暮向伺人家或取六畜牛馬行其災毒令人貧窮疾病不可治療日來取人自今以去速馳奔走若或不去汝各各頭破作十二分鬼王被誅也道言甲子之旬有白下鬼三萬頭鬼王名赤都天下遊行行七十八種病病不可治令人狂走妄語下痢癕腫口中出血而死氣息不定烏鵲繞人宅中則是此鬼令天下人民卒然暴死死不以理男女多重病自今以去汝等鬼王攝汝鬼兵不去者汝死頭破作三十八分矣道言甲戌之年有赤壁鬼身長八十丈四十九億衆為一羣化為大魚長七丈二尺三寸復化為飛鳥百萬而飛來天下行卒死之氣一令天下兵起犯人刑獄口舌妄來門門病痛此是鬼王怨朱急攝汝兵自今以後斥去萬里若不去者汝等頭破作三十分矣道言甲午之旬年中有黃牛鬼鬼王名赤石領馳則赤頭烏九千萬人入人宅中取人小口老人行萬種病病氣重多土公所害自稱李子敖子敖兄弟千千億萬為侣來殺人死不以理自今以去速走他方若不去令人病死宅中口舌田蠶不收者汝等死矣鬼名赤石頭破作萬分矣道言甲申之旬年中有鬼王名蒙恬王翦各領三萬赤鬼遍行天下令人鬪氣病下惡痢面目癕腫胸滿吐下不安小兒驚啼官事口舌犯入刑獄千病萬疾貧窮厄悴生子不立田蠶不收萬願不果此皆王翦等鬼王所作自今以去蒙恬王翦等不攝汝下兵者汝下鬼死盡鬼王頭破作八十分矣道言甲戌之旬年有鬼王共五國鬼兵宋趙燕魏魯之死將國王各領三萬六千鬼遊行國土蜀漢取天下女子小兒老公行四十六種病殺人自今以去巳知汝名字鬼王淮南子返白公韓涉宋銑王善等自今以去勑汝下鬼故來殺人不去者汝頭破作七十八分矣道言甲寅之年旬中有三萬九千鬼鬼王各句留郍各領八十萬鬼來下布萬六千種病病不可治令國王妄占百姓枉其萬民民不自全鄰國賊來惡鬼入宅宅不可居皆此等鬼也自今以去汝鬼王等下鬼鬼兵自攝若復不去者赫奕天都斬汝不恕子等莫令天下枉死疾病也急收汝吏兵急急如律令道言若遇天下大亂水來不久人民勤苦受道以化愚人鬼王等見子受三洞之經法奉道師訓自來守護不敢侵汝道士但自努力受太清中玄令百鬼不近於人受三昧者自然得仙受導化者魔王自伏受大驅經者天人助之受無量品者面見真君受記仙者仙人來護之受黃庭者太上自來耳此三洞真要者也道士者男女之賢奉受此經行來之處治人疾病無有不瘥鬼王自伏若不伏者力士黃英次次斬之耳道言世間多惡人故有此惡鬼等暴殺人耳自今以去男女有受三洞之人鬼王敬奉不敢犯之一切人供養之者犯此三洞法師者鬼王等頭破作十八分或人道說欺誑罵辱圗謀打掠者令其身考滅亡子孫七祖長幽太上口勑急急如律令道言自今以去有疾病者三天三十二魔王鳴鳩等汝死矣汝等下兵不得流毒殺人汝等故不去者遣赤卒小吏八千萬人下九天太上真騎殺汝等速收取下鬼令鬼兵自伏生人平安天下蕩蕩汝等何不去魔王等頭破作九十分矣道言有九十五萬小鬼來殺人如有大福道士受此三洞之呪文來為轉讀者鬼王等助之力士為令却此小鬼賊和喻家鬼井竈之君中表之鬼一切分别之宅中伏尸他地之鬼家中不祠祀之者一一為收付天一北獄殺之若復不依吾言汝等大魔王頭破作八十分矣道言自今以去有一人病者悉是汝等小鬼王所為自今以去有一男一女病者道士來轉經治救汝等急去萬里令生人自瘥吾當上遷如不瘥者斬汝萬段不恕之矣急急如太上口勑律令道言自今有一人疾病此悉疫鬼所為大魔王不加用意令小鬼殺人自今以去大魔王小王急助天人道士轉此經文之處令生人病瘥口舌官事自銷若復不瘥鬼王等斬之萬段不恕急急如太上口勑律令道言世多惡人壬午之年道士入山者競共𥬇之大水淹來死至不知奈何奈何聖人預見未兆故先作三洞之要以示萬姓不用不受不奉者與泥同流痛哉痛哉太上為十方一切衆生大慈悲矣道言自今以去有暴卒病人官事口舌者悉是鄧侯之鬼與劉斗烏亦來殺萬民天遣赤雷將軍二十八萬人領衆殺之大鬼王等自今以去急攝汝下鬼驅走萬里若復不去令生人病不瘥者汝等死矣急急逺去如太上口勑律令道言自今有八十萬小鬼殺人其中有一人受此神呪經道士來救之者汝小王大魔王悉來共助之令小鬼促去病人得瘥若復不瘥令病困者小鬼等死矣急急如太上口勑律令道言自今有四十九萬惡人惡人不識道法聞之不信今有三十萬赤殺鬼誅之若其中有一人信心天人來化復有八千疫鬼入宅取人時有道士來救之處小鬼等死滅也道言惡人不信道法是以世間多有愚人時有信經受三洞者天上來也自今以去若有病人不瘥者大魔王等先坐自今以去急攝汝下鬼急急如太上口勑律令道言自今奉三洞之道士先為一切衆生受此神呪若有病者有情之處天人魔王等不助之者汝當死矣道言世人為疫鬼所擾危厄困篤命在須㬰自今以去若有道士救人之地大鬼王等急令病瘥瘥之者汝等上遷不瘥者汝等死矣道言汝等道士為一切厄人急急往行救之吾當遣三萬天人力士助子自今以去道士有救人之處天人力士護助之令病人自瘥瘥者天人魔王等上遷不瘥者汝等死矣急急如太上口勑律令太上洞淵神呪經卷之六
