front:
  text: 太上洞淵神呪經卷之七始七
  hash: sha256:c44c916c199dd56a08a15f93bf6e0c73f218ecba14aaa2abfbe76efc38cfa7b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_007-001a, image: hfl/0171/0171-024.png}
body:
  text: 斬鬼品道言自今壬午年三月至九月人民疫鬼殺害十分殺三刀兵之世也六夷當死沙門法變道炁日盛三洞流演中國之中浩浩日月失度人民勤苦死者門門若有奉持三洞化人受之有病轉經經神救人也此病可瘥若自今以去有轉此經處吾遣十方力士化喻疫鬼一切邪精令收此之鬼病人得命瘥愈無他有囚繫徒刑自然解了若不蒙恩魔王先坐斬之不恕矣道言甲戌之後有三千六萬三足鬼身長九丈手把赤棒入人宅中行六十二種病病殺惡人鬼名曲寅各各有三百六十縱眼鬼鬼目悉赤或乗風雲專取人命暴殺六畜千二百青疫鬼疫鬼兄弟八千萬人男女之鬼日有九億來入人舍宅伺人小口令人卒死復有兩頭鬼鬼名當進當進暴虐常恐百姓百姓得病此鬼妄食人猪雞詐作大神欺誑愚人愚人信之殺六畜享祀此鬼此鬼得便因成習俗若乃不得便生病痛自今以去有奉此經之者吾當遣三萬九千天丁和喻此鬼等令斥去千里若不去者三天大魔王及十方主者斬之萬段終不恕矣道言壬午年巳有三十六種大鬼鬼名黒頭然又名赤蓋三名阿駒各各將三萬九千人齊執白棒殺鬼之刀刀長七尺入人宅中專取人命行百二十種病病殺惡人有六十種惡氣入人身中令人卒死自今以去有如此病者得三洞之師轉經行道之處悉令得瘥若復不降令生人病不損官事不了者大梵天王等及十方主者斬之不恕矣道言若壬午年巳有三萬七千赤烏行三萬九千種病病殺惡人復有八十二種病不利惡人若得此病時有三洞法師轉經行道者可得瘥耳若轉經行道者三十六梵天天王來助護子等也疫鬼之兵自然消散若不去者我遣三天力士十萬赤壊兵收而斬之道士旣奉三洞者但急化一切人入道天人亦喜若壊一人善心天人誅汝汝不得人身何有仙也自今以去若有救療病人之處天人自來佐護子耳三天玉女要進五千萬人一合來下與麻姑遊於杜陽山過歷五岳見天下之人疾病死亡不唯一人玄女驚曰咄咄天災人民死盡當奈何救之乎相與悲嘆來詣玄都具白太上太上曰汝等往世間化一切人令奉三洞三洞之經能度衆生諸難如汝等悉來國土化人經典乃能敬信有病官事爲之轉經轉經一宿死人更生官事自解若自今以去有法師救人之處我當遣天人化喻之疫鬼自然去矣道言此三女兒者先身有大福今得爲聖女教化一切人十方之尊大也一日百變莫有及者矣今後世人有聞見此三女名字者此女等亦來救子也若有疾病官事者轉誦此經十方大神自來救之耳不令有惡也子等若有化人之功天自知之矣道言自庚辰年巳有九十億萬黒殺鬼鬼長六丈各將八萬四千小鬼赤頭疫鬼來伺人鬼名盈女悉赤目專行十方入人宅中取人小口行百種病殺人自今以去有法師轉此經治病之處疫鬼急去千里若不去者三天大神喻之若復不去力士縛之不得復恕矣道言壬午年三月十月有赤天疫鬼十二萬頭各各領三萬九千力士大兵復有七十萬黒尾鬼鬼名蛇舍悉有八萬六千從上來下殺滅惡人若自今以去有急病之處道士經行救人之者此鬼收却縳之若復不去三天力士必斬之耳須㬰九天力士亦斬殺之不復恕矣道言自今以去有八十萬三足鬼十二頭疫鬼鬼來殺人行七十九種病有得三洞法師行道之者此等鬼自然天人收却之若復不去三天力士必斬之耳終不恕矣道言辛已年九月有三千萬赤目鬼鬼名角子各將四十九億小鬼鬼來殺人人有值此病者急求三洞法師師來入宅鬼亦自去若不去者天丁力士九十萬人次次斬之終不恕矣道言甲午之歳有八千萬小陵鬼鬼名赤頭各各自將八十萬人下行九十種病病殺惡人令人臃腫瘡疽病若自今以去有法師救病之處此等鬼自伏速走萬里若復不去者三天力士當斬殺汝無有遺脫也道士化人令此鬼自去矣道言自庚辰之年到壬午年九月十月人多有病有九十三萬黄身鬼名百龍各各自有十二萬王來下病人自今以去若法師轉經之處此鬼自去若不去者天丁力士三天大兵來共斬之九天魔王將汝治罪矣道言自今辛巳壬午年有九十六種殺鬼鬼來殺人村村有四十六萬黄癉鬼來入人村令人吐血下痢霍亂卒死心痛身染黄病咽喉塞痛以𦤺死亡若有得法師經行救者三天大神和喻此鬼令斥去他方萬里之外若有不去者此鬼等頭破作十六分矣三天大兵九天力士終不置汝也道士化人喻鬼矣道言自大漢之後有五通大鬼鬼名王翦白起韓章樂陽楚狂又有郝景女媧祝融三萬九千人各領八億萬人此鬼從伏犧以來帝王相丞此大鬼主召領十二萬人天下小鬼依憑求食與其鬼王作兵來耗動萬民萬民患之各各伺人家取人男女疾病急厄口舌官事水火千萬爲衆枉其良民病殺無辜誑斥家親催促竈君令人宅神不安每事不果行萬種病病痛急疾乗風駕雀妄作光恠自頃以來不唯一條今遣正一功曹大明使者驗神使者各領鐵面騎吏九億萬人手持大㦸殺鬼之具太上强力徤士四十九萬人一合下來收捕此土國中死將之鬼一切魔邪百千萬魅不正之𦍙來害生人之家者一一收捕打殺之令蕩除宅中殺鬼鬼王等悉加用力次次縛之若有一鬼不去者鬼王等千斬不恕急急如律令道言國土有大鬼主鄧艾鍾士季趙山王莽李敖杜周劉斗烏王離夏侯嬰蔣公琰南陽葉公里夏檀支蕭何申屠伯韓信田進梁洪髙沛孫温司馬逈劉元逹有此大鬼主令世人或有祠祀武帝文王世間供養立祠不絶各各有兵馬爲天下人作祟祟病殺人年年月月行千萬種病或四支沈重寒熱下痢臃腫水腹黒病頭目悉痛胷背燠熱或有黄癉謦欬咽喉不通一切萬病殺人無度矣道言此等之人皆悉是往時大將任事之人死亡之後各有人立祠祀之不止今傳有百鬼附之唯成大衆仍伺人形便殺害百姓令人水火口舌官事萬凶凶來奄殺人口多死從來非一今遣赤盧大禁兵身長萬丈八十萬人各領三億萬衆來下收捕此等之鬼王得便斬殺之不恕矣道言今此三洞法師轉經救人之處當令神兵九萬億人護此生人之家大小口數若有疾病官事刑獄之者一一令解了得出病愈無他無他之日鬼王上遷若不瘥令危厄者大魔王毛帝等頭破作九十分矣道言自今有病者及轉此神呪經之處當遣萬和力士四十萬人百舌吏三十六萬人爲此主人疾病之家刑獄囚徒之人和喻家親太祖父母内外殃𦍙及祠之者不祠之者悉爲分别遣之悉令了了又造刑獄之鬼皋陶木索之君十二令吏八十九萬將一切長侯三公九卿上下大夫十方主者急開獄門出其囚繫之人迴化和喻令時君歡喜放之令出亡人上遷去離三塗得在道鬼輩中逍遥無爲祐利生人疾病除瘥萬事解了自今吾與鬼王判決若復不瘥者大魔棃洪等頭破作三千五百分矣道言告大魔王伏仁今有生人疾病困苦四肢八體口喉不利頭痛目眩胷背燠疼手足不拘五臟焦然氣來愴心厭厭不樂目不能開不用飲食但欲吐逆夢寤不静但與死人相逐内外大小元元恐不全生死亡之期奄至不久今告丹誠哀情可愍今遣大殺侯王大兵八十億萬人候取地下鬼兵疾病生人之家者爲是何鬼若生人太祖父毋不應來祟若非所祀自有所係若是社竈祠者有時若是宅鬼不應害人今世清吉鬼不得妄來若有宅中故氣四向殃𦍙一切惡鬼山林池澤之鬼一一收之付三天地獄鬼律女青詔書治之不得令來急病良善也自今以去急收汝下鬼若生不瘥官事不了大魔王千斬之必不恕矣道言甲子旬年八十萬赤病鬼殺人三十六萬黒鬼鬼王各各將六夷之鬼十二萬人入人家宅令人寒熱浮腫四肢赤熱不宜小兒産婦暴死三公自罰天下流亂水旱不調瘧鬼但來捕人國主自病坐有枉濫萬民嗥天天怒遣三萬黒面小鬼殺人汝等欲得免此鬼苦者各各受三洞真經若有受一將軍籙者鬼不敢妄殺人也道言有病人之家若有犯入刑獄元元恐死者當先立此齋齋官或三人五人十人八人張好籍帳若浄室之中備安三寳香燈供養之具令辦集浄潔請三洞法師法師中務取一人聦明了了分明者爲法師與主人唱道並安二髙座髙座上一人稱揚聖號爲其主人其餘道士次次旋行耳髙座上法師執歩虚唱和座下人旋行徐徐髙越而望天聽雲中鴻聲若聽嘹嘹之響似玄景之宫天人之歌矣道言有病之家轉此經處一切大魔王與小鬼王誓曰自今有人作齋行道救治病人病人甚危兼有口舌官事刑徒囚繫等令差召喚萬鬼對之何鬼爲也汝促驅之令自然得瘥官事了了百願從心無他之日大鬼小鬼悉令上遷耳若自今以去官事不解疾病不愈者大魔王及小鬼王斬之不恕矣道言甲戌之旬年有三千九百白鳥來下行病病殺惡人國中大小男女卒死多有瘟氣八十種病古之死將孟逹馬援李卿王鳳閻振左丘盜者魚父華元吉成洪等各領千萬人專行下赤痢病令人少氣宅中不安倚人門戸取人小口恐人家親家親畏之遂令仕宦不遷宅中虚耗口舌妄起觸物不吉連遭刑獄囚繫來乆田蠶不得萬願不果悉是此等鬼王不攝縦其下鬼令生人如此自今以去各各執持汝等鬼兵勿令暴虐當令生人官事了散疾病輕瘥輕瘥之日汝等上遷若一旦不瘥汝等萬斬頭破作八十六分矣道言甲申之旬歳中有大災起西北水來疾病人死十中有八九耳三千九萬赤鬼專來病人病人身黄不宜婦女小兒也時國主往往有信法受持經書者度矣疫氣熏蒸三千九萬種病殺人人有入山者千千萬萬矣人民不安刀兵疫鬼殺人殺人無道天遣赤卒七十萬人手持銅㦸斬殺邪鬼收世間一切殃𦍙三天大魔王若有枉殺之者各各斬此大魔王烏丸等不恕之矣促去萬里急急如律令道言世多惡人天遣力士誅之先問善惡也天兵大衆何可制乎但道士轉經救之者令生勿復殺之也若自今以去天下有人疾病及其刑獄囚徒道士行章轉經救療之處大魔王與小鬼王助救之令瘥萬事了了若有不瘥不解口舌連綿大鬼義真等斬之萬段一一不恕矣急急如太上口勑律令道言大門鬼吏大真公小門鬼吏小真公房守門吏衣文後守門吏萬倫竈門守吏炎景道上守吏尸供内外大鬼宅中殃𦍙男女客亡水火金木之所殺害者各各自約今何鬼來病生人人今危厄太上遣力士赤卒殺鬼之衆萬億執刀縛鬼鍾馗打殺得便付之辟邪所付與天一北獄恐其有枉令勑下萬民若有疾病生人之家者速令放之令如法使生人病愈人鬼無他若復不出者令病人不瘥大魔王小鬼王等身斬百碎必不恕矣一一如太上口勑不得留停急急如律令道言世人今多疫氣惡死自今以去與魔王夏銀烏丸烏延赤波洪丘等誓曰今世多病罪人死至不覺不知自度吾今令三洞法師化示愚人愚人往往有一人信者男女之官世間持此呪文民間齋講一日夜六時行道布施禪思有此之處汝等鬼王助化愚人莫令疾病疾病瘥愈勿令百邪干之也一一如吾言可得上遷若不信吾教汝等頭破作十分矣不恕之也一一如太上口示律令道言甲午之旬年多有六夷氐獠羌胡之鬼流行行萬六千種病病殺惡人大災不安人民危厄瘟氣多女人死鄧艾鬼王與劉斗烏亦來行十二種下痢病土公殺人神龍上天大水來至五行不運鬼賊害人人多暴死死不以理自今以去太上與大魔王三十六王荀谷等十二萬鬼主自今以始若有男女之人家有病者汝等爲却之令官事解散人民安泰一旦不如法汝等先斬萬碎不恕矣一一如女青詔書口勑律令道言大運交㑹鬼兵縦泆汝自今以去天下之人男女疾病引日沈困者一切惡鬼家神不佑人爲山林百邪所害者一一令瘥愈勿使枉命也若自今以去故令枉死妄夭人命者大魔王及小鬼王汝一一斬首萬段以謝枉愆如太上口勑不恕之矣一一如鬼律收付天一北獄治罪急急如律令道言自今以去有八十萬三足鬼十二頭疫鬼來殺人行七十九種病病人有得三洞法師行道之者此鬼等自然天人收去之若復不去三天力士必斬之耳道言三界之中大魔王領三十六小王王有四十八億小王王有無數大兵横行天下令與吾共誓一治百姓不得枉濫妄誅無罪之人因此凶衰爲作祟也自今以去世間有急疾官事危厄之者一一往視之助之福力廻化口舌國主大臣一切惡鬼悉使歡喜令疾病除瘥官事解了門族和睦天下安穩五糓豐熟君民忻恱鬼兵自伏無病無痛萬願從心如此之者鬼王等上遷天人悉喜若令風雨不時五榖不熟人民不安國主暴逆官事不了疾病不瘥者汝等大魔王及夫人百億鬼王等悉以斬之矣太上洞淵神呪經卷之七
