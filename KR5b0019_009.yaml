front:
  text: 太上洞淵神呪經卷之九始九
  hash: sha256:2ab72273e5de2164939a02cbfd2fd85343f97c965236970839b8f5637b80511c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_009-001a, image: hfl/0171/0171-076.png}
body:
  text: 殺鬼品道言庚辰壬午之年有大雷鬼一名九昌領八萬小鬼手執赤棒來殺惡人行三十六種病病殺惡人復有憂簡鬼三千九萬人行其赤腫病復有八千六十九萬鬼行下痢病復有十二萬赤目鬼行吐痢病復有九千萬鬼行目痛病復有四十九萬鬼行寒熱病病殺惡人當爾之時得法師轉經之處此鬼等自然死盡三天玉女八十萬億人與十方綵女三十九萬人一合來下稽首白太上曰自今以去若有病人官事之家請此法師轉經之地疫鬼故來不去者我等自誓逐之令逺走萬里使生人病瘥官事解了若不去者九天力士斬之不恕矣道言世人多不信道若有一人受經男女𥬇之道士不恥愚人之𥬇不名道也道者貴𥬇大水不久甲申垂近壬午癸未大鳥殺人天遣疫鬼行炁病殺惡人刀兵交集人民死耳蟲蛇虎狼水火毒炁悉能殺人人不知之但自愚心妄說賢人誹謗道士毀訾經書量度聖典此之罪人亦當卒死吐血喉塞身體浮腫失音不語天人誅之不救之矣道士自勑慎口攝心矣道言自今壬辰之年必有真君真君不逺道士信者幸自勤學化人受經仙人來迎耳壬午之年世間疫鬼殺人人民死盡太上愍之遣大真人成造嚴平王進方社周莊玄唐君等汝往世間化人先世有仙骨之者得見此真人真人悉皆俗中有子孫氏世間之人故太上遣之來矣道言至壬午年必有大災水髙千萬丈道士入山入山者免此災也壬午年三月至九月人民死盡疫鬼三萬七千頭專行殺人人不信之者必當先滅矣行九十種病殺人真君垂出惡人不見天遣殺鬼來誅之蕩除天地更造日月布置星辰攺弦易調神人治法仙人爲佐五方萬劫不死無有刀兵地皆七寳衣食自然無有六畜男女悉聖無有惡人之𩔖也道言自今大水來近人有知者奉受三洞男女信法一心行道之者我當遣三天玉女十萬人來護之道士化人受之化一人奉者天人唱善壞一人心不化者天人誅汝耳汝等先身有仙分故值遇此經此經玄妙上天所重也奉持供養置之家中疫鬼斥去一切惡鬼不敢近人矣道言自今以去世間若有口舌官事刑獄囚徒疾病危厄生死不别當須急轉此神呪大經經有三萬九億大神神來救人疫鬼自去十方赤兵四天魔王綵女等悉下來助子不令有惡若道士轉經之處疫鬼不去者三天力士斬之不恕矣道言壬午之年以來民多疾病鬼兵交行千萬爲群欲殺惡人若病之時得法師來救者我亦遣善人司命四十九萬億人來斥去疫鬼逐之萬里若不去者斬之不恕矣道言壬午年有赤鳥萬億行炁病病殺惡人惡人不信死之柰何真人更立蕩除天地疫鬼皆來殺人世人若欲求免災患可以九月十月當建是齋拜謁五帝大㑹一日二夜申懴東向九拜南向三拜西向七拜北向五拜乾坤艮巽四向各一十二拜上方三十二拜下方一十二拜天人降下書子功名得著玉曆之中或則東向單禮三十六拜唯在精專獲福無量至癸未年疫鬼行七十種病殺人若欲求活家家建修是齋拜謁五帝南向三十拜疫鬼自去萬里矣道言甲子甲戌甲申旬年有八十萬赤尾鬼鬼名多阿一頭三尾身長九尺兩手持水令人寒熱行九十種病病殺惡人道士急化人立静舍於水上道傍大㑹一日奉禮五帝司命西向三十六拜天人必下書子等之家戸口得入玉曆不在死次書記天門司命益筭終不橫死矣道言甲午甲辰之年有黒炁病殺人疫鬼八十九萬人行喉塞下痢病殺人若道士化人受三洞符籙正月二月三月水上作大㑹一日二夜五時集禮五帝十二神北向二十五拜自然天人記其名矣道言甲寅之年有大目鬼長三寸千萬爲群與赤色鳥百萬來下入人家殺人人有知者急自合集齋戒水上一日二夜五時懴謝東向三十六拜天人必來記子之名疫鬼自然去之不敢近人道士急化人焉道言壬午年所以有災者山門欲閉前三後二是以辛已壬午癸未必有水災及方伯三公二千石速宜向善此年定有疫鬼流行殺除惡人不信者死道士但化愚人天人録子至心矣道言世人不信道法天令疫鬼誅之自今以去有識之士信用行者天人眇之終不令相枉智士弘之建立功德慎之矣道言自壬午年有三十六種草鬼殺人人有草中取菜食其百草枝根莖葉中有鬼毒毒名生茹生茹兄弟百萬能行氣病十日一月日入人四支百節中身當黃赤鬼長三寸七分山中女鬼名羅翁一妃二女將二十萬女鬼亦入山林水中伺取人又有一女鬼名姜女先有無量功德應仙爲坐不敬三天大聖不奉三師故鬼見道士入山心不生善意然其形甚醜身長一丈面黒目縦通身赤黄形體臰穢人不欲見見者逺走避之不敬三事故教令受經敬師不得誹謗法師侍養勤心莫作妬𡜍與俗人交通不從此者天人責之令住山中三千九百億劫故由不出道士受三洞之秘籙太上真要將來之基一時之傾耳不如學仙萬劫不死矣道言道士受經得明師三洞具足亦如世之富人矣何以故大富貴之人田宅廣有奴婢數千錢財足用天下貧人悉爲己作從意所用無有乏短出則乗肥導從自在乞與布施一一任懷大富足故也大道法師内外俱通世間書䟽無不解者治病醫藥針灸悉皆明了行來人間萬民敬愛三洞大經無不備足世人敬之亦如天王及大富足人矣道言富貴貧賤俱人耳亦禀一命何有殊異但自富貴貧賤先身之縁有先世習道來故中國衣食自然而巳復有先身造立功德今爲大富貴流及子孫先世應仙未即昇騰今故大富貴也學仙道士貧而樂道者此先身習學來久不化於人故令人大貧困至死無有財物六畜者先身重罪不作功德不信經道六畜中來或奴婢生口中來耳道士貴人悉天上來也自非先身積善者終不得作道士貴人矣道言今世多有惡人不信道有受經者愚人𥬇之𥬇聲盈路誹謗賢人謂道狂顛入山何爲或言妖鬼詐作善行不知一切人不可久保富貴無常不可長守夫少有老老必歸死身中三賊自牽而死不覺世人只知貪惜財物愛樂妻子寧作罪事不肯受經不求仙道私營自累終日悠悠不如學仙萬劫不死及共天人神仙同遊矣道言壬申年多有疫炁下二十三種病病殺惡人唯有受經之人奉敬三師療治萬病者天人簡之國土信道受於三洞教化人民當爾之時中國帝王國王不知世間萬民招惡惡從下生無有端緒百鬼競來宜使男女道士一心治之吾遣十方大驅將軍三十九億人助道士驅逐之耳道言三界之中愚人不信道法是以死入惡鬼中以此男女大小鬼兵無數來殺罪人故耳自今以去有一家二家三家一時病患病厄困者請三洞大法師一日二夜五時轉經行九一之道三五之炁取十方之位方方殺鬼鬼王亦不敢當今汝道士吾亦自遣四十萬赤弓大卒三萬九千九州力士來助道士驅除一切大鬼山林邪炁十方鬼賊一切斬之耳大魔王及小王順吾教勑下小兎令助道士治主人病瘥有急厄官事悉令解了若不如法魔王葳㽔等悉斬之不恕矣道言道士者悉皆天上來耳世人自有卑賤醜陋若心信三洞亦天上來耳善人不必好醜各有因縁端正者思善中來大富者先身有布施貧乏中來大貴者建造功德禮拜三寳中來道士法師者積學中來故心慕大乗並是先身之基耳非今卒得也道士若志慕山藪不用生官一切斷絶入山修道者此是去仙不逺如此道士遊行世間爲人治病魔王助之道言天下悠悠不知死日此是行尸之人道士求仙受三洞之要勸人受之若入山中或住人間化一切愚人愚人貪欲不肯受道水來死盡刀兵殺汝與泥同流方悔無益大驅除滅鬼兵縦横致令天下惡鬼殺人若有道士經行之處爲人行道轉經所救之者一切大魔王及小王男女天人悉共來共道士令生人病瘥官事了了萬願從心若有不伏鬼炁來盛殺害生人者大魔王運周等各頭破作十六分矣斬之不恕一一如太上口勑律令道言自今方有惡鬼殺人鬼名赤眉烏然等四十八萬衆横行天下來殺惡人道士女冠來救此主人者小鬼王等速告大魔王令力士助道士化人令病炁解釋萬事了了無他之日吾等上遷千等萬等不負金口若不信者魔王及小鬼王等斬身萬段一一不恕矣太上洞淵神呪經卷之九
