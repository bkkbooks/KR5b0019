front:
  text: 太上洞淵神呪經卷之十一制一
  hash: sha256:c3b8852eca5dd11a3ab4fe5c42bfc884641a12086e3c22c830187e96e617bb23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_011-001a, image: hfl/0172/0172-004.png}
body:
  text: 三昧王召鬼神呪品元始天尊以上皇二年建辰之月八日日中時於元陽上宫為大羅諸天大梵天帝四極髙真九天元王三天真皇説洞玄靈寶大有至真自然智慧淨誡妙經法事既畢乃更命召三氣天君五老上帝九官真仙四方無極三十六天帝飛天神王九地土皇三界官屬神霄大魔前後圍繞飛行太空回駕來降菀利之天碧海之崖方諸宫內洞淵池上坐五色飛龍蓮花之座將説法要救度三界五道一切蒼生放身威光普照十方一百八十海諸龍宫殿酆都暘谷水會之府風澤九地三十六地土皇宫殿仙真大聖領籍之府及三十六洞天各有日月星辰官屬人民六畜鳥獸蟲魚自謂安樂其無神道凡俗之類夫妻男女老幼尊卑自相紹係種種名色隂陽五行吉凶苦樂貧賤富貴皆如此土亦無有異也復有學道求仙之者栖身山谷證道成聖若不習六通六覺不名道士亦謂他士無如是事乃至上方無極世界凡聖所居苦樂果報請下九幽泉曲五嶽洞天令諸大衆悉皆覩見善惡生死報對往返塗炭流曳八門自生自死甚可哀傷大衆之內天人之中地仙之類或小知見飛行五嶽修習尸解服藥錬身不慕靈寶大智慧源未逹宿命真寂無為自然性者心不自固妄惑所馳六情所蕩或於所著四見飄忽天上地下隨惡輕重受其報對無有自勉痛毒非一皆生怖畏五神悲惶莫惻所從各欲四散而不能去自相顧謂我等今日值遇聖尊何緣乃見如此惡對身心驚怖不能自安唯願天尊垂哀救護解説元始復命本心於是衆中東上九天飛天神王名曰三昧威德智慧相好具足力攝諸魔天神龍鬼大明呪術善權方便隨機利益從座而起領諸真人蔚明羅王及三十六天小王拘婁王等同整衣冠俱起作禮叩頭自博長跪稽首上啓道君我等積善深厚奉遭大聖翼從仙真髙玄大士沐恩過分忝在王位各統諸天喜懼交集今覩慈光更開大宥我等悉來曽奉教勑周行三界三十二天及十方國土山林靈嶽海龍宫內及洞天福地或遊世上或入人間隨順群方同其事業歷貴賤貧富之內或山居幽寂亦有所修六畜百蟲水火艱辛無所不入見諸凡夫學與不學不顧宿命不遵經法是非紛亂四見昏迷六情所染心不自專造惡之時無所畏懼或復恐怖呌喚神鬼為其救助或上引三光七祖先亡以為盟誓更相馳競無有終始六親相殘傷殺無道或刀兵飢饉憑恃威力聚合群衆殺害無辜一切人鬼禽獸之類臨命終時戀其室宅愛惜本身心迫情切或起惡心或發惡願因尋本誓隨其所在尸血所染骨肉所附氣噓目視皆生惡業因緣魂爽相習報對無窮既不善入靈寶智慧自然法誡何可濟免或謂精爽心色微細光景聲氣之所感激因乘六天故氣五酉百精九醜八風五行哀盛依附精光而生災害瘟疫毒癘百病因起債主𡨚家口舌誹謗遭逢者衆城邑治舍村居山澤哭聲相尋凶精轉熾人心怖懼益生寒熱寒熱起內病生於外或禱祠宇故氣不正之鬼追尋血食妄説吉凶不聞正道不知歸向不見經教不識本真留連百精結罪三官沈淪五道自生自死終天無脫或五斗星官告變災禍水旱風雨不順四時刀兵疫疾加其凶氣國主憂懼百姓塗炭無有濟拔我等今日蒙聖尊威力受任神王所有見聞願得安養報道慈恩率集所部三十六天小王八十億人周歷十方療治病苦保其國祚養護群生光宣正法豈不同乎於是真人蔚明羅將領四十九億真仙眷屬又有三天真王九天大魔王三十六億萬人又有大神通智識句民子神王天丁力士八億萬人又有天禁大殺吏兵四十萬人天殺大兵四十萬人又有上三天尉玄刃大兵三萬人九天大兵九十億萬人又有三洞力士四十九萬人六天力士八千萬人又有三十六天之魔王句盆子等七十二小王又有魔王烏鄰子及大魔王烏留子等三十六萬人又有三天玉女與大梵女八千萬人又有七天魔王三十萬人又有橫行伐殺將軍八千萬人又有青真大魔王紫真孔倫烏延帥崇全等及三十九王烏川連子文吉休馮憐子等三千六百萬人又有三天力士三十萬人又有十方大殺將軍三十萬人主殺疫鬼除災氛掃邪穢又有三天魔王句婆羌十二萬人又有赫奕天都四十二魔王烏鳴鳩等殺鬼治病又有三天力士十方赤兵又有三天玉女要進將軍五千萬人恆於五嶽收諸疫鬼又有喙頭魔王烏延大王長鼻大王中𦍙大王小眼大王白面大王赤面大王等各以神通自在威力於太上前五體投地同發誓願與三昧神呪王遊行三界之內天下地上及山川水土洞天靈嶽之內蕩滅六天九醜五瘟拒逆故氣傷害生民變怪殊常及興起刀兵者我等力能摧滅回化其心絶諸妖氣唯願天尊垂愍我等并諸眷屬升入道階永無退轉於是真人蔚明羅白三昧神呪王曰我等今者收滅故氣攝鬼治病應須出示行病之鬼姓名令人呪誦呼其姓字彼行病鬼聞巳姓名自生慙愧各懷恐怖於三寶前大衆之中羞聞其惡不敢為害今承天尊慈悲威力勑彼三天五氣明威正神核實萬精出其名字我即令諸司直司録條記書之普示天民有心男女信樂之者於是三昧神呪王普告三界五道六酆九幽泉曲所部諸鬼神王水土龍王禽獸鳥王或上不著天下不居地遊走世間駕彼八風乘九醜氣依憑樹木以為宅舍吸人精氣追求血食興起災禍者悉皆顯名不敢藏隱於是五方老精五傷鬼賊自相顧謂我等世俗職位卑微威德淺薄力不自勝莫知逃處若不奉名即見灰滅眷屬塗炭進退災禍唯乞大慈且賜寬宥願聽我等自相勸誘捨俗歸道伏從教勑更不得為害於是三天邪王領四十八萬人六天邪王三天大邪王九億萬人又有八萬獨足鬼身長三尺分作群黨在於水中行氣病又有慎憂哀子角兒平王阿信三業等及以赤鬼三萬衆行刀兵之疫又有四十九種黑鳥鬼恆行驚怖令人不安又有赤烏七十萬為群飛行疫病又有胡鬼三萬俱來殺人行飢餓流亡之疫又有赤丁使者四十九億萬人又有下方刀兵傷精戰死之鬼各領四十萬衆行病布毒又有烏丸鬼王身長七丈八尺各有眷屬九千萬衆赤兵行諸疫氣又有九天魔王威都將軍下行九千種病又有門戶之鬼名承伯關閉之鬼阿倫然等又有井竈之鬼名真連子又有四籬墻垣上鬼名士伯供又有道上鬼名烏子丁又有舍宅之鬼名玄子都又有十方赤連鬼長三尺六寸百萬為群又有長頭鬼三十萬人手捉赤棒暴打殺人又有客死刀兵雲內李子敖等來往海濱東西南北乘風駕雀作怪行疫又有皋陶木索之鬼習行刑獄所傷殺具皆為鬼精又有連子鬼行瘧瘡病又有鬼王名曰憂連身長三丈七尺捉持赤索行諸口舌動作人心又有赤幘鬼行布疫毒遍於八方又有山林水火風雲之鬼三千九百鬼王名都奴文慶子行雜疫病又有赤丁火鬼各領七十萬人行於熱病又有黑足鬼身長三丈六尺目赤黃或化為赤烏名曰足日行瘟疫病又有鬼主名大頭盧兄弟八千萬為羣行疫氣病又有四十九萬黑面鬼鬼王名章持將下鬼三十六億萬人行黑瘟病又有二十萬赤索鬼王名曰白首領三十九萬女鬼行病又有赤都鬼行七十八種病或為烏鵲繞人宅舍吐氣行病又有赤壁鬼身長八十文或化為飛鳥行病或作死魚鳥獸草果人食之者皆成毒病又有黃牛鬼王名曰赤石領赤頭烏飛行毒病又有李子敖兄弟千億萬鬼為侣殺人又有鬼三句留那各領八十萬鬼行諸毒病又有鄧侯之鬼與劉斗烏亦來行病傷害萬民又有三足鬼身長三丈人身橫行又有曲寅三百六十鬼縱眼鬼蕭頭鬼當進鬼並行疫病又有頭然鬼赤蓋鬼執白棒長刀行疫殺人又有赤烏行三萬九十種病又有黑殺鬼長六丈及盈女鬼艽子鬼秃子鬼悉皆赤目又有十七萬黑尸鬼名曰蛇舍又有三足十二頭疫鬼赤目鬼名角子又有小陵鬼名赤頭又有九十三萬黃身鬼名百龍又有赤盧大禁兵鬼身長萬丈八十萬人又有都盧那鬼身長三丈目縱口橫耳長六尺手捉鐵杖或為大鳥行病殺人又有赤鼻大鬼鬼名附子身長九尺三面一目又有兩頭一身鬼名曰赤目又有三頭一身鬼名曰大野又有鬼名天池鬼名大頭行刀兵殺人又有鬼名大旦身長三尺手捉赤棒殺人又有白鳥形如車輪群飛殺人或為大魚死在水上食者皆死或為野鳥死於草中食者皆死又有馮子都三千九十萬為群行卒死病又有雲中百二十種遊獵鬼七十二王及鈎星之鬼烏獲之鬼夜行之鬼飛走之鬼世間行狂邪病又有九醜之鬼狄星狂雲衆妖驍驟鈴馬景呼唱兄弟九人又有劉元逹張元伯趙公明李公仲史文業鍾仕季少都符各將五傷鬼精二十五萬人行瘟疫病此等諸鬼王聞三昧神呪天王及明羅真人多聞天女説三天六天大邪王等故氣鬼賊傷精名字皆大驚怖復有遊獵鈎星九氣之鬼同聲唱云我等眷屬從音以來身口性命有所資須唯吸人精氣六畜血肉以相養活驅役鬼魂充為給使今若奉戒不得縱逸乃欲活他而自受死縱若未死身體羸瘦大小不存眷屬憂惶悲泣相守唯願大王及無等尊神惠我生命於是三昧神呪王告諸鬼王曰汝等昔來不信至道不奉正真更相傷殺報對輪回劫數有窮惡緣未盡方於九幽受大苦報者若有眷屬能相代者否無有是義我隨天尊周行三界三十二天十方國土五道八門見諸善惡如響應聲無有空脫汝今若能普告眷屬不害人民者我令世人逐所方冝稱家所有珍味飲食或晝或夜於其城邑村落治舍清靜之處為汝設食令汝飽滿永無飢渴亦復施汝衣服錢帛隨汝受用不結重怨而得飲食資生充足豈不樂乎於是行病鬼王及諸眷屬悉皆歡喜頂禮道君及三昧神呪王若如教勑唯命伏從時真人蔚明羅及三昧天王承太上命告五嶽都司四海亭長里社正神汝等今者可普宣示一切世間若三災將起瘟疫欲行四時之始有疾之處當令人民善男子善女人國邑村落貴賤所居同心齊念請諸道士亦令男女佩受符籙香湯自洗絶酒肉葷辛之物清淨設齋禮拜唱讃髙功法師各念思真佩服尊嚴懸繒幡蓋燒香散花然䗳禮謝或清奏音樂感召幽顯并設飲食清素珍味奉上三尊及三十六天自然之神薰修普得飽滿隨彼貧富土地所有豐約逐物表竭丹心燒香旋行及以端坐默念存思鳴鼓吐納讀諸鬼名及稱我等神王各號并注心禮拜三氣三天自在尊神及元始四方三十六天九宫五嶽真官正神自然至真大智慧源應物乘機自在神通無量威德即來影響入其道場受其請願並皆和樂人鬼歡悅兩不相害既聞法音及得覩見三皇天書五篇玉文靈氣所陶各懷知足體道自然四節調和天下太平國主人民受無為道升名玉清神真通會一切寧間於是天女大梵王及三十六天諸小王三界飛天無極神王五嶽都司梵天王子多聞天女等一切魔王奉仰天尊又聞三昧神呪天王請説法要濟拔蒼生生死蒙福天人慶恱讃歎未聞見洞淵神呪威力巍巍不可言譬同起稽首拜禮扣搏長跪志心誓各修行咸令開悟漸入至真於是三昧神呪王命三十六天飛天神王等各拊雲璈天鈞大樂讃歎道君又蔚明羅真人乃奏歌曰至真體本無名號何曽有宜物即成容端嚴居衆首歸依罪自除禍集非他咎無無無不無有有有非有多聞梵女又奏歌曰冥惠常澄寂尊中之最尊普降無生藥俱治不死魂即名還是呪乘馳體亦奔永超五苦舍終入自然門句留神王奏歌曰赤混太無元尊神號靈寶萬有即無為自然真一道善出不由他惡生還自考能通四見迷何須絶三惱神王句民子奏歌曰至真無體號強名為法王應身隨萬有濟拔實無方善心奉神呪鬼惡攺為良六情無染著何憂命不長飛天梵豫奏歌曰善哉方諸地福慶降天真哀哀馳競子賤我貴他身不知識妄識恍惚外求神還歸真一地保守自然民諸天仙真大衆悉皆慶恱歎未聞見再拜稽首唱善奉行太上洞淵神呪經卷之十一
