front:
  text: 太上洞淵神呪經卷之十三制三
  hash: sha256:f67586ec199588707e71296b2e65d2e676028edbd804253250c2a6f59c8ec20e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_013-001a, image: hfl/0172/0172-058.png}
body:
  text: 龍王品道言昔於三天之上以歡世界伏見諸天諸地疫氣流行人多疾病國土炎旱五穀不收兩兩三三莫知何計爾時天尊乘五色雲來臨國土作大神通變現光明與諸天龍王仙童玉女七千二百餘人宣揚正法普救衆生大雨洪流應時甘潤汝等莫生不信殃沉九祖幽魂苦爽名係鬼官之中百劫千生終無出日若能勤心受持讀誦功德深逺人民無災各各延壽長年無有中傷道言國若有難兵戈競起人民相食天地振動日月不明其國但於福德之方宫之內或有泉池之處置九龍之位立五聖之形轉念此經禮虛皇上帝鎮國天龍當得妖氛自滅兵革不興君臣有道龍德相扶天下太平恆居祿位是時諸仙等衆聞此演說悉皆利益普潤含靈俱作禮各願受持太上洞淵召諸天龍王微妙上品東方青帝青龍王南方赤帝赤龍王西方白帝白龍王北方黑帝黑龍王中央黃帝黃龍王日月龍王星宿龍王天宫龍王龍宫龍王天門龍王閻羅龍王地獄龍王天德龍王地德龍王天人龍王飛人龍王蓮華龍王花林龍王五嶽龍王山川龍王又加殺鬼龍王伽羅吞鬼龍王小吉龍王大吉龍王金光龍王金色龍王陽氣龍王隂氣龍王醫藥龍王獅子龍王鎮國龍王鎮宅龍王錢財龍王井竈龍王金銀龍王珍寶龍王庫藏龍王富貴龍王五岡龍王五穀龍王金頭龍王衣食龍王官職龍王官祿龍王江海龍王雲海龍王淮海龍王山海龍王淵海龍王國土龍王州縣龍王城市龍王靈壇龍王風伯龍王振動龍王雲雨龍王大雨龍王散水龍王天雨龍王道言告諸衆生吾所說諸天龍王神呪妙經皆當三日三夜燒香誦念普召天龍時旱即雨雖有雷電終無損害其龍來降隨意所願所求福德長生男女官職人民疾病住宅凶危一切怨家及諸官事無有不吉汝等魔王及諸邪鬼若聞此經不去者頭破作七分令絶根本吾所說此經所厭者伏所禳者却如有國土城邑村鄉頻遭天火燒失者但家家先書四海龍王名字安著住宅四角然後焚香受持水龍來護東方東海龍王南方南海龍王西方西海龍王北方北海龍王各各浮空而來神通變現須㬰之間吐水萬石火精見之入地千尺復有大水龍王主鎮中央隨方守鎮掃除不祥道言善男子善女人家事龍王若能書寫常安龍處及著庫藏之中皆以清水淨果依時供養或是月朝月半祭龍之日讀誦經文呼召龍王家當富貴無有虛耗庫藏盈溢此經神驗不可稱量是時四衆聞此演說歡喜無量八萬四千龍王一時踊躍天地振動神龍俱㑹大雨洪流普救衆生一切天人同時稱善稽首奉行道言王魯李鍾都教勑南湖海陵道士女官及諸道民一切等人普使令知吾自從前化以來五十三載被太上所使遊行五嶽化諸十方周流天下無所不至欲開太平無為皇帝而治但今世人情淺薄善者極少惡者甚多從今以去至壬午之歲吾遣弟子七十二人遊於世界教化羣生賜其道氣為以此人貪財利色詐稱聖賢誑亂百姓千言萬語無一應報吾自甲子以來以法除之餘三十六人吾乃賜其道氣護持君庶子善敬之敬之當時世運逼促惡人衆多吾以己巳之年三月三日遣十方鬼兵從華隂西嶽驅除惡人今巳至霍山南嶽徙其故跡十不遺一橫尸萬萬不得瘞藏汝等叵知巳否吾令每以三月三日從嵩嶽遣鬼兵百萬之衆從南冀定國黃鮑漢間驅除惡人徙其故跡十不遺一今以恆山北嶽恐至蕩盡吾今語汝愚士視不盈百行不滿千自言知其久遠聾俗之民絶可嗟歎從此青齊以南揚州及北燕此是福地子等勤作齊功掃灑壇治勿得如常吾至甲申之年當放洪水除蕩惡骸當此之時萬民蕩盡吾今特意語汝善信之流令各知委教示道衆訓誨法流各各用心不得如常吾見汝心從來香火之錢供家妻子以自活命非是志心之人吾誡汝以後各自改心勤施惠於貧乏莫用非義之財無稽破費貧賤非是無運富貴豈是有謀皆是吾力降其道氣威神覆蓋𦤺使如然吾乃從空而來積氣而成行乃無跡住亦無影聽亦無聲視亦無形或能去天三尺離地三尺或能去人頭上三尺證照天下大地之內何所不見汝等那知吾神近之與逺吾上不及天下不至地浮遊天門星河之側何求何欲只念萬姓零丁大水來至千災並行驅除惡黨萬死無生太平顯出聽吾鼓聲教汝道士女官并及善心雜類等人吾知天劫當㑹乃有定期年運垂逼各自用心勿得如常吾以壬申之年將行百病消除惡人吾語善心之人咸使知委吾癸酉年常遣三弟子將神真百萬符牒遊履五嶽俵與善人受符之者萬災不干百鬼不近至甲戌之年當有一種黃衣而行使與惡人無别子等勤其香火不得營惑同法之中共相此形香燈之前自見太平吾告五嶽九州之內道士女官當值九厄之末百六數窮人鬼交爭惡世難度共相教化皆令從善三五七九勤作齊功掃灑壇治莫令有闕吾以正月一日遣百萬鬼兵驅除惡黨以三萬鬼兵手持赤棒於路殺其惡人復以五萬鬼兵手持黃藥行其心痛疫病唯殺惡心之人復以七千鬼兵各持黃藥行其疫病得此病者腳手縮不復得伸復以六萬鬼兵各持青藥遊於世間人遭此病臆塞口噤不能言語以𦤺命絶復以一萬鬼兵各持白藥遊行世間人得此病悉皆頭眩耳聾倒懸而死復以二萬鬼兵各持黑藥遊行世間人遭此病形熱如火狂言不眠而死復以五千鬼兵各持赤藥遊於世界人得此病便即卒死不復言語吾常以三月三日遣童子千萬人各持雷車霹靂殺其不善之人汝等世人寧知吾一日之內勑殺幾人當值百災並行妖惑橫生之際子欲度其災難但於香燈之前莫信營或之人身遭刑害吾遣三十六弟子遊於九州五嶽教化一切人民吾賜其道氣是吾弟子頭上有異不黃當赤不青當白子等若見其光一心敬奉吾門太平之後無為皇帝而治國邦當有三萬六千人為於仙客復有一千白童子建五萬八千幡一幡各長三尺頭起龍復應領五萬八千壯士手持此幡又領一千一百女官各持香爐當須三種黃衣而行列如此之時樂不可巳天下洋洋聖化蕩蕩而萬民無怨吾開太平之始初起㠓山然後還朴而治汝等何緣而知之吾乃大期有定大契有存子等各各用心無自怠焉吾勑汝等道士女冠在法之流莫淮常心吾每一年三度遊於世界觀汝所修汝等豈能知乎我或作遊學之徒或作官行急使或作貧窮老翁或作淒寒孤兒誰能識其真僞吾常以正月一日履汝壇治浮游南北或則東西汝等寧測何壇不登何室不履齊壇之中悉皆停住吾念汝等恐不成於上善故歷世界是處經過恐棄真就僞率衆為非太平見露黃衣相隨善人得福惡人自衰罪及三族子怨阿誰吾在九天之上時乘雲鶴駕其赤龍被差異典五嶽洞府天下名山或遊世俗隱遁塵中錬行修質愚賢豈知或作嬰幼子或作白頭翁晝隱而夜遊萬民心不從太平未得顯海藏開大洪相洲震金鼓天下聲阿貧將道士典吾復本宫蓮華蓋九室白鹿純萇松鳳凰棲其陽麒麟來相崇幡花耀日月見者誰不從子欲見吾身一心歸虛空吾在九天上暫時五嶽遊衆賢集聚論盟津平魯溝流血當成津白骨積成丘青齊起洪水冀定成洪流燉煌鮑漢間萬民當飄浮古有大十難百錬吾身軀尋思得如此何為先日讎海藏開大荒一舉平九州東海為桑田鬱州起青樓得見太平者欣樂不知愁太恆華霍嵩吾先遼不緣欲知浩漫處但尋盟洫間玉女居河織立機造䋱文如若不信者可往問張騫信與東方朔心意常令宣天地得合同集㑹成因緣鬼兵無極衆把石填崑崙何山能髙此我當獨與天連磋切太虛上立金銀壇白玉鎮四角循列仙官觀皇老登壇立善人還長安爾時太上說是經呪令一切衆生歸心向善矣太上洞淵神呪經卷之十三
