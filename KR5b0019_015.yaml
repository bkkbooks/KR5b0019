front:
  text: 太上洞淵神呪經卷之十五制五
  hash: sha256:230aaa8272c304218c1f6c01ca95d7f8da04498490905344d3323b41845cddcf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_015-001a, image: hfl/0172/0172-106.png}
body:
  text: 歩虚解考品道言吾今不忍見汝天下蒼生福德淺薄自從出胎世上年七解語以來舉手施爲出言用意心生五毒六賊競興曽無善慈唯只惡生好殺遂被三尸注薄七魄録名常以甲子庚申奏入天曹案内罪滿三千簿内天符降於中斗之司勑令本命星官收汝三魂七魄送付泰山地獄次落司命案中重罪牒歸酆都入於二十四獄罪重不積只在泰山十八地獄之中晝夜鞭笞時時考撻款辯既定案牘分明獄卒擎又曹官引過閻羅大怒罪故難容各准條章償他業債或生天道或生地道或生人道或生鬼道或生畜𩔖道或生或病或死或未死或令飽死或令餓死或令熱死或令寒死或令水死或令火死或令土壓木傷死或遭金鏘鐵刄死或遭蛇傷虎咬死或遭蛟螭魚鼈死或遭豬牛犬馬死或遇刀兵枷棒死或遭雷電風雹死或未死身染諸色惡病或患五色腫炁等病或患焦瘦等病或狂邪風癎等病或患疥癩㿈疽等病或患瘡痍等病或患骨蒸勞瘧等病或患盲聾啞吃等病或患喉閉鼻塞等病或患頭旋眩亂等病或患傴背凸胷等病或患矬短交脚等病或患腹脹肚滿等病或患心痛嘔逆等病是諸種種惡疾卒名不盡皆是汝等衆生宿縁罪報不能覺悟吾今幸當救民之任不忍見汝衆生受斯苦病災厄常縈吾今專遣明羅真人持經行化天下爲諸衆生㧞度五苦解災却患濟厄扶危治病救疾消諸禍源若有國民遭罹衆疾官府獄訟繫閉經年水旱蟲蝗兵草疫瘴諸醫不愈者但請髙行三洞法師潔置靈壇轉經誦呪奏表呈章建齋設醮祠謝五帝神仙歩虚讃詠旋遶太上自然至尊釋㑹天兵功德無量衆罪消散鬼兵滅亡疫病痊除家眷清泰人口禎吉國府和平水旱不興田蠶倍勝孳牲盤黨吾今為汝讃詠攝毒收瘟宜須䖍聽道衆頌曰東方蒼老君號曰勾芒靈梵女遊太空迢迢拂玉亰大乗緫三天衆兵統魔兵八音遍十地九龍雲輿迎建齋立大功長夜自然明正道法皷震百邪悉摧精魔王來稽首方始免其刑善神守門戸力士交萬靈道炁廣流布家親咸安寧疫毒皆消滅萬民悉長生相與弘至道俱遊紫鳳城南方炎帝君八表號閻浮飛軒駕雲輿十真三天逰玉女乗霄唱金光溢丹丘今日轉法輪梵響震九嵎天帝勑魔兵風舉自然休晃晃三光耀百邪没九幽若有干試者力士斬其頭諸天帝王子殺鬼豈敢留故有强梁者鑊湯煑其軀千千悉斬首萬萬不容留興齋攝魔精魍魎值即收大道威嚴重神風掃邪妖疫鬼即消盡萬民無災憂西方蓐收神號曰爲句尼三光懸太虚朗朗照四維八音三十二百邪豈不摧今日建福田神呪破鬼儕然燈光照逺長夜朗然關風止雨亦休斬妖束鬼非敢有違逆者縳送地獄畿金刀縱横截鐵杖歴亂槌行道除百惡燒香滅千災道士心精志積善起死骸萬邪畏真正㐲匿焉敢違奉師尊大道道炁自來歸愚迷不能學智者常栖依不惜財貨身貴敬乗空飛北方欝單境帝神曰玄𡨋落落四運開昭昭五炁明豁豁邪穢除蕩蕩天地清太上威嚴切凶魔死不生敢有違逆者收之付天丁千千皆截首萬萬悉誅形閻羅剪邪魅北帝滅魔精神風掃不祥萬惡不得停上聖惠澤流是物普咸榮若有違勑者神兵寸斬形中央戊巳神黄帝緫萬機三秦統八方句陳耀天輝神光輝照灼豁然幽夜開至道恩慈普萬兆悉歸依今日建萬齋萬惡不敢希風停無動條福德髙巍巍鬼疫須逺徙億億斬無遺國民遭病苦詣請神呪齋病者得痊瘥鬼疫自然摧諸天攝魔魅衆真逐邪非太上金口勑速去勿令遲東北艮之子其神禦隂節奉承太上教善惡令分别邪僞不干真犯者宜誅殺上聖護生民侵者天垂罰洞淵理清肅三昧法嚴切神呪滅邪魔群祅並消滅除凶凶即止斬鬼鬼便絶神兵盖天下靈風掃地發萬神十方赴千災九隂歇公私無障惱存亡俱解脫東南巽之域地戸張網羅羅網遍天下萬鬼難得過五嶽爲安静四海不騰波千邪不敢動禁勑一切魔魔鬼敢逆者斬之付陀羅頭破數百片身形悉消磨吾救生民苦災厄焉敢過三官宣勑令一如女青科西南坤之毋神呪收邪精禁之天地鬼瘟毒不敢行苦有不從者神乃斬汝形今日建大齋殺鬼而理生三光一流照九幽普開明朗朗遍十方百鬼無藏形故爲病不止收之付七星神風掃凶孽邪惡自然平老君明勑教斬殺衆魔兵西北乾之父其神通天光聖帝愍黎民百鬼何尅傷故結天羅網遍布於十方捕兵收疫鬼無令得潜蔵次次皆斬殺付入沸鑊湯一切令滅盡無復得逃亡今日立功德福流除禍殃病者得痊瘥健則保休康宅舍悉清泰鬼炁並消亡天神咸擁護闔門永吉昌上方諸天帝出入大羅門䕃育閻浮庶劫運使長存萬邪敢不忌縦毒殺人民狼藉死病苦怨感徹上天太上降大兵擲火收百瘟三五斷邪逕七星塞鬼門掩縳付天獄萬民方保全下方地祇靈網網都九域澄清於四海安鎮於五嶽制攝邪魔鬼不得行百毒上聖護生民故降明威勑若有違逆者收擒付天獄鐵鉤鉤鬼眼金刀截手足神呪殺㐫魔萬邪滅種族黎庶荷道恩無復有悲哭免度凶忌年㑹見世安睦稽首十方真永劫無災毒道言世間信士中國奉道法流今有十天帝君重宣三昧洞淵靈音神頌修齋設醮切須諷詠怡神滅鬼功德無邊消禍祈恩福德立降今當敷演子宜諦聽東方九霞天震宫清泠府玉女扣金鍾魔王擊法皷帝君勑令下九龍走雲雨幡節來平空十真呈妙舞超㧞長夜魂能治生靈苦天丁拽寳刀力士開煙霧搜括邪魔鬼飛天静道路三洞今流光遍照修齋戸南方三炁宫重離煥太陽散花流十天玉轝燁九光朱鳳㗸玉印火龍駕寳幢玄女歌長生青童焚降香萬萬排天兵千千誅魔王大帝降天符掃蕩諸不祥殺滅六洞鬼一一付鑊湯正法巳宣告興福滿州邦西方七炁尊兊官飛金鋒玉輿乗翩翩仙仗排虚空鶴舞髙盤旋寳珮敲玲瓏中有萬紀靈演說三洞功濟㧞幽塗人陞空大無中金兵千萬騎邪魔莫相逢正教昌國府殺鬼無遺蹤今憑大道恩普願駕六龍北方五炁尊重坎玄武神水精疊爲宫仙府長如春黒浪深無涯酆都髙不群帝君說洞經幽顯咸得聞邪鬼不正形破骸誅殘魂羅天有猛獸吐氣四海昬流鈴飛火輪清化安乾坤是人修齋力咸歸萬福門中央戊已神五土列爲尊朱闕聳太空寳殿藏崑崙長生十二經玉簡金口言翊翊排雲力百匝修齋門天丁碎黒毒力士誅黄瘟帝君殺鬼符掃蕩萬袄群仙童扣瓊鍾洗㧞長夜魂香燈明朗朗果報勤勤恩東北清梵天艮宫深清泠玉女散寳香真皇演洞經簫奏鸞鳳音風韻雲和聲遷㧞九沈魂皆陞紫霞城千里掉劒輪萬里排天兵爲害諸魔鬼今日難藏形驛龍咸律令誅殺付天丁福興禍自滅千載保安寧東南梵寳宫巽域青雲阿神兵一持呪三界摧邪魔功德巳巍巍碧海無風波玉女空洞吟青童歩虚歌善功今巳立仙路輕雲羅幢盖間花飛神兵歩歩多上聖降虚空齋福髙嵯峨三宫十二司大宣太上科西南梵炁城坤宫太玄霞九光凝融融十洞騰雲車虚皇談秘經衆仙散天花金龍飛赤焰鐵面擒兇邪明燈煥重泉仙唱増善芽魍魎及魑魅一一付金叉三洞今流行萬真遵十華然燈照無邊功成清浄家西北號天門乾宫紫霞深妙樂奏嘹嘹寳殿香沈沈三天别無路但照清虚心齋功與經力能除悲苦音修者陞天堂劫無寒暑侵大道弘三洞神仙次第吟敢有諸邪魔縦恣非胷襟衞護修齋所飛仙寳華林上方無極界三十二清天中有長壽人千萬無窮仙虚皇演真經仙唱盤空旋群龍駕紛紛五帝車翩翩太上勑令下三界誅魔祅浄蕩五濁中願離苦火煎拯㧞幽㝠魂奉師尊聖言修齋立功德代代受榮遷下方十二真四溟杳無涯修齋戒羣魔勑令除祅邪香引碧煙雲燈列紅蓮花玉女歌不盡福備無窮家暘谷定寒池超度五雲車玄朗齊三光勿令煙雨賖今日禮十方天兵百匝遮慈悲無上力隨願宴金華道言吾今專遣大宗法師爲汝有病有難疾苦之家普說消災歩虚今汝三十六天魔王一時歸心降伏自今以去不得更與天下人民作於禍患聞見大道真言悉皆䖍心崇奉各各稽首而聽頌曰大道出虚無玄朗照衆生天人化愚迷神仙超雲征若能救八難此道得長生至理何寂寂虚無甚㝠㝠太上坐玄䑓玉女詠太清至人無處爲汝乃知道成諸天朝太上三五自來遵飛仙遊三界真人雲中吟聖人無不噫孰能知此心正真大一化無兆自陞天獅子鳴大野鳳凰應節吟神仙來稽首汝乃自知玄三五輝時映玄朗應物遷虚無不自號浩漾入無間若能得此理何有不成仙虚無無常號唯存志心形天尊出幽㝠道亦此中生智士學明教可詣太上庭天人把朱花玉女揮玉芝神人群來侍飛仙啓皇基太極諸玄子非世所能思仙人壽萬劫千歳若一春兆年謂今夕俗號焉足論若有神仙骨爾乃應此心三洞流十方明教須人弘忠信奉經戒亦如五嶽靈自無髙騰骨陞飛豈可登注心三界外泛想遊玉亰真人空中詠玉女乘虚翔今日朝天尊稽首禮玉皇齋時三首太上甚髙玄至理無遺蹤妙覺虚中唱仙人詠空洞自非黄林士孰能弘此功翊翊排雲出迢迢諸天人口詠真祕訣八龍登紫宸自非髙上賔安能體此文至理超遐津有存無不解玄匠朗三光真人受範楷仙人揖流丹莫不稽首禮洞淵大齋建夜三首妙哉三洞經神護九龍迎建齋破慳心得遊紫鳳城志功積萬劫邪魔敢不聽嘹嘹八音響十方太上京三洞好專心誘化度衆生勑文一說法三禮坐聽經迢迢三界外渺渺甚㝠㝠今故建大齋然燈照玄星忽有小鳳嘘告神勑魔兵道言吾在三天之上不忍見汝天下衆生多招殃患疾病死亡狼藉皆是汝等衆生自從年七以來六賊十惡競生身心常被三尸記其罪目奏上天曹命有短長未令追入因被天曹勑追魔王遍行疫病只爲身心口手自造罪愆吾今爲汝群生廣申懴悔各令魔王鬼主聞見經言自然各生慚愧攝毒收病汝等世人志心静聽說其罪元道言吾今告汝衆生汝從年七以來乃有呵風罵雨之考又有不敬天地之考或有不敬日月星辰之考又有呪罵天地神靈之考又有露形三光之考又有怨罵鬼神之考或有唱引㝠神忌諱之考或有不崇法戒穢慢有妙之考又有不敬父母師尊之考又有向於三光大小便面之考又有不敬經法泄露秘文之考又有毀謗忠良善哲之考又有以少淩長不相和順之考又有輕秤小斗與人之考又有重秤大斗入巳之考或有棄道受邪之考又有作事非法之考或有勸人作惡棄其善根之考或有不敬法教敗人成功之考或有專行兇逆掩善揚惡之考或作邪師無靈指示妄爲神語敗人心事之考或有犯塜觸墓驚動靈識之考或有觸犯宅神穢慢井竈之考或有穢汚投於水火之考或有穢慢土未之考或有阿汚金銀銅鐵之考或有借貸不還口是心非之考或有𥬇人作善欲人爲惡之考或有憎人善功藥爲非法之考或有見人修功立德慳惜不施之考或有祈福請願心不恭敬之考或有買賣道釋經像財物之考又有呪詛無辜牽引平人之考或有侵淩横生謀奪之考或有飲酒食肉託醉呌喚神鬼之考或有貪婬色慾不避親踈之考或有修齋設醮不依科儀之考或有急難不救有危不扶欲令傾陷之考或有發願修造功德不能成就之考或有疾病得師治救不解文䟽之考或有恃酒放狂淩突尊少毀壞一切之考或有見人婦女妄起邪淫之考或有持齋破戒傲忽上仙之考或有殺害生命踐踏蟲蟻之考或有貪婪不知止足之考或有縦心妬忌打罵下人不與衣服之考或有惡心攺換關契取人田地之考或有醉時或是急難許其良願後以負心不醻之考或有意圗謀一切兇惡之考或有衣食豐足所運從心不知慚愧天賜之考如是衆考不可一一盡言今專轉誦之次陳露前愆願蕩除一時矜赦罪沈九地福起十方世世生生常逢大道信受奉行太上洞淵神呪經卷之十五
