front:
  text: 太上洞淵神呪經卷之十六制六
  hash: sha256:2c71131e346a294bf3d205abb23c1369bbf2eeedcf4d3a0248697fd46216b404
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_016-001a, image: hfl/0173/0173-004.png}
body:
  text: 勑鬼品道言十方世界百姓男女若鬼魅所侵疾病死亡或癲癎狂走獨言獨語或霍亂吐痢轉筋不止或瘟黃疫毒熱病腫病脹滿或水火劫盜財畜死亡口舌相加橫羅官獄禽獸雞犬血流光怪胎妊墮落男女傷亡向願乖違種種迍塞墓宅不寧生資虛耗凡有轗軻貧窮不利當詣明師受吾誡籙尊奉禮敬不作諸惡有災之日沐浴冠帶燒香禮經端坐安心恬神靜慮捻香叩齒三十六通呪曰頭戴朱崔足履玄武左扶青龍右踞白虎前有蒼精劒戟後有金槌鉞斧天丁力士衛我前後有黃奴百衆凶邪鬼賊急去千里急急如律令道言天下有無數之鬼侵害萬民吾今盡知汝名名赤頭殺鬼王身長二丈部領三十六萬億衆殺鬼各持赤棒遊歷世間向取生人又有三天大魔九天大魔三十六天大魔十方殺鬼領鬼大王三十八萬人復有東來神西來神南來神北來神各領三億萬人以為侍從病害男女損耗資財吾皆知汝名急去千里若不去者吾遣八部禁兵打殺汝等急急如律令道言大魔王夏銀烏延赤波洪供等及大驅除將軍三十九億人大兵一千二萬人赤弓大卒四十萬人九州力士萬九千人司命四十九億人天殺侯王大兵八十一萬人當承吾教命為諸善男女收却千精萬邪驅令出境勿犯良民復告三十六天大王七千萬人九天大兵九十億萬人天神不離八千萬人天丁力士三千萬人傳香玉女四十萬人侍香金章四十萬人三十六梵王及義兵九千億人汝等聞經當來衛護生人某令鬼魔退散百病除愈復告萬和力士四十萬人百舌吏兵三十六萬人等聞有轉經宣呪之處汝等當為生人和喻家親丈人令內外分判家親安穩擁護生人外鬼邪精一切驅遣守護有功依科遷賞違吾者結罪三官慎之慎之叩齒三通咽液三過道言若有清信士女君臣吏民沙門小仙百官品族山中智人勇猛進士豪貴下賤若聞此經即能信受當知是人無量劫來嘗為仙人天上來生也暫出世間不久應仙也或為尸解若託滅度即生天上終不死也以是義故略説此經世人多不信道人民心惡聞説此經心生輕慢誹笑神呪不信聖言將為妖惑不敬真經欺師賤道無心信受如此之人從三惡道中來常懷毒害惡氣未消業障罪重使其然也或現世苦惱貪欲愚癡如蠶繭中自纒自縳無復出期或得重病遍體瘟黃疫鬼纒身常在左右營生失利所作不成縱任大官還復退落或被刑殘須臾之間便成下賤暫時富貴後乃貧窮若得重病家口無原或身生惡瘡蟲癩之病膿血臭爛或生疥癬花瘡水腫氣病癕疽蠶瘡丁腫為鬼疫病染汚四鄰若得巫師轉增困重遇好良藥亦不能醫乃至命盡由有餘殃輕慢斯經天罰故也如此人當復入無間地獄幽牢檻柵之中億劫不原復後乃得出為禽獸六畜之身人所惡賤不欲喜聞食諸穢惡不淨之物乃至糞雜當欲不足困苦負重又加鞭杖一失八身萬劫不復輕笑此經得罪如是吾今觀視下界衆生苦樂報應壽命短長富貴貧賤所為不等故哀愍一切苦惱衆生猶如赤子勸化愚暗當使敬信盡令解脫往生天上不為胞胎之所苦患常得清淨自在之身與吾同遊乃説偈曰三昧廣流布有緣能得聞賢者即信受積劫為貴人暫來生世間不久自應仙為度衆生故遂來到此因吾遣諸天人億劫真仙衆教化於愚冥惡人不信受及更笑斯經謂法無靈應相與不敬愛生世受苦報疾病之所纒疫鬼及魔王來滅汝家門六親及妻子盡死猶不足魂神入地獄萬劫無出期墮落黑暗中幽閉於重檻病毒甚難忍長夜復幽冥後出為禽獸食諸穢惡物或作六畜身為人所輕賤負重而鞭杖輕慢斯經者獲罪如上説若人能信受福報生天上有骨應仙者受持三昧經汝等修中道當得見真君太上説此偈已九天大魔王三十六天魔王及天人婇女諸天梵王魔王眷屬聞天尊説此偈頌心中歡喜一時俱起稽首再拜我等大梵魔王亦隨徒衆常隨守護遊行天下受持之人無令疾病收殺疫癘鬼賊為禍之鬼令疾病速得除瘥萬願從心官事解散經求稱意若有惡魔精邪惡鬼不從太上教勑者我等當收汝等惡鬼斬之萬段碎如微塵終不恕也我等魔王自共誓曰不敢為惡願轉鬼身長為仙道親近大聖是時真人蔚明羅通智識章句民子等真人及諸天大衆聞天尊所説妙偈心大歡喜各稽首三禮信受奉行太上洞淵神呪經卷之十六
