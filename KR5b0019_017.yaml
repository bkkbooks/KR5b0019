front:
  text: 太上洞淵神呪經卷之十七制七
  hash: sha256:1eb5593cba3c45d11f4473fc3852fdd61d18f5795e70aa58e9095649fa23dd0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_017-001a, image: hfl/0173/0173-014.png}
body:
  text: 召諸天神龍安鎮墓宅品爾時太上道君於開光太初之先與諸天神仙大聖衆十極神王同詣長桑林下暘谷之墟左遶行道三匝同心作禮上白元始天尊臣見凡人父母及諸眷屬亡殁之後葬於岡山建塜立墓以安萬年冀保宜孫利子待其富貴光門今乃居家累年轗軻竟歳凶喪破財散榖非横連緜縣官牢獄繫閉經年畜養不孳田蠶失力所運乖錯所謀失宜仰賴宿因今身獲慶值於此日得覩無上至尊釋我愚懷乞垂哀愍儻蒙旨誨斯乃朽骨重肌仰受鴻恩難酬生育於是元始天尊乃彈指顰眉而告太上道君曰卿今所說凶殃之理甚是濟苦良因欲蘇沈沒迷愚咸居福岸卿當復坐䖍恭瞻仰聖顔志心懇切以側聆專意投誠而伏聽天尊乃告太上道君卿曽見飽暖之流及飢寒之者否道君曰每見未委根從何起伏乞聖恩特垂指示天尊曰如此善報者或是前生自種福報今身或承祖父餘慶潤及兒孫承兹飽暖更能拯貧濟苦營修古跡靈蹤聖治仙居並宜崇建現世獲福不在後時如是飢寒貧苦之者或是先世劫剥深害善人或乃竊盗修造等物見危不救見厄不扶或待人力數多或倚連倉積榖或託家盈財帛或慿富厚錢銀或言人多宅狹或嫌㕔堂低小不避身殺命災不識財衰禄絶率意修換干犯二黒五黄宅絶身衰營運九空四廢或乃葬埋眷屬只畏呼婦殺兒不取亡人利益年月營墓之所又是死人五鬼三災𦤺令生人受生殃禍使其人丁兇暴或乃交徃惡徒或時恃兇凌弱或時抵突長者或則罵父欺孃𦤺被木石所傷亦遭蛇虎所害或遭雷霹或被災火焚燒殟瘴疫殂兵傷獄死連年訴訟横失錢財所作不成所求難遂田蠶失力眷屬不和六畜不孳累歳迍邅連年不泰求安無路可㝷髙行真人明了經文道士依如靈寳自然典式或一日兩夜行香昇壇關奏三時行道轉經呼召天神地祇龍王聖衆解釋前辜後過懴謝巳往罪愆乞赦所觸深尤願降鴻恩拯之壇髙二丈四寸闊一丈二尺有餘纂二十四莖左繩三匝繞之開天門地戸安人門鬼門於壇内列十一方香座或五方香几嚴飾壇塲敷陳幡幢䖍告虚無自然大道玉清元始天尊上清玉晨道君太清玄元老君上上太一空洞天尊十方無極大道太始五老帝君三元尊聖日月元君五星至聖七元真君五斗神真三台官屬恭敬䖍告具述祈請根源肅睦身心乃敷經卷龍名神位奉請東方守墓鎮宅青帝神龍王南方守墓鎮宅赤帝神龍王西方守墓鎮宅白帝神龍王北方守墓鎮宅黒帝神龍王中央守墓鎮宅黄帝神龍王東方庫藏神龍王南方庫藏神龍王西方庫藏神龍王北方庫藏神龍王中央庫藏神龍王天神神龍王地祇神龍王國邦神龍王府郡神龍王東方修吉神龍王深林神龍王南方多善神龍王花留神龍王西方甘思神龍王善然神龍王北方波流神龍王思慶神龍王中央驪龍神龍王宫殿神龍王㕔堂神龍王屋宅神龍王房閣神龍王㕑竈神龍王莊田神龍王蠶桑神龍王絲緜神龍王紬絹神龍王錦綺神龍王綾羅神龍王金銀神龍王珠玉神龍王銅鐡神龍王倉廪神龍王八榖神龍王天子神龍王諸侯神龍王郡主神龍王縣宰神龍王家長神龍王子孫神龍王岡山神龍王䕃注墓宅神龍王隂宅神龍王陽宅神龍王護國神龍王安府神龍王保家神龍王驅鬼神龍王斬鬼神龍王六畜神龍王錢財神龍王招財神龍王衣冠神龍王仁義神龍王忠孝神龍王雨露神龍王泉澤神龍王元始天尊說此諸天大神龍王各九十萬衆若有志心善信男女弟子累年家多迍轗但請髙行明逹道流於家建立道塲或装壇立纂子午二時申奏口章亦看兆民祈求所懇事理大小如是解災度厄唯只轉經三時關奏或六時行道齋畢散壇設招龍大醮一筵保鎮家國王民流俗各得平安無諸災害併消凶惡福祐咸臻賊盗潜蹤神龍擁護驅遣災患速去萬里郊坰人民樂業一種九收太上勑令諸天大神龍王十方神兵力士各各奉命下來鎮䕶國府塚宅此時國府帝王大臣及以士庶併心奉道各各願受北極神呪妙經教法流行諸天龍神大聖神王力士真仙兵衆皆來擁護受持經法善信男女各保益壽延年恒居禄位國土永泰人民安昌八穀豐稔天下太平三光真明常依晷度五運不錯四序順時三災永除兵凶絶跡急急如太上所勑神龍安人大律令元始天尊復告下元之人一切衆生自今以去天下若有國府不安人民不泰三災競起五毒興行賊盗侵人郷坊塗炭人民失業府郡荒殘生靈餓殍親眷相踈骨肉分離此是鬼兵災害興行令人苦酷若有國王府主方伯髙人能率兆庶十家五家同心併力市易香油修建道場䖍請髙行道流明了經戒道者轉讀召龍聖典北極洞淵秘文同誠潔志共禮元始真像五老上帝尊儀一切仙聖真形具陳所修情理精誠感逹吾乃悉遣所召聖真神龍部從俱降道場聽民所願即乃施其兵士收擒爲害殀兇撲滅五毒三災乃降鴻恩大福保護歸心庶俗永受玄恩常沐道慈所謀隨意所圖者克所作皆成眷屬殷繁門昌族貴平安之後更專䖍敬三光崇仰一切靈祇自然永蒙安泰急急如太上所勑教民除災請福大律令太上洞淵神呪經卷之十七
