front:
  text: 太上洞淵神呪經卷之十八制八
  hash: sha256:965359ad2019661c395dcda09b52376405193ddbeb14aab8bc917a6920fe9a29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_018-001a, image: hfl/0173/0173-026.png}
body:
  text: 定六甲旬内災福祈恩品道言元始天尊以龍漢元年與五老大帝隂陽二宫上真五星七元真君及二十八宿官屬同遊三天境内配定塵寰善惡後至上皇元年甲午之歳降於震旦中華觀此世界諸邦福瑞稀降疫瘴熾盛民多流亡分野水旱相災五榖因兹不熟爾時天尊嗟嘆愍見群𩔖受災遂乃大設神通顯其道力威光普照鑒於國土諸邦乃召諸天神仙聖衆諸天龍王龍宫仙童玉女七千二百徒衆及管内山川潭洞祇靈主者俱臻㑹所瞻禮尊顔聽宣正法時乃風驟雷震甘雨霈霖聖澤霶流蕩滌不祥境土歡泰爾時衆中有一髙道號曰明羅越衆前趨叩頭作禮臣以宿縁沾慶獲侍尊顔大小陽九災運曽沐披宣未審六甲旬中年災從何而起惟希慈照垂賜隆恩則乃朽枿遇於陽和涸鱗逢於春澤於是天尊告曰此理邈然子宜復班吾當示汝吾從初建天地之始乃定天上甲子地下甲子人中甲子人中甲子者乃有四時遷謝律行陽候㠯運隂期乃分上元中元下元每一元管六十載今具述一元毎年豐儉休咎子宜隨口編録將示後來冀顯災福之年賢者遇其一陽節臨志誠早祈於靈祐乃爲頌曰甲子秋耕民懷苦憂禾苗不成實災厄害田疇但看入秋後髙田不可守辛苦臨冬春父子離郷走兄弟成路人妻子單糊口萬姓悉災迍民隨千里走乙丑春瘟災害萬民夏首災疫起偏傷楚魯人家𩔖悉糊口呉地又分張民奔千里外六畜悉逢殃髙田但種植低處傷苗秀災疫如去年不得歸家守丙寅首猛獸成群走四海悉揚波源野連山阜髙田宜種植領畔并山阜但看四五月衆魚庭前走丁卯中未可遂時風春初無猛雨秋中有大洪低田災彌起山際好施功𡻕中雖薄熟倉儲不免空戊辰裏蟲蝗皆競起人民遭災疫婦女悲生死災害是秋中稻出山腰裏低處定難收必是遭洪水巳已初階前觀戲魚湖裏蛟龍出乗舟在陸衢平路遭淹浸禾稻澇皆無欲求乾浄處須早竪樓居庚午首水旱俱應有船行陸路中牽馬湖中走夏旱憂百日秋遭三六九禾定出髙田秋收早冬首晚刈必逢災兵革起非久辛未年種植近山邊初春有大水夏中必旱然呉地應無事荆楚被災纒夏首雖㣲旱秋泉遍滿源不免病災起家家被率牽壬申候髙田難保守乗車行瀆中不見呉興部倉儲多偏促家家無升斗北地遭連厄九離皆並受兼疫發登萊平復呉江口癸酉年髙低不可憐春初先作旱夏首水連連末秋風火急禾稻不豐鮮但看齊魯地此處是荒年甲戌中春首被災蟲夏景逢災旱秋冬又被洪髙田虚種植必定見蒿蓬欲知災厄地燕魏及山東乙亥初水旱遍通渠災厄由此起大鬼鎮城居逺應定九五得失未年初種得禾苗處髙低然可居丙子過種田出江河作植民憂苦種苗被害多災䑕成群隊十兒同一窠䖍詣神祇佑保護上期禾丁丑攺田夫難自在春初雖種植秋首成河海牛馬被災傷京兆最驚忙欲知苗秀處稻出去年場戊寅年山頭好作田陸路成江澗飢民死道邊魚鼈同兔走髙岸稱栽蓮但看孟夏末庭前好闘船巳卯到髙處田苗好春初雖乏水秋夏連江浩楚魯受其災呉㑹蒙恩造其年皆豐稔種作偏宜早庚辰至燕魏人災起畜𩔖亦如然田苗被蟲死山際好施功呉地耕民喜低處遭淹浸中髙甚豐美辛己簉頳尾戲庭溜魚行衢巷問稻苗秀山阜種植但向前施功莫在後低處有災殃中髙甚豐厚壬午春水旱不調均旱處憂千里低處戲遊鱗非但只飢荒亦懼兵災頻疫瘴連年起飢餓亦多迍癸未中一井五家同春夏逢兹瘴秋來又被洪但看呉楚地并及在山東向西荒災起田父但施工甲申湊憂懼應非乆車行湖瀆中驟馬三河口移居定不回此是災中咎稻出五湖邊不用耕山阜乙酉遷春旱必應然三家同一井災從呉㑹連種作生涯處皆慕五湖邊不用耕山阜髙處是荒田丙戍年秋來枯井泉夏首雖然水向後地焦然此歳雲龍起稻出五湖邊中髙徒種植必定被災纒丁亥餘呉分好安居髙低通見熟荒歉在洪廬泗城皆厄難燕楚最荒虚歳中雖薄稔災水在春初戊子過田父好耕坡災蟲夏末有秋中災害多水旱數相尋蟲䑕不偏頗低田不須種髙處有㣲禾巳丑者災殃遍天下瘟黄害鄭地田夫船作馬六畜悉逢殃種植中髙野鬼行諸般病着者難解謝庚寅中髙地好施功雖復有㣲旱水與去年同低地得㣲熟中髙最是豐野獸連群走髙低路並通辛卯禾早種不須多秋洪作禍故山際水成波早種又復旱晚植那應好但看秋景後魚戲於人道壬辰祀禾被蟲災死并及害萬民六畜亦如是低禾不用耕種植山腰裏早作劣堪收晚種難准擬癸巳紀髙低無准擬中田又被殃䅇麥歸山裏此歳有災傷低處多逢水舊有書喫除新又多無備甲午初水旱定難除車馬行湖底船則納山居低田縦耕植冬藏定是無欲知成家處山際但耕鋤乙未首田種三江口呉地養民邦京兆多災咎非但是炎災妖災争來湊流浪逐風波值死寧非久丙申年髙低未可遷五湖堪種𣗥來去並皆然若見當災處斗米值千錢欲知安樂處江南最可憐丁酉側髙低徒種植三家共一井湖底生荆𣗥江東並出郷齊魯皆逐食西隴濠楚憂東南未休息戊戌木江南豐稻榖燕魏定飢荒三載留空屋男子被兵牽亦有歸門哭妻子見分張各自相追遂已亥間江南最可憐不必看髙下通熟滿山川災臨西部地飢荒似去年邊隅多擾擾後更見憂煎庚子末居家無定活禾苗被害多親戚相欺奪糊口並無餘妻子單眠活江南雖得熟向後亦號哭災殃則應逢處處唯空屋辛丑於災臨定不虚呉越炎千里當之是夏初但看入秋首蟲蝗處處有飢殍死他郷畜𩔖多災咎壬寅金猛獸結群侵種植依山阜庭戸闕過尋稻出髙田裏逢災是魏秦乗船於陸地髙城浪湧溟癸卯歳晉魏逢災害值旱隔三秋向應成兩載田疇多乏水髙低失准擬人物竟喧爭阨據中城裏甲辰候災蟲處處有其歳足災殃偏苦三江口粟麥最爲佳春夏耕山阜江南雖薄熟不免遭兵㓂乙巳至地底蛟龍起此歳主飢荒乗船於陸地蘇湖被波濤呉地得全刈禾稻出髙田向去多宜利丙午餘水旱無定圖忽來即時沒若旱井泉枯水族成兎鹿雞犬變成魚稻出低田内髙處不須鋤丁未紀種植山腰裏低處不須耕墯民遭餓死非但逢災水亦乃干戈舉呉地是平邦厄在燕齊楚戊申末江南民獨活髙低緫得收災蟲俱自滅此歳八榖豐人畜皆歡悅官吏逐階遷諸道咸通徹巳酉年耕民但作田蟲災有瘟災亦易痊山坡堪種植㪷米直三錢低處微傷水中髙甚可憐庚戌秋人民不可愁江南雖小旱亦未外方求倉儲皆得滿禾稻美秋收田夫俱喜悅四海盡風流辛亥湊災疫當處受悖黨害平邦發在滄陵口分野有凶灾時應歸隴右江南微薄熟不利呉丘阜壬子直榖米無人食江南足可居東道征無息泗城歸御道驛路生荆𣗥諸處並荒忙呉邦堪種植癸丑來人民定受災蓬瀛疫病起齊魯厄殃摧瘟黄災競起門戸乏人開迍蹇仍斯地桑田又更回甲寅候江東足餬口倉儲處處空民戸離郷走又乃發瘟災遇厄難脫手低處必水傷中髙又無有乙卯中四海並交通無殃皆得熟田父美施功粟麥最爲首偏益在山東其年多有福歳内足狂風種植宜須早髙處莫施功中低耕最好髙處出蒿蓬丙辰於禾苗種陸衢安泰在濠楚齊晉受殃殂亦復多災水鹿兎雜群魚是處民乏食倉庫悉空虚丁巳周呉地足風流倉庫皆盈滿滄茫人並遊但令逢聖主遷官不在求髙低俱得熟耕民忘却愁戊午扣家家有三口逢患在秋中少皈多咨咎髙低皆得收荒災近末後此歳是豐年人民得自守巳未裏畜養逢災厄五馬博一牛定知其歳後粮儲可散求田中得薄熟雖乃逢斯難不至懷苦憂庚申年稻榖出髙田夏中有大水低潜被蟲煎莫誇苗艶秀濠楚亦如然低源勞種植中髙甚可憐辛酉後中田將可守有旱損髙源大水淹湖部早稻被風災偏苦呉門口髙低未可安中平的應有壬戌中髙低盡不同春夏應遭旱江南船不通秋冬定有旱低地好施功髙田徒種植終是見蒿蓬欲知受災處揚楚及江東癸亥周呉分坐無憂中田最可託低處不須求嵗後青龍伏中平並可求秋冬雖有旱逺是得全收爾時天尊歌詠災福偈頌畢明羅真人及諸仙衆各整威儀同趨作禮臣等宿縁慶厚得遇慈尊宣演歴劫福元告示循環災數決開昧目鑿洞愚心欲令未劫道民預防凶嵗臣等不勝慶幸感戴生成之極恩天尊告諸仙真曰吾適來所頌亦未盡元尚有二甲之年輪流猶逺未可一時披宣泄吾機範今更示子妙法傳授有道信義之流取次凡愚慎無泄漏此一秘法預知一年荒熟安危五榖貴賤之由子宜鏤骨記録只宜自曉心委勿示兇狂無義無信賤徒乃爲頌曰正朝及立春宜先逢虎兎遲在三四辰不可出初五得合此限期榖賤民無苦若出七八九十中米貴年荒兼少雨天尊告諸侍真衆曰吾賦此偈頌乃欲永示我徒預審凶年荒歳則以積榖禦之若遇災殃分臨則乃展吾禳祈之法可於孤峯絶頂或則水上山間不然古跡靈壇亦於公庭蘭野唯在清淨之地絶穢汚之坊乃按三洞嚴科建壇立纂若爲國王台相州牧縣宰則乃装三級靈壇開二十四門列十方香筵祈告三清大道太始五老帝君三元官屬四十六洞天神仙諸靈官名山大川淵澤祇靈盡心竭力設齋三日散壇大醮一筵亦乃逐其物力豐儉轉念召龍經典拜奏黄素表章或則志道口奏表文唯在䖍苦師道勿請脫略俺俗賤流一乃慢於諸天真聖二乃輕侮官吏士民徒役群心虚消衆物𦤺使祈求無應兼獲隂罪非輕行吾典教法流宜須驚懼是時明羅真人及諸仙衆獲聞天尊指示豐儉災數兼蒙教誨禳禱嚴科各整衣冠䖍誠叩頭禮拜諸真上宰各鳳輦龍侍從天尊還陞玉境所在迎候靈祇及於聞法衆一時還復本位矣太上洞淵神呪經卷之十八
