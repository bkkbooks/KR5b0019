front:
  text: 太上洞淵神呪經卷之十九制九
  hash: sha256:54a532b938ce4fe3e34f345fa971b44bb8c413075eb8ea8441c923764c253c5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_019-001a, image: hfl/0173/0173-052.png}
body:
  text: 諸天命魔品元始天尊於大福堂國土長樂宫中與無極大聖飛天神王俱坐七色寳藴之座度洞淵神呪大驅經召十方三昧神呪王飛行玄妙天真大神俱詣座下天尊告太上道君曰頗聞大極樂福堂國土十方邊界有鬼魔妄生侵害衆生男女常聞悲苦之聲否道君曰此境七百五千萬劫是極樂世界無有悲哭之聲自龍漢之後百姓男女之人皆生兇惡殺害婬祝向諸神魔妄求生活自覺以來七百五千萬劫百姓貧窮困苦人形衰老疾病是男是女皆同一心諂求邪鬼六天故炁承九醜木精妖魅入心心生兇逆殺害無辜邪神轉盛是時天尊告五老上帝召命十天大魔三界主者太上真神大兵億億萬衆收取世間一切脫籍之鬼何者爲害生民𦤺使國土無有太平生民多債生死而無安樂者矣三天真王與十方神真三天大兵遊行國界爲一切人治病佐天正炁殺滅邪精救度衆生之命俱得道力全其天命自今以去若有道士伏從三洞受持此經將法遊行天下有病爲治令得蘇息無有夭傷若有一鬼不去者見此道士治病爲作惡者我遣九天大魔王兵衆次次縳著誅其黨𩔖令絶他方矣道言三界之中自今以去逆絶後劫偏邪之地逆起隂炁濁惡之世便即易興淳朴既䘮僥浮競作下界四天八方自號神王之魔名爲天神濁惡之世遍於下土四天之中山林石精附著生人男女皆相倣斆自號天王并及六天故炁鬼與脫籍世間之鬼共相群黨支流散釋隨世立名作萬民之災令人禱祝諂求扶衛背道信邪供食祈福其鬼轉盛蛀人精炁食人血脉滅人年命人不自知入人身中令人惡生愛死如是之鬼萬萬億衆蠱魅男女若有道士經行之處爲救此病是此之鬼我遣十方大神五嶽使者三十萬人爲道士佐助治病自今以去甲申壬辰天下大兵起疫鬼殺人十分殺九天下浩浩百姓困苦國主不䘏天下三十種病不可治若有道士伏從三洞神呪經者我遣天神大兵下佐助道士治病當請三昧神呪大王領赤卒兵金甲兵士十萬衆又請九天伐殺將軍四十萬人又請青甲兵士四十萬人又請赤甲兵士四十萬人又請白甲兵士四十萬人又請黒甲兵士四十萬人又請黄甲兵士四十萬人又請禁忌殺戮大兵四十萬人又請青天大吏四十八萬人又請赤天大吏四十八萬人又請白天大吏四十八萬人又請黒天大吏四十八萬人又請黄天大吏四十八萬人各各領兵馬億億萬人手持三甲殺鬼之具佐助道士治病有一鬼敢行惡毒及有惡人施其惡心來向此道士者一一斬殺令人鬼無他以明大道神驗矣道言道士若有隱山谷或在人間當一心救濟百姓危厄困篤者爲其轉經行道一日三時行道轉經一日三日訖當即爲中庭北向上大驅除寶章一通并佩九天大籙神符絹素書之佩服神符令病人速得瘥愈人鬼無他一一解除了了是諸鬼神各各爲道士收瘟攝毒助其道士救病來焉道言自今以去若有道士奉行三洞神呪經不佩大驅經者百魔不伏神不助人治病不瘥自今若有道士一心奉道志在三洞受此三天大驅經四鎮大符伏一切諸鬼天下魍魎見此道士得行之處萬鬼奉迎敢復爲害若道士轉經行道并勑人口勿令閙語穢詞皆令九十萬收攝大兵護道士佐助治病不可犯矣道言自今以去若有道士轉經一宿說此三洞大法驅除大經魔害披動妖魅䘮精法雷聲皷天兵整伏流火萬里火鈴奔星殺戮九醜斬殺妖精掃除瘟疫病人得瘥人鬼無他遷汝等千等萬等急急如大驅律令三天真王告百姓男女若能一心奉道志樂三洞受持此經於家供養大驅之日恐鬼兵横枉殺戮大劫之運但近人鬼不能自分異也自今以去若有道士志專感戴日月荷負星辰敬樂真道佐天正炁可賫白素四十尺金環一雙五綵五尺降真寳香於清淨靈觀山澤之處置壇醮五帝三昧神呪大驅神符赤黒二炁四鎮大符鎮泉中自乾封泉水絶封山山崩封河河竭封火火滅封神神絶封鬼鬼滅三天禁忌一切伏藏若自今以去有道士持此大驅神呪符之處我當佐助道士治病收一切脫籍之鬼付三天之獄治罪以明大道神驗矣道士治病當轉此經行道六時啓露當朱墨絹素書神符大籙當與病人佩服鎮壓一依經科道士治病自作一心救人急難不得責望資價以爲所貪天削道力有何仙也此符有五帝大魔兵馬三洞天兵九十億萬人守衛此符若道士不受此符百鬼千魔不懼若佩此符文者萬魔朝焉諸鬼稱善合衆稽首各請奉持矣道言大劫欲至三災刀兵瘟疫水火垂近壬辰之前水流萬丈鬼兵殺人疫病衆多不遺一方吾今領諸天靈妃十方神真三界官屬往世間救一切衆生疾病若有一奉道信樂三洞經者受持神呪三昧大驅符契者得在九宫之中三龍之後𥙷爲天官玉暦之中脫免三災九厄急急如大驅律令道言三界之中有神多魔魔王多饒衆毒殺害衆生不懼天威自今以去我隊頭盧禁兵億億萬衆又有五丁使者九十萬人又有三天禁兵三十萬人又有赤丁吏兵四十九萬人一合來下爲人治一切疾病若有道士伏從三洞行道轉經救人當先立一靜室畫五帝真圖三洞無上真容建立三洞道塲廣爲世人消災請福除禍却殃若有男女賫香來向道塲請爲治病者當爲隨其貧富建齋醮祈設五帝之神當與佩帶神符令得病瘥者我遷汝等魔神千等萬等矣急急如大驅律令三天天女及十方綵女諸天靈妃各執召魔十絶靈幡瓊竿寳盖驂駕龍鳳來爲一切衆生布行三天正炁令世間之人皆生慙槐念我三寳歸向大道過度甲申得在玉暦之中脫免三災九厄汝等疫鬼行毒不殺衆生普得安全無有中傷自今以去若有道士發大慈悲之心憐念無二一心奉行三洞救人我當助佐道士治病救人若轉此經之處一切鬼神皆生怖走矣急急如大驅律令道言自今以去世間若有道士奉此經歸向七真佩服神符救一切衆生有疾之身當與神符佩服章表醮謁五帝之神令得疾病痊除三災九厄之中得度若有道士捨除俗累一心奉法志在三洞救病減割衣食捨諸財帛散施貧乏濟及衆生天神地祇建立功德立見真道三天主者爲道士佐助行道是諸鬼神皆生怖懼不復更來殺一切人民我遣大驅魔王次次斬之急急如律令道言自今以去若有道士國主帝王方伯二千石令長有一人信經奉我三洞承受妙炁令人昇仙上仙之人修奉皆生羽翼而能飛騰自在中仙之人修奉皆隱没自在下仙之人修奉皆能驅馳鬼神矣爾時三洞真人昇仙逺聞十方渇仰四天之下一切男女燒香叩頭仰天弘思願得大道降臨于世慈光普潤君臣用道興隆相扶天下太平恒居禄位道言自今以去甲申壬辰之年疫鬼九十萬人下布天下行萬種病病不可治之若有奉三洞道士爲轉經行道三五辟邪之炁收縳此鬼斥逐他方和喻家親丈人社竈之神悉得無他若有疾病時得三洞道士爲轉經行道燒香然燈懸綺幡蓋散花六時讃詠停散之日醮謁五帝五嶽四瀆九江水帝十二溪源洞窟龍王諸官及諸天三界威神眷屬下至六道四生幽㝠一切悉生慙愧斥逐他方矣道言自今以去若有道士伏從三洞行至國土有病之人爲治當請召三天禁兵都司吏太上真神十方主者十二掾吏九天捕邪使者收鬼吏捕姧吏逐鬼大魔赤都使者天丁力士領諸眷屬四十八萬衆下與此道士佐助治病焉道言是諸真仙天男天女靈妃仙童聞說此經將畢一時稽首作禮信受奉行斬鬼獄神符黒書絳囊盛之佩頭上消一切衆惡符白素黒書佩頭上道言道士當書神章投泉絶厭鎮天下百魔之處不問大小轉經行道并上大驅殺寳章口啓吏兵爲此符朱書太上洞淵神呪經卷之十九
