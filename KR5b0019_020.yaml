front:
  text: 太上洞淵神呪經卷之二十制十
  hash: sha256:0b3f16acc7908219b9abcb54dff3a1bf10d005306694713e1cae271883db1efe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_020-001a, image: hfl/0173/0173-076.png}
body:
  text: 長夜遣鬼品道言吾昔與文始赤松子將諸梵王七十萬人遊乎世間五嶺之郊見刀兵而死者不唯一人太上愍之遣化人道士往問之子等何罪有縈斯苦各各答之曰某等受斯酷毒罔測元由唯願大慈賜垂宗旨化人曰叱叱子知之不大劫將近水來不久一切民人當與泥同如此之徒不唯一人也子何不學道乃長存耳子貪富貴一時之間不得仙度萬劫不見善根與天地相蔽與災為期也世間不淨五賊牽人令入惡道喪人神氣將人入淵一舉失意悔無及焉太上説此之時坐中三萬九千人天女十萬人地下化人二十三萬人道士及魔王男女四十九萬人一時驚起求受此經自今以去奉持此法教化愚人令不貪生官不用王位各各自誓我等今日聞天尊所説復用行之不敢違背也各各脫身衣以用受經矣道言世間人民末世有三萬九千人得上仙者乘太上九龍之輿天人三億萬人遊行國中接有仙骨道士當爾之世大水一起鬼兵亦交男女之人死者衆多吾今特遣化人遊于四海令悉各各備經奉受大驅之文被厄示之其中自有信心者聞之歡喜求化人受之其中有不信之者聞亦不悟浩浩泛流流入九江三河而死盡奈何太上於空中乘五色雲輿觀之大慈念子等之愚奈何奈何以濟之也及乘龍將天人一切聖王五嶽仙人百億萬人於大水之中接取信心之人令人無畏大鳥負人將著九天之上乘龍之輿縱廣萬里乃有二千九百里者有千二百里者輿有八億萬輿輿上容三億萬人自不受經者不聞法者不經齋者不識法界之人不得上此輿也大水將來化人雖接棟神司官斬之檢取罪人還置水中太上至聖能救之也飛仙男女亦佐太上度人焉大鳥千萬一時亦來負取善行之人汝等道士今見此大驅經并聞太上觀其形像子等後世果得遇其龍輿耳聖不虛言矣道言此仙人玉女先天地而生生來多劫今與吾共教化愚人若有仙骨之人得見形像耳子等以復能各各傳化後生若男若女俱共受者終不橫死大水之時不在其中也大衆聞天尊説此悲思涕淚悉求受持太上愍之令化人入山作壇受之衆中男女八千萬人魔王男女不及還取質信各各詣山受之矣道言汝等受此大驅寶經經中之要子等仙矣勤相化度傳受愚人愚人倒見甚可哀愍來世大水將沒之耳聖人見愚人悠悠生活亦如世人觀厠中之蟲耳亦不知出時也汝等道士不化之者永沈生死矣坐中大衆五嶽仙人一切四部天人男女皆齊聲歎曰善哉我等亦當奉持之矣道言北海之外異鄰王國土四十八萬家不信道法殺生自用國內不安萬民亡叛日殺三百人太上見大水將近愚人不知方作殃罪死入惡道何有出期乃入玄山觀一切衆生悠悠何所趣向乎即放身中之光下照十方遣十方化人乘空飛於異鄰國土王等見之心中大驚此人乘虛此何物也非是妖鬼乎即遣三萬人一時仰射之箭却來自中殺人人還自活官不能得殺之遣人白王王大怒遣兵士三萬人殺之不能得殺飛仙來下滿其國中國中滿溢俄為女人童子老人變身萬億王大怖懼叩頭向飛仙曰我等罪人不知大聖降下自今以去奉仙為師矣願垂納受仙人曰我等不中子師也我自有本師名曰天尊若汝等有此心者當與子等往白之矣即將此國王等詣太上化人於是一時去王國中肅然無人王等曰此仙人大聖人也我等當更心奉之耳化人知王等之心悉化王國中人各各受道與其符籙經契亦作齋法今北海之外道法興焉王及大臣馬玄曰夫受此經奉師如何化人曰受此經者奉師如日月敬經如珠玉不得慢經不得輕師師如天也經如日也天不可毀日不可觸矣升仙度世皆由於師耳無師又不得此經無經者不得上仙也子等奉師不得令懷嗔隔一宿不得説師名諱道不兩相敬奉不得違心若子不從之頭破作七分矣道言大水來時中國有仙人唐平仙人玉光仙人馬期領八萬天人仙人乘鐵船來接道士有經之人子等候之此仙人等來時上有五色之雲圎蓋長三百萬文中有玉女十萬人光明赤白晃晃育育即是仙人來也汝等候之焉東林道士曰不審受何經得見仙人免脫三災也太上曰上清靈寶三昧無量悉亦免耳然道士不受此大驅經不得度三河大水亦不免運劫之災也何以故此大驅經經中最上此經三十六部經經之王也更無大此者也此經經之都統受此經經之畢矣道士男女自非先身有其仙骨方得受此經也此經與無量同胎若欲法用一一如無量之法耳欲得仙騰當讀無量寶經道士不受此無量大驅經者亦非道士也坐中八萬四千人聞太上説之各各三禮求受奉行之焉弟子等自今以去持此經遍化天下之人悉受者乃門門化之耳道言人有三魂七魄死便奔驅驅於五隂之中是以死者有吉有凶春三月死者太陽使者殺之名屬九夷君九十萬大神選之其號威㽔星宿當滅復連自絶行禮入定十錬生尸七魄無為不經五苦得升泥丸依禮元方天人所護分别善惡若人死後有人轉此經者大神八億萬人超其死魂還令生天若在人中侯王長者衣食自然不令經苦及有作此齋處天人玉女八億萬人仍下視之道士功德生人獲福亡人上升斯由追齋之力道言夏三月死者乃是洪林太隂司命部落殺之名屬八蠻君八十萬人選之星宿當滅復連永絶有人死者自今以去有人轉此經處亡人不遷不得生天人中者吾當遣光明仙人大輪仙人謙之仙人方生各領三萬九千天丁十萬力士打殺魔王選官主者十錬大神不使上逹常為小鬼中之卑永無仙期太上金口所詔令一行告下不恕如太上口勑者汝等小鬼王必有上遷耳若自禁令以行行而不用别令橫殺大神九十萬人各持赤棒棒殺惡鬼五道衆官十方選神宜自利比不令亡人更有上聞上聞之日汝等先坐太上金口終不容恕一如太上至真所説悉從用者若不用者魔王鬼王頭破作十六分矣道言秋三月死者乃是六傷大疫水火殃災殺之名屬六戎君選神六十萬億人名字自生天中星宿當滅復連永絶自此月日有人死亡及轉經五道選官十錬生尸不得上天者坐兩舌惡口劫人殺人五逆不孝欺師罵父打捍長者若兄若弟若姑若姨若伯若叔等悉入地獄九十一劫不得生天天人典官不容之也雖為轉經無益矣罪與謗人者同道士須善當自化人奉受三洞敬經行道若有亡者為之轉經經神勑下亡人上遷徑上生天自癸未辛巳道士化人度人焉可得免三災甲申之大水也道言凡冬三月死者明詔使者殺之坐不行道法笑人作善及怪百姓自是非人三魂七魄名屬五狄君選官五十萬人分别善惡星宿當滅復連當絶自今以去人死者為錬神錬神之君八億萬人令亡者生天天女迎之不得飛仙當得生人十錬生尸十方來賔天下共選不得下生若墮三塗魔王之過太山主簿五道主者名山仙官不加用意使亡人經難者汝等先坐太上口勑終不虛也道士化人吉凶憑齋齋神護身矣道言凡人刑獄死者文吏司主之寒熱死者明王司主之落岸樹死者焚羊司主之刀兵死者祫人司主之木索死者女羅司主之水中死者玄女司主之火燒死者天輔司主之林木死者何王司主之飢餓死者孟盈司主之臃腫死者季膺司主之針剌死者龍王司主之夢忤死者林玄司主之閉塞死者劉史司主之悲枉死者左任司主之顛狂死者丁苟司主之自剌死者朱令司主之入水死者胡純司主之長病死者喬秋司主之自今以去若人如此落十八司死者但轉此文所殺之官聞人轉經經中之神神自分别令人上遷亡者自生人中也自壬午辛巳吉凶悉轉此經耳道言人生皆屬角亢氐房心尾箕斗牛女虛危室壁奎婁胃昴畢觜參并鬼柳星張翼軫魁𩲃𩵄䰢魓𩳐魒若星宿有名自有將從萬億𡵯數里陌太上今矜衆生故示一切大鬼王自今以去若有人家能作大福轉此經處急分别令亡人生天衣食自然若在三塗拔之令出星宿不度當為度之星宿不滅當為滅之若復不遷復連不絶者大鬼王等先坐一劫選官五道主者太山主簿悉當有罪罪必成科不得上仙矣道言凡人巳死不及三七日者十年五年百年皆可追作功德耳但為亡人十錬行善行二五七九立功輔過若先亡人無籙亦加籙與之天玄黃書此乃大經統受此一契無不包通也生人無大籙者亦可受十將軍奉佩天玄黃書契令便可受三洞耳來者與之不間卑賤何以故大道如海海何有逆於穢惡哉大法無邊大人無異道士化人慎勿相妬相妬者天人奪子算矣道法萬品智者弘念之耳道言自今轉此錬神之處吾令天兵九十億萬人與十方力士八萬人仙官主者十二萬人玉女三千六百人各各手持赤戟打殺天下惡鬼殺天下惡口之人辟斥縣官盜賊一切白衣圖謀道士欲偏併侵欺此法師之者一一收其人生魂斬殺之不恕道士勤化人大魔王鬼主一切主者選官之神當為亡人追逐文書若在三官謫作苦處悉當告下出此亡人令得生天若其不遷亡人三塗吏兵有坐自今甲戌之年世間之人得聞三洞之音男女道士多有值此文者悉皆天上生來耳世之愚人不得此聞之也道言此錬神經經中之上者何以知之乎此經神一字三萬六千神神聞人作齋典齋神四十九萬人與太初玉女八千人東嶽仙人十二萬人來選亡人亡人上升生人得福道士自今有奉此法得受此三洞之要教人受之者即自入仙品也自壬午年以國王大臣方伯二千石受此經者悉先世有緣骨應仙仙人來化故令此人等信心自生得見大法師善哉男女必得上仙終不落淵矣道言若人死後有生者為作功德亡人必復人身人身既復自上生天生天之後復入人中衣食自然若處世俗為人之師若作道士學道國王尊之為師不作常人若作國王方伯二千石令長心常念善勸人行道身自奉法三洞之經尊師敬神恆如日月此人今身大貴傳世相承無有休已子等今身端正亦是大道覆之富貴貧賤亦是大道使之為之醜惡亦是道氣耳但一心信道道不虛言坐中億千萬玉女聞説是法悉大喜悅各各三禮當化人受奉之矣道言凡人學道道氣至深自不覩之當信經文經文道示無經者世人安知道哉經為人目目能逺視分别青白善惡大小無目不知也經文亦復然矣道士之學先當存信信乃有經耳當次奉師師能導人聖人玄逺隱形不見唯當奉師耳為先有道緣乃有師故故令知道學仙行道作齋一一念師天人玉女自然助人善心矣齋法一日二夜三時行道也道言昔有一國多有虎豹道中食人時有三洞道士男女之官入山採藥還道中見人問之曰道中無虎也行人知虎在道中誑道士曰無虎也道士等往之虎化成鹿見道士不驚亦無惡心道士等聞道中無虎喜而急去天人護之知行人誑道士心正天自遂之覆護耳是以道士之法但立信心信心存者自然附人耳是南海焦買將八十人入山求仙居山七年天下惡鬼日有百萬人來下試之道士大衆等永無恐心我奉太上無極之契何汝小鬼來恐我也一存信意無移易鬼自然去道士等天女化之後悉得上仙矣是以道士唯存心信耳此西晉惠帝後司馬氏南渡江時事道言甲子之年六夷侵於中國中國無主司馬移度吳地江左自立為帝後金刀兄弟王治天下太樂人民翕翕四夷無事至辛已年小小六夷動亂亂至壬午癸未紜紜甲申有災災水四十丈若無水者多是大兵虜當南下而無害九州悠悠會真君金刀之末帝移治長安之地地不受人也當去之時土人先去僑人在後自然天氣非人意也道士玄門國主敬奉道法欣欣六夷亦伏中元更立明王治化無有刀兵惡心之人矣流居之民邏復中都天下安樂唯集太平也西晉永嘉至宋來𥘉時事巳應訖道言壬午辛已年有見道士入山斷榖休糧以求仙道又見道士不貪世榮追師勤苦以求仙道又見道士不務俗緣一心奉經以求仙道又見道士不妻不娶以求仙道又見道士專心自役為臨執若以求仙道又見道士不食供養供師以求仙道又見道士不惜財物廣造經像以求仙道又見道士多受契籙以求仙道又見道士棄妻不仕國王以求仙道又見道士日日勸人以求仙道又見道士廣造治靖以求仙道又見道士奉師不慢以求仙道又見道士不作有為以求仙道道言人行道奉師師前臾卧踞坐見師不驚調誑師徒十無一實若此之人令汝虛耗天人誅之不盡天年奉師當如臣見天子豈可憍慢人不有輕也師雖常人鬼神之主汝以奉之神來附汝若汝不敬師師亦不待汝敬也但師有仙靈營護之神神怒誅人所以汝等道士深自慎之矣道言自今至辛已年當有赤人赤人長三尺七寸三億萬人居東海水中亦有學仙道士南海有八十萬人人身長九尺亦來入中國受道時人或不識之矣水人在海中曲山上亦有男女居在水中時出九曲山上有學道人多端正天下無有此比矣水中人王三百夫人夫人悉受道法天人玄女之仙化之三洞大經布流於西海亦有人長一丈七尺亦有夫婦之道行道異於中國之人矣王方平麻姑日日往彼化人此國亦有水人身長一丈六尺多有女人少有男子王身長二丈九尺及三千夫人各有三十六王子不食五榖天人亦往來水下作金玉七寶之室人身亦衣金玉七寶之衣也中國人得亦不能别之行則乘風而駕兩亦有自然之道氣矣此之水人等居在水下水在上流耳海中大蟲非世人所知亦有大馬大牛如大馬人頭百億萬種不以一物也無可比之者矣世所無此也道言世間人有三十六種人也東海外九萬里赤月支山山髙九億萬丈上有三頭共一身身如蛇也不食五榖食人蟲鹿鳥獸人身能飛行南海外三十萬里有竹山山髙七十萬丈中有一角人人長六丈七尺亦食蟲鳥草木耳語不可了西海外七十萬里人長五尺食石沙水語不可解北海外五十萬里亦有一山山髙二百丈山上有人一身三面人長九尺不能食榖食草子耳不知人事有隂陽夫妻之氣生子如人而走及飛鳥虎狼畏矣道言此水人三千年乃死山中野人三百年亦死耳不知有道無有禮義矣正有中國之人知禮義耳中國東西南北十四萬里人人知法學大道有自然天人往來耳餘國無有此也十方無量國此是異國不同小小國聖人所居自非太上仙人不得往彼也元真仙人曰何國國為幾里是中國之次也天尊告太上曰中國長安是也東至海隅南至吳楚之外郊西至罽賔北至沙漠悉是中國之名也然今之人禮道正有中原吳楚蜀漢建業洛下之人耳男女信法荆楚江夏南陽周地為上矣蔥嶺西涼北地玄菟之人少學仙之人矣道言天下之宫杜陽宫為上武當山其次中國有九十萬億宫宫有七十萬小宫宫中有三千萬人山上有四十九山中之上者杜陽山山東西千二百里山可住平休旬暘谷入二百里可隱昔有法師往化道法三洞流布旬中有應飛仙之人籍超杜玄之邢彤法李馬進張奴劉石子貴此之等悉上升為師矣仲山有古人住處今人名曰詳川周惠王小子得仙宫在其中其中人多有得仙者道士後世人得值見此法師三洞經者悉得飛仙也此川人後世男女亦多有道士值遇聖人耳何以故古之仙人董玄可居在其中得仙久矣時來化人人民信道者此仙人等教示之耳道言後世有三千道士海中來鳳凰百眉宫宫在西域北山中伏羲之弟居處也伏羲本居仇池山上亦在西域牛山女媧山亦是古之聖人住處在詳川周時有三萬仙人居此山上道言雲臺山岷玄山綿竹山赤石山龍和山寧蜀山山上有古人仙人住在蜀中城都人壬午辛巳三洞為上汾陽山巴慜山上五山在巴西梓桐山也多有古之仙人居地林窟道士後世門門悉是玄女玉仙所化日日往彼化之法師矣行十方出浮山巴山建平山有仙人七十萬人隱矣道言奉道之家三會之日詣師不得闕也凡三會詣師皆賫天租一碩不得一勝少也庫倉吏考人令人家中不利六畜暴死所為不成此天下毒疫耳三會詣師香三兩以為常事凡請師亦有法禮調御不得空也若有疾病急疾不論供敬如父不得有慢出一宿亦拜師師止則止耳道士坐案治職無貴賤也參座考問無復後殃集未恕鬼也若受經多而治小多經者為大也治大無經乃小治矣道言受道奉法之家當供肅天租年年自輸詣治自當憂之不可令師道也天人誅汝一斗不足師啓天曹主人還受殃罪不豫師也世人愚癡乃反怨師師不得亦無罪也一一上聞者令汝道民不利耳夫受道及經亦然但不能一一如法也不可虛也世人多窮不肯自力但望虛得聞師多責案法科令無能受者此為自欺人也道士心慕道門者當自勵力求信物令備具從法心中元元師可為除之耳不絶然無也道言自今以去天上黃書契令并經為上不復受者今世黃赤紫府也有不受者考氣近人矣何以故三洞流布令人有病急但喚三洞道士入治稽首燒香香火消之自然萬事散了耳不須章也天曹上從壬午辛已年不受人章為世人作章主人考死師亦有罪作章一通隨事取生人口中辭語三師若八師五師若一師上治東向貢章步虛詠誦便止自然鬼兵消憩亦須餅果麵食扶章也自今以去一一扶章禮畢再拜道言夫人受籙符契一將軍已上悉應供養乃受質信如法一一不得寬也天上黃書八人食耳治以經都通作者十二人人食此為常範矣世人不知多作無竒也道士作福日月作之齋講為先奉師在心若一旦不如法輕慢於師師慢不終月旦十五日朝拜謁經禮其十方并禮師者妄行一步步有三十六考罪罪入無擢地獄求出無諧莫望仙道也道言自今以去辛己壬午年三洞流布布化天下天下之人不復章奏男女奉經入山者衆女人多受經天女化之甲申過者道氣方盛六夷伏信諸仙亦同法一家耳道士自今壬午年以去亦作冠褐裙帔三法衣䇿杖耳一日一食過中不餐斷一切葷酒亦不嘗教化俗人為事不得犯科男女相度智者為師不得畜生生之物正乃然一身耳經書為業入山中人月月長齋齋空食菜耳入山十人三十人百人一處廣作田植園菜五果屋舍四方并齋堂樓閣不得一人二人三人獨住鬼神欺人經法不可獨齋堂人多月月三齋日日三時上香禮拜十方此為神來附人矣二人一人獨在山中復不立法建齋直獨在山中蟲鹿亦在山中耳此為何異也當奉明師師多才技又多經文乃一人上可佳多多遂上十人者不可住也況復二人五人也此不伏山神山神欺人人亦不吉矣道言人以黃書受來經久不得師過度日日有考令人多病田蠶虛耗宅中不利不終年壽中道而夭又復不可還師符契神巳入人身中臟腑故令人疾耳若奉法行道三師度者無他也道士受經經為大者升仙之本是以衆師之中經師為大也仙人玉女莫不敬經師凡符契為上也道士不受諸符契不名道士也不奉三洞非道士也空受內外黃赤紫府小小道士耳要當受五千文經書上符契事事受之乃得上仙矣道言道士入山若人間奉師師死者往塋視之葬埋以禮衣帶如法七日哭泣便為作齋齋者七日一作之滿三七日便止耳弟子死師亦看視如之法不可殺生祀之也隨時餅果可耳道士後世之人按經文用之焉不用者天人矣終不與死也餘物悉與之耳道言後世人必治三洞之上原值此飛仙經者即見太上面像也不能入山者但逐延林山可逺世人十里五里絶别之處多種五果木林田圃月月作齋齋令不廢化度愚人令奉三寶師無大小奉尊則貴昔羅和年九十八歲師年十六歲日三度禮拜師侍從左右恭敬不慢世人見之歎曰此老翁翯首西垂之年乃向此年少小兒拜也天人玉女曰此是老翁宿世之師耳小兒雖小智深逺矣道言師徒弟子先世之重緣亦如父子耳皆是先身相逐一處來久結誓纍劫非只今相親作惡緣者亦復然也若國主大臣方伯二千石今與此道士學仙善者亦先世緣耳自不重緣不得為師宗父子矣今之聰明樂經耽書皆以先世習來久也師徒亦耳共同一心積來久矣誓為師友以見此經今乃受之受之智者此人先身以學來故也時不知世之事謂其人聰明此亦明矣然伏讀來久矣道言後世多疫鬼鬼兵殺人道士可教人八節日齋一村共作之多多為善耳立春日春分日立夏日夏至日立秋日秋分日立冬日冬至日正月十五日七月十五日十月十日大齋日也道士此日作齋按大法學仙士三日三夜轉經行道其福無量也道士法自非師徒大者為兄小者為弟不得稱僕也生鬼誅人道士慎之焉欲八莭日齋但擇野水島洲之上清淨簡寂之所一薦也道言自壬午之後以來復奏章不復受世間黃書契令天女所受無門而受自今以去至癸未之年甲申過者不復用問黃書契令直此天下黃書耳若正受世間黃書者不得上仙若男女之人先無仙籙者但與十童子一將軍巳上便受天上黃書契令三師若一師之亦是大道士也便可經契耳世人不知大水來近不肯受道大災之時奄然死盡奈何奈何若不能多受者受五千文化胡經亦善矣道言自今以去至壬午辛巳有女人道士多有受三洞入山者亦多女道男子反少也玄女常下來化作年少女子入人間受甲申之後男女十三巳上悉受十將軍童子天上黃書契令何以故世轉信道麻姑杜蘭香與安期生唐公房化人悉受道士門門有之經書為上齋講日夕多矣江左吳楚漢秦蜀郡多有習道之人矣道言三洞出世仙人日下道士男女當勤經契多受符籙一心信善念師功德供養道士道士無貴賤有請消災香火不得有違一旦也道士自有吏兵侍衛不得一旦一夕有違吏兵當告人愆過天使吏兵違人夜去身中吏兵還自誅人亦令人疾病病人久考令人不健諸色夢𥧌不吉吏兵為之也昔有一人女官人請消災誑人言曰我今日身中不淨不可入治不得消災也誑人之罪後二月日女官下血三年遂不消瘥卜師占曰汝有罪罪甚大天曹考汝耳女官自思惟正有此誑人恐必此罪也請道士作齋懴悔一月耳乃還瘥矣道言自今以去告後世人汝等受道夫妻對受不得偏也夫受黃書三師過度道受黃契不過身考後世不復人身也況復求仙也亦不得誑人也奉道不香火身必有考考及子孫昔有二家相近都悉受黃書內外大契一家得三師過度日日行道道士消災觸事好日不違人意夫妻上仙天人護之有一家亦受而不過度而無三師自共相妬嫉遂不行道不終天壽二年中皆滅門族天人誅之矣受道須一一順其經文也道言世人多癡夫妻共奉道奉道以妬忌不合行道道氣吏兵怒之後死死入火車八風地獄中一日三死三生七十萬劫不復人身脫得復人有人之形無人之情聾騃瘖啞為人形醜陋身體臭處人不喜見道士慈心化人逺此弊矣道士粗衣蔬食寫經多學奉師為事耳教諸後世男女道士明自思之也道言道法難值值者稀耳後世見者勤恭奉之不惜財物道士為人之師亦不足多取人財道士欲奉佩所望期仙亦不可貪惜矣自除妻子其生口牛馬勿足貪也昔日亦有妻子布施賣子受經者不唯一人也自古及今信道者一人二人者矣道言三洞大經經之上者然不如飛仙經之上也何以故飛仙經十方大道太上一切仙人玉女遊化世界化人説之中有無量神人兵馬守之有人受之者神仙護之無不吉利也後世辛巳壬午年以此經天下流行世人講誦勝於餘經道士齋戒多轉此經此經能令人飛仙也三洞多容亦有尸解仙住仙此經無也正有飛仙耳此經二十卷天人玉女十方仙人所共尊敬之矣道言自今至壬午辛巳年道士急化世人受道大災欲起天放疫氣瘟毒流行殺人為多惡人故也若有作功德者鬼兵别之道士至其年月水災之時勸人作治舍受奉三洞正經經契在身吏兵力士自然攘惡耳水來不久當在甲申甲申無者兵刀災運百姓紜紜後甲申大水蕩除當爾之時更立天地不唯今日之天下也道言世間多有惡人故三洞不時布亦少耳衆生可念與泥同流鬼兵誅之奈何奈何太上與文始三日三夜在玄都宫中惟念衆生生死何方度之乃入金匱之中取太上太虛經飛仙經二十卷付與太宗法師令得授世間之人也道言自今壬午辛已年道士往往有值此飛仙太虛經者上黨除文之申執當值此經文上仙矣女人二十六萬人中受經入山中也道言自今有人值此師師授此經者十方飛仙五嶽仙人玉女無極丈人一切玄女咸來共護此受經之人若此法師所住之處天下太和五榖豐熟人民安樂帝王老壽天人日日來下教授之助此國主治化矣道言道士之功德令如此耳若國主大臣方伯二千石復能奉受者位至無窮也天人自為守護之耳終畢此人等不令犯惡也衆中一切聞太上説此經各各大喜悉皆受化稽首禮拜皈依三寶太上洞淵神呪經卷之二十終
