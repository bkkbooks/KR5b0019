front:
  text: 太上洞淵神呪經序始一
  hash: sha256:c095baf87ee89d93945c960b89a06c07fd29e42127bbcda4b1f7b63b824fe088
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_000-001a, image: hfl/0170/0170-004.png}
body:
  text: 唐引駕傳眞天師特進檢校太傳光禄大夫行尚書户部侍郎崇真館大學士上柱國彭城郡蔡國公弘教大師金門羽客文章應制内殿供奉三教談論廣成先生食邑五千戸實封一千六百戸賜紫杜光庭譔西晉之末中原亂罹饑饉旣臻瘟癘乃作金壇馬跡山道士王纂常以隂功濟物仁逮蠢類值時有毒瘴殞斃者多閭里凋荒死亡枕席纂於静室飛章吿天三夕之中繼之以泣至第三夜有光如晝照耀庭中即有祥風景雲紛馥空際俄而異香天樂下集庭中介金執銳之士三千餘人羅列如有所候少頃之間珠幢寳幡霓旌絳節紅旗錦斾相對前迎白鶴交飛朱鳳齊舞又二青衣持花捧香又四侍玉女擎持玉案地舒錦席前立巨屏左右龍虎將軍侍衞官吏各二十餘人立屏兩畔如有備衞焉復有金甲將軍諸大神王等各數十人次龍虎二君之外班列肅如也須更笙簫駭空自西北而下五色竒光灼爍艶溢有一人執簡佩劒而前告纂曰太上道君至矣於是百寳大座自空而來即見道君乗五色飛龍蓮花之座去地丈餘有二真人二天師侍立焉纂遂拜手跼蹐迎奉道君曰子憫生民形于章奏刳心泣淚感動幽明地司列言吾得以鑑盻於子矣纂匍匐禮謝畢道君曰夫一隂一陽化育萬物禀五行爲之用而五行互有相勝萬物各有盛衰代謝推遷間不容息是以生生不停氣氣相續億劫以來未始暫輟得以生者合於純陽昇天而爲仙得其死者淪于至隂在地而爲鬼鬼物之中自有優劣强弱剛柔善惡與世人無異也玉皇天尊慮鬼神之肆横災害於人常命五帝三官檢制部御之律令刑章罔不明備然而季世之民僥僞者衆淳源既散妖氣萌生不忠於君不孝於親違三綱五常之教自投死地繇是六天故炁魔鬼等與歷代敗軍死將聚結成黨戕害生民駕雨乗風因衰伺隙爲種種病中傷甚多亦有不终天年罹於夭枉昔在杜陽宫中出神呪經授真人唐平等使其流布以救於人世間無知愚俗見有王翦白起之名謂爲虛誕此盖従來將領者生爲兵統死作鬼帥積功者遷爲隂官殘暴者猶拘魔屬乗五行敗氣爲札爲瘥然陽威憚之神呪服之自當殄戢矣今以神呪化經復授於子按而行之以拯護萬民也即命侍童披九光之韞以經及三五大齋之訣授之於纂曰勉而行之隂功克充仙階可冀也言訖道君及侍衛衆真皆西北而舉纂遂按經品齋科行於江表生民康乂疫毒消弭自晉及今蒙其福者不可勝紀在乎蠲潔莊敬惟精惟勤明誠感通應猶響荅若怠慢輕泄自惙罪尤修奉之人慎遵斯戒㐲況此經浩博元皇之金口親宣其理淵深太上之㣲言宻示若有𡨋心諷念精意誦持香炷𦆵然真靈立感神兵騎吏應時而電掃姦妖猛馬天騶隨處而風消毒癘今此重求敏手再啓勝因極彫刻之能盡濡染之妙冀施行之不泯俾流布以無遺願國祚之延洪更超周卜祝聖年之遐永克廣堯齡車軌混於普天正朔覃於率土賛大道威神之德助皇朝惠育之恩洪福玄休浩浩無極矣
