front:
  text: 太上洞淵神呪經卷之二始二
  hash: sha256:3877a2bbc547c151e72d57bb124f5827187c09944dd8fedd6f8e470ada4e01aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_002-001a, image: hfl/0170/0170-034.png}
body:
  text: 遣鬼品道言吾在玄都九重宫中爲諸大衆說上清中玄妙經時有下方世界大神通知識句民子八萬真人俱來稽首三禮而白天尊曰世間人惡不信至言今有三洞經出不知受之疫鬼刀兵殺害衆生衆生死盡故不求出弟子等常恒見之苦痛不忍聞之國土今日政有行尸之人無有道德之者君臣相殘父子相刑道士行道愚人競笑自牽入惡不務仙品大劫垂至亦不知之疫癘惡炁殺人略盡弟子等不忍聞見故來懇告是時天尊仰天長歎悲哉衆生不解大趣不㑹修心𦤺招災禍疫癘所侵吾今當遣天丁力士八億萬人天騶直騎八億萬人天禁大吏四十萬人天殺大兵四十萬人天蓬守士四十九萬人爲人遣此等之鬼汝等持此神呪經布行國土若有人受經者疫鬼自去矣道言自庚辰辛已壬午癸未年近於甲申之嵗天下乃有九十二種疫病病殺惡人自非有道之者難免此疫此疫令人寒熱頭痛目眩五臟不調心下切切鼻口咽喉謦欬腹滿氣上剌心手足拘急胸背徹腦耳又不聦黄疸癰腫身體赤黒五種下痢復有霍亂吐血鼻衂癰膿四肢碎痛節節疼痠氣熱驚走悲思恍惚中宵不眠四肢反覆口語無端妄見神鬼隂腫下㿗手足不整卒死失性如此之徒悉是疫鬼來殺惡人汝等若能佩奉三洞經法吾遣天丁力士令逐此鬼不撓子等水來不久汝等衆生速修善心受傳經法方免洪災矣道言自今以去若有道士心貪仙道不求世榮一切奉法志味三洞逐師入山人間教化如此之人吾當遣天丁力士四十九億萬人隨行覆護所行出入萬鬼不當告魔王等自今以去勤爲衆生遣一切疫鬼矣道言甲申垂至洪水不久今有疫鬼殺人世間多惡少善衆生不識真言三洞久布不知求受自招苦惱當復柰何衆生可愍我今遣八部禁兵祛殺疫鬼遣令斥去道士化人令奉三洞矣道言自今以去有奉受此神呪經者天上有三萬尉玄刃大兵覆子等身子等但爲衆生日日教化一切愚人愚人守迷笑人行善天遣疫鬼祛殺此人如此等魂俱入三惡道中無有出期矣道言辛巳壬午年有八千萬大鬼來滅惡人兩舌誹謗道法指師名諱評論經典不信三洞不肯受道如此之人大鬼王來共滅之矣道言自今以去若有道士伏從三洞行道救人之處吾遣九天大兵九十萬億衆一時來下覆護子等若有一鬼不去者十方力士即來收之矣道言自今以去有道士轉此經處矢令三洞力士四十九萬人六天力士八十萬人三十六天大兵九十億萬人一合來下共殺此疫鬼令生人有病之者官事之人速得解脫疾病輕差和喻萬神令家親歡喜中外社竈悉令分了勿使枉撓生人自非家祀之鬼一切禳之使永絶他方若有不從吾令鬼兵不去者魔王等各各當受斬斬之不恕汝等慎之聖不虛言矣道言此神呪經乃有三十六天魔王有七萬億小王名字在經上若道士轉此經之處三十六天魔王句盆子等七十二小王悉來伏耳是以有人能分末劫受此神呪經家中供養者一切惡鬼不得妄來何以故此一切大魔王遣力士來守此經天人玉女仙人百億萬人亦來守護不得有鬼兵敢妄來前後也道言自今轉經之處若有惡鬼凶神敢復施惡意來向此生人及法師之人者鬼王等及大魔王八億萬王自誓受三斬頭破作三萬分矣魔王曰自今以去若有道士治病轉經經行作福者當令所爲如意萬願從心無圖不果一旦違誓弟子句民等身受罪萬斬矣道言自今三洞流布真人悉受況乎愚人自今以去有人奉此三洞經者鬼兵助之所作者成所爲者合大魔王護之汝等道士勤化愚人若有受此三洞之師遊行救度人間若有急病道士爲之轉經讀此神呪三天魔王召一切小鬼王來助弟子之力耳道言道士受此神呪經不與餘經同受别自單受此一部耳何以故此經中大魔王神力多故故不得雑受書寫亦别着一函盛之行來佩之萬鬼不近作齋者亦用無量科令矣道言此神呪經有一切鬼王名字是以太上重之有轉經之地一切惡鬼不得近人也自非生人所事家親親鬼丈人不得妄來中外大神一切魍魎生死之神男女之𦍙塚墓之鬼自今以去斥走萬里若不如令汝死萬斬不恕之也道言世有八萬溺身鬼鬼長三尺二分動有萬萬爲群在水中殺人不信道者善神不護亦枉死耳復有九十八萬種水病有三十二種黒病白病赤病青病黄病不可治有三十六種卒死此等病悉是罪人世人不行道法虐亂國土是以天下惡人聚生不肯念善天遣力士萬病誅滅耳若自今以去有道士施其功德建齋救人之處魔王等悉助此法師令治病瘥矣若不瘥者魔王髙隣子頭破作九十分矣道言爾等一切魔王若中國男女自今以去能有信道受吾三洞化行萬國爲一切人治病轉誦之處汝等爲化愚人佐助作福力廽風止雨勿令近之若能如此者遷汝萬位一旦背誓子等頭破作九十分矣道言一切神王及一切魔王等汝亦與吾無爲正炁同矣而乃汝等所爲各有異耳百分之中不如我一也汝等雖有大神通變又復爲吾弟子何以故爲汝等不習自然道炁久藴兇心處扵輪廽生死之域爲汝宿世有於大福故得神王魔王之位我乃位三天之上緫御衆靈爲巳宿劫以來憐愍一切如我所生我之法律能生善者能成善者能殺兇者能絶惡徒不但畜禽獸善者爲良今始有三洞大法流行天下國土善民往往有遇經法者若有道士治病救人之處汝等魔王助之作福令其所願保全勿斷其功德也若一旦違誓斬之不恕矣道言天下有大神多魔王爲久汝亦與我無爲炁同矣而汝等所爲有異百分不如我之一也汝等以㐲爲我之弟子久矣生死在我我萬民悉在天地之中多有不信道者今有三洞之法流行天下國土之人有值經者若或有道士治病救人之目子等助之焉莫今斷其功德若一旦違誓斬之不恕矣道言魔王八億萬王有小王亦八億萬王各各宣令自今三洞行處道士治病經行之處汝等共助之當令治病得差所作者成天人護之風雨有時不令有害若一旦違科不敬聖言縦其鬼兵令枉殺善人三洞法師妄有危厄疾病苦惱一切不如誓言者魔王烏留子等三十六王悉斬之不恕矣道言國土之人多不信大道有受三洞者汝等助之爲令善心恒生莫令善退汝等護之天人來助自昔以來人民病衆不唯一種千病萬病困苦頭痛身重手足不舉恍惚吐下赤斑令人氣病吾悉知汝等之鬼名曰慎憂哀子角兒平王阿信三業之人千鬼萬鬼急攝汝下鬼令生人病瘥若不瘥者汝等頭破作八十分矣道言甲子旬年有七十二種病長安索虜暴殺人民南楚喪失流分他國有二虜三吳合來争之江左賢相復佐天下天下不樂人民咨苦下人憂悲逰魂之鬼日來取人人民死盡其中一人二人受法行道者惡人共笑之是以仙人不出世間無有仙矣道言甲戌旬年國土之人共流江左紛遶長安蜀漢之中有赤鬼三萬唯殺人民爲人不信道吾常使董玄珂殷仲堪化天下愚人愚人不信柰何天今遣百二十種病殺人若有受三洞經法師來爲轉此神呪經文死人更生吾常爲勅一切魔王及小王等若有法師救病之處悉令禁却小鬼令生人病瘥瘥者令汝等得遷不瘥者汝等死矣急急如太上口勅律令道言甲申之旬年世間有四十九萬黒鬼殺人多有横死到子丑之期期日將至有大殺赤兵八十萬衆來取人民人民不知到壬午癸未甲申年大水來渰兵疫來集大鬼王蔣公琰共來殺人自今以去小鬼來侵病人者急去千里若復不去大魔王等頭破作八十分矣道言甲午旬年有三十六萬氐羗胡獠之鬼來殺人民赤鳥七十萬頭飛行天下人見者自然疫病不可得治救爲不信聖教故以病死矣自今以去國中有一人受經轉此神呪經文之處大魔王及天人來助令生人自瘥瘥者令汝等上遷萬等萬倍若復不瘥者汝等大王及小鬼斬之萬叚不恕矣道言甲辰之旬年天下九十種病人多暴死六畜災癘爲人不信大道有一人受經行道者愚人笑之是以天遣三萬九千大鬼來誅之令世人有病疫鬼多來殺人若有法師轉此神呪經者巨天力士八十萬億俱來助之若復不瘥令人死者大魔王先坐小鬼急攝汝下鬼勿犯良民一一告下不恕之矣道言甲寅旬年有六十種病死十分遺一也王建領之暴亂人民有赤烏之鬼自今以去有道士轉此經之地令病人自瘥若復不瘥令人衰凶者大鬼王先坐小鬼頭破作四十九分矣道言世間多惡人聖所不居時有一道士建三洞之法天人悉來護之自今以去若有病人危厄困篤之者大魔王斷其家𦍙小鬼令病人自瘥瘥者大魔王等上遷不瘥者汝等斬身作萬分矣世間有無極之小鬼汝等各各自去勿令生人死也若不用吾教今遣赤丁使者四十九億萬人悉來殺大魔王等不復恕矣急急如太上口勅律令道言壬午年十一月二十九日至壬辰歳十月三日有七十二萬小鬼王專行入人宅中行急疾病人悉患之李信李陵二人各領四十萬衆來取人命今巳知汝名汝急逺去此有赤殺力士七十二萬人斬汝汝不急走身破萬分不恕之急急去萬里矣道言道士之法以三洞爲先受此神呪乃得入山及於人間殺一切鬼賊不受此文鬼不畏人今有三千六萬暴鬼來殺人吾知汝名急去千里急急如律令太上洞淵神呪經卷之二
