front:
  text: 太上洞淵神呪經卷之十二制二
  hash: sha256:0d6e30e3fe5dde6caa3de73c378a8c57b5549de9dccb6573a118c3547e6a6892
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_012-001a, image: hfl/0172/0172-030.png}
body:
  text: 衆聖護身消災品元始天尊吿五老上帝九天神王十方至真神仙聖衆曰我嘗觀察三界萬有五道八門天人男女含識有性天堂地獄苦樂因果如聲應響倚伏無窮沈淪死生不能自出念之在心化道開悟使歸向者引入道源我往昔來常爲汝等三界五道一切蒼生作慈父毋億劫因縁恒相教導或復示現種種色身形名稱號音聲言語隨機感發和順化說三洞法音十部妙經建法舟船普加運載開天乗道攝取有心度脫群生出愛羅網摧破知見空有是非一切衆生生生自縛習宿因縁迷妄惑見飄蕩性情愚癡惽懵自蔽心識三屍九蟲不可捨離惡業報對自死自生久病長厄身心痛毒鬼邪精炁乗愆沈結若欲除遣當觀巳身起滅根本善惡進退滅念停虚念我三寳修慈儉讓歸向七真虚無至真道中之道諸君夫人十方天尊名字神號八清太素九炁元君起心存想容儀服飭隨其炁吐納誦詠心心不散寳經符契悉皆受持懸幡竪花燒香然燈静意注想心口啓願悔謝存亡宿根罪咎殃考業對漸得消除若學仙道士誦念是經智慧開通六覺明了久病痼疾誦念是經真炁充扶自得康健鬼邪所惱呪誦是經勑身鳴鼔擊振鍾罄精魅消亡魂神審定飢渴寒熱獨宿山野呪誦是經吐納咽液神降靈藥温涼充飽天地變度五行告災星宿表𦍙幽顯恠兆呪誦是經惡心順伏刀兵瘟疫死病相注呪誦是經利刄摧鋒鬼精消滅汝等真仙受任統理宜宣秘要濟救群生使有心者脫諳障惱現世安樂後成道真滅念蒹忘仁慈孝敬後巳先人揚善化惡運大法船入智慧海不染三縛守其真一返我兩半㝠合自然於是五老上帝十方飛天七聖神仙俱起作禮旋行三匝長跪道前各各獻說昔所奉受道要神呪符誦真訣三龍之後救濟萬生善信男女丹誠款禱柔和精進翹心積年誠難不改賤貨祟道專寳之人當依四極明科三元舊典清齋三月若王務因縁成一七三七書而秘傳輕泄漏慢風刀考身可不慎哉玄真護身符神呪頌義七真曰我等所說諸天上聖巳得道者億宗巳來傳習尊受學道男女貴賤長㓜受持憶念有疾即誦有災即誦有凶即誦有厄即誦有難即誦有憂即誦有樂即誦昔與玄真説三寳神經亦巳具載用持救世有心常寳專於裏襟保身養性得無爲道天真救我正真營我至真衛我玄真保我妙真念我玉真護我金真濟我七真度我九真存我法鏡映我玄神廕我流金煥我法乗運我法力防我法功成我晨燈照我暉耀晃我氤氲迅我慈光冠我雲營覆我玄聖撫我法王接我天神爲我消災萬靈爲我度厄地祇爲我辟惡萬帝爲我除凶衆聖爲我却禍七真降我身安九真鑒我長存玄真消災辟禍頌曰金真乗空降神虎檢雲營玉帝披緑霞諸天命神兵九辰廻霄駕萬魔束妖形九微迅烟出神將攝邪精九元開雲路神威召諸靈流金擲鋒刄百惡自消平神輝耀天宿除蕩鬼王兵五象風火發滅毒金馬呈群災敢有干北帝收汝名聖道正蕩蕩神威戮鬼精十方龍騎到神霄繞鬼城聖人教我誦飛符任霄征十方保劫運使我亨利貞玄聖消五方凶神惡鬼符頌曰法皷震天地神煙掣九真流金豁擲落大象隨電生魔風不逆運雲公煥火鈴朗朗神功攝天宿無虧盈迅輪火甲奮神電戮鬼形紫映毒龍衛送妖北塞庭神風浪九陔八道自然明九天忽以開鬼啼又自傾千千來束手萬萬不留停以符付天人誦符保萬齡上慶終無劫慈心方太平清齋守㝠寂億億好鮮榮流通若電轉諸天利汝名人人各一誦保子永長亨七真命十天帝收六天鬼兵符頌曰吾命十天帝豁落振威風神將横地道收攝六鬼酆煙焰虚中生錦雲拂靈風上保諸天祚玄象豈知終中安帝王基靈化憐神鍾下救天地人飛騎討魔公七曜神光擲百惡莫能㓙十天奉符發萬帝應雲龍飄飄度八難五道並原蒙五帝即宣吿疾如水火風護度三災十方欣隆普天元慶保惠無窮七真曰夫天人若歸依授持寫此符一道别帶呪頌臨終自隨保其魂神不經十苦八難三塗五道六趣之中死生當奉符送靈爽昇於十方無爲福堂九誦神安十誦神清百誦災消千誦無嬰若佩若誦萬神禮敬日夜常爲四體咸寧常誦體安萬劫保形百惡摧崩諸天咸聽十方鬼王敢聞誦聲七真曰今以此法永傳後世無窮劫中保度無量天人也爾時衆中有天丁力士句民子等同起作禮再拜長跪注心上啓天尊曰我等自惟億劫縁運得奉尊顏預在慶㑹見諸大王各說法要願救群生㧞其苦難令入道門不勝欣躍我等昔於修陀羅國從九天真人奉受神呪雖蒙啓訓昬迷不解唯久真心專依口訣禮拜呪誦心慮不輟精神積感道炁遂通漸得開悟心識未了自觀身心恍惚虚妄更大驚怖歸向無所更詣真皇乞慈濟養真皇良乆盻目含笑言曰汝等鬼王從昔以來隨炁離合神變自在謂保常住心志浮蕩妄自分别空有是非起滅因果業係往來迷惑馳競意欲殺他心乃自殺留連五道繫縛八門何可脫焉汝等若能不起六情隨順二有修真道實不生念慮向背取捨乃名入道亦不知見入道名字一順諸法合於自然可無怖畏汝之身心二有因假本非真實豈以妄心而生恐怖句民子曰今蒙天尊重示我等不生之命不起心法得無畏訣定真實不厭取捨方便修行無所染着和同事業引入道源今說神呪普施天人歸心慕者令得安樂乃說呪曰混沌大一九炁化生景精奮耀流金火鈴鬱勃煥爛含月吐星毒龍擲火鳥毋持瓶召攝六酆馘斬鬼形阿那振皷神霄建鈴玃天持斧長牙布纓束縛風火討捕妖精收録光景不限姓名六天故炁何逆不平五帝符告金馬驛程急急一如太上律令三天真王說消除瘟疫星宿變度神呪景精中王威振九天金虎蔽日飛龍繞乾黃神秉鉞緑齒揚鞭璣衡五斗平調七元收捕九醜殺滅六天手持三景足躡九玄八威吐毒天丁導前討察妖精送著九泉十天保國萬有安全三天真人曰來世之中學道求真善信男女或居禄位或隱山林或隱朝巿遇陽九百六否泰之際元命期至運厄交集刀兵水火瘟疫飢荒衆災起時當自安心守志不關人事清淨建齋燒香然燈或存思吐納鳴皷擊振鍾磬四言一叩内外神合頂出九光照明三界頭戴七星𡬺衝其前王炁雲光從五藏出匝覆一身遶充八極變爲龍虎獅子辟邪驅馳前後各依方色吐其王炁流金火鈴消滅災難於是上天大衆至聖真仙普皆下降五帝携接脫免災瘴轉入道源普告來生善信男女心歸向者必得安樂無爲養神亦應自歸我之三寳攝念不散一七二七乃至三月燒香禮拜髙上玉皇八清道君十方靈寳無極天尊九宫四極太清靈官得道聖衆響其名號旋得講詠三業建善上徹幽玄有心自感道不違人於是天尊奉讃三尊而作頌曰大道無去來物自有隨迎寂然非稱號呼吸是姓名常住無終滅運感豈初生我今稽首禮歸命玉皇庭煥赫龍鳳文威光朗十天感去藏金格機來啓玉篇空聲欎華響隱顯作階筌呪誦歌情性調暢入幽玄巍巍道德尊功行己圓齊降身來接我師保自相携慈悲惠法水以用洗愚迷永度三清岸長辭五濁泥真皇於是讃詠三尊已發願言曰我於今日爲將來世旣以正法養護群生隨俗教化行大乗道順入群方同其事業因縁報對方便利益建齋行道令修願念四大合德同入一源一願大道淵沖真源虚湛境有盛衰智無増減二願九天清朗七曜髙明元精和降潤色群生三願九地安静山川沃壌萬卉常榮醴泉増長含識有形皆蒙載養四願天皇秉治真聖佐時幽㝠感澤動植咸宜淳和盛長保守洪基五願三師道友普證六通德充慧辯開導愚蒙隱顯世道是物和同心識無染身飛太空六願八門五道考對消除惡縁永絶善慶恒居䰟爽冠帶衣食天㕑七願蝖飛蠢動巳生未生元精潤色保性和平皆蒙歡泰俱受欣榮八願普加運載同昇玉清志思玄寂人因道成俱歸福果道炁延生五老帝君保國學仙消災神咒於時五老上帝同起再拜整服歛容長跪尊前上啓言曰我等億劫以來隨運隱顯奉受靈寳常以方便濟度有生引入自然無爲正法明了世道本末因縁起滅報對我昔奉受真經呪訣心念口傳未敢輕陳漏泄篇簡今奉勑教不敢覆藏有保鎮神呪是三洞妙本九炁元精混合百神内名隱伏功業智慧圓備照朗於餘經中亦已說之行道誦念内鏡身心外消災難上真髙聖乃能洞解玄理義隱不示下仙後學凡迷可能宣傳真心信受閉意奉行清齋静黙存想神炁鳴皷吐納係念誦持真靈通降立𦤺昇仙況小災危而不過免乎專誠自感道不違人今謹誦曰元精混沌青炁散分神童十二保鎮肝魂二七四五變化雲營九竈九社老木不淳神虎吐毒劔擲火焚掃滅青注光景妖氛識不馳妄安保帝君赤明開圖炎精扇飈三童一宅煥赫浮飄司明得失萬帝朝宗朱鳳吐火金石化銷流鈴飛電馘斬赤妖束縛九醜灰覆火燒粛清皇祚道德逍遥金精一啓太白七分帝君靈府流飄素雲召龍負水殺滅赫煙長牙巨獸討捕兇群百靈安鎮我得自然玄光豁落五炁流行雙闕上帝萬神化生安志守智噉食炎精蒼龍吐電摧破黃兵皛晶振劔奔飛火星三天力士收滅萬精保家安國道治昇平混沌元一黃像紛馳感覆真老變化嬰兒養育九炁胎生兩儀日月上奔星辰下垂風火争擊刀劔亂馳六天九醜爽破心離太上符命何敢不隨有生安樂入道無爲是時真人蔚明羅奉天尊勑告大衆曰諸真仙等若於來世普濟群仙救厄治病建齋行道呪誦禮拜亦復應當精備丹朱簡素紙墨書畫神符懸鎮佩服章表召請太清太極神官吏兵營護決罰凶精鬼賊但天書玄妙皆是九炁精像百神名諱變狀形兆文勢曲折隱韻内名威神功惠之所建立能滅災異保養元和鎮十二時辰門户井竈厠溷之上所以然者凢人居世或見昏迷未入正一盟威之道靈寳惠源性情馳染心不自定妄生恐怖六天九醜知其心動因生災害是故須以神符保鎮真炁護持契合自然令得安立有病苦者亦當呑服修存誦念三時行道庭中北向口啓吏兵奏章騰請燒香然燈懸繒幡花旋行歌詠法界威儀具依三録四極明真戒律科法輕泄漏慢殃延九祖蔚明羅王出大衆前再拜長跪擎持玉案開發金凾焚百寳香鳴皷閉氣示衆儀則敷其玉簡書以告傳於是三十六天句婁王等俱起再拜上啓天尊曰我從昔來所得法味真要等呪悉以陳說令諸大衆天人神仙各隨方國救㧞苦厄興隆聖道保國安民大法弘普廣度無窮明吿來生末世男女有能歸向專心信者當賫命繒丹青啓誓立齋關告如明真科典亦以珍羙甘果我所上味獻醮五帝及三十六天諸君丈人自然尊神以求所願諸真王等不勝喜慶異體同心而歌頌曰慧洞淵澄海法水常滿盈寂然無人號動喚有功名色性興神呪顯發洞淵經有害施群生遂感示尊形降化方諸地飛昇道玉京不來亦不去不滅亦不生煥赫龍鳳文離合揲神符世情别貴賤道不間賢愚精心感慶有泄慢福乃無善惡非他對昇沈與自俱終歸我三寳㝠惠可相扶難遇今乃值聖道呪符篇一生巳欣幸萬劫更良縁有情自感受無心不遇傳八門絶報對九祖並蒙遷散聚欣歌㑹稽首帝君前法㑹將畢天尊令五老命駕十方仙真俱起再拜變身八景雲輿飛軿煒燁輝煥天鈞震響天真導從乗空駕浮還昇玉清太上洞淵神呪經卷之十二
