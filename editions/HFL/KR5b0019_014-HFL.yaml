front:
  text: 太上洞淵神咒經卷之十四制四
  hash: sha256:bd5c4f6280d7bc0ab5c55847b8cc3a14c0ac457f50df8a08f65536fa3522f40b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_HFL_014-001a, image: hfl/0172/0172-076.png}
body:
  text: 殺鬼歩頌品道言吾告明羅真人曰自今以後如有善心之人横遭災疫仍請三洞道士爲其轉經須斷葷辛去除色慾洗浣身心專情黙念不得雜想常須存見五帝尊神靈官將吏左右侍衛齋主志心勤誠禮拜法師時須召請天真神仙下降救護民難如不䖍心虚費錢帛仙聖不祐徒用齋資若依吾㫖永保無虞轉此寳經一部天兵下降魔王束手若不依吾言魔王烏鄰子頭破作三百分矣爾時明羅真人乃上請五帝神仙兵馬降至道塲捜擒鬼賊東方青帝九夷君青神將軍九九八十一萬人東郷神仙諸靈官一合來下收捉東方青瘟木精之鬼南方赤帝八蠻君赤神將軍八八六十四萬人南郷神仙諸靈官一合來下收捉南方赤瘟火精之鬼西方白帝六戎君白神將軍六六三十六萬人西郷神仙諸靈官一合來下收捉西方白瘟金精之鬼北方黒帝五狄君黒神將軍五五二十五萬人北郷神仙諸靈官一合來下收捉北方黒瘟水精之鬼中央黃帝三秦君黄帝將軍三三九萬人中郷神仙諸靈官一合來下收捉中央黃瘟土精之鬼一時除蕩悉令消滅令某疾病痊瘥人口康寧急急如太工口勑令五方神將殺鬼安民律令道言百姓官吏門丞户尉左右亭長是諸上下九卿大夫宅中三十萬神守宅三將軍屋上廣漢戶主某并家口等所有不利夢寐顛倒妖恠屢見爾來巳久無有休泰又恐户主先亡後化七祖九玄前死後逝值以日惡時凶違天負地千犯三光十方大神八極真聖𦤺令某家大小疾病災害時興呪詛圖謀蟲蝗水旱六畜疫侵今故轉經呈章設醮分解災厄萬事了絶三十六世以來山林社祀三案鬼賊世間房廟祇靈凶祟千鬼萬魅内外家親普受經功分解曉了自今轉經巳後得福萬倍所願從心仕宦遷達所求如意疾者痊愈夢想真良刑嶽解散疫盗不生鬼炁消亡邪精滅絶汝等鬼王若不從吾㫖教者頭破作一百二十分矣道言自今三洞出化若有道士能爲疾民建齋轉經奏章設醮法師行道之處惡鬼聞之自然逃迸老少各須專誠伏地向北聽我道士偈頌之音魔鬼聞之自然逺逝斥走萬里不敢復來子等專䖍各宜敬聽東方青帝君句芒何蒼蒼人如百草長隨運自然芳善人得生天惡人入鑊湯同炁自相求異類不相望裏乖外不合相和如鴛鴦輕慢失道遠恭敬陞天堂尊師如日月慈孝感十方不信三洞法萬劫履刀霜七祖入九幽長夜永茫茫痛哉凡夫癡身死子孫殃誹謗仙聖道世世苦難當不信身不安行善生天堂奉籙入仙品面見太上皇長病多惡鬼須請詠靈章七祖咸解脫得覩日月光建齋施窮乏渴飲玉池漿天神悉來降勑吿一切王各各約下鬼不得妄强梁執毒收萬鬼邪惡令摧藏今日誅惡鬼依投託旻蒼瘟災走萬里鬼去人自康逆順各當位蒙福長吉昌神兵治疾病弟子禮東方南方赤帝君炎帝何幽幽三天玉女妃仙真下來遊天地長且久人道短殂兵玄妙化明世愚徒不知修迷者不識道道乃未相救智人恥榮禄愚人欲財稠智者常憂恐愚者不懷愁水來髙九萬疫毐鬼兵流道㑹心不奉一去萬劫休疾病陽所覉聖人心踟躕道爲衆生怙萬劫謂須㬰今日勑十方魔王鬼主等各須攝汝精當令疾者瘥善神施萬靈大水洪災起天人九龍迎轉經除凶惡醮主禮南方西方白帝君蓐收何零零三洞教世愚神光照天庭治病病自瘥火水自消停遵師佩符契仙道自然成誹謗毀經法罪愆往不聽愚智天地分積功非一形奉師念善縁仙道何足成今日呈口奏玉女下來迎處誠西向禮福慶自然生北方黒帝君玄㝠何幽幽但見髙上人學道長自修奉師尊玄聖託心衆真遊勑魔療百病萬鬼不敢投干試悉斬滅一切不得留天丁語力士惡逆值者收十方太上勑不得住須㬰宅神門戸鬼上下自相求覆護利生活萬惡悉消除諸天玉女降真仙下與俱若其病不瘥魔王等自屠今日齋醮畢福降如雲雨中央黄帝君統領十方仙真人玉女房玄應悠悠相幽暗三光照日月暉然朗堂堂煥上陽三洞遍流行救濟於諸方男女奉修者面見於玉皇乗鳳託景遊身聳以翱翔衆真皆雲集婇女花散揚志心中央禮患者得安康東北梵炁君無上諸天皇靈妃真仙侣飛歩渉雲剛奉師受三洞世世子孫昌今日拜口奏殺鬼勑魔王疫鬼奔萬里凶邪自摧藏若有千試者命殞自消亡大聖化萬兆信者入仙邦誹謗口舌起自然值風霜何不奉大道尊敬陞天堂專勤東北禮疾瘥壽延長東南明帝君風神志峩峩玄女來稽首九龍度三河人生一世間猶如託松蘿松死蘿亦枯人命何足多愚者恐不活智者隨世波生官不久停須㬰有吁嗟自無大智聖安能避世羅疫病悉時起先身禍録多今日上口奏天人勑大魔魔王小鬼等急去不須蹉百邪一切惡斬之令滅磨醮主東南禮生炁自然過西南太一君天毋告至靈弟子請章奏建齋求長生萬病自痊瘥官府悉休寧家親仇解釋水火逈然停仙人來救護玉女九龍迎三洞除世難信者萬劫生西北炎帝君三光動神明一心奉符契仙真下來迎玉女千萬兆奉師修長生消災立大功已滿神龍迎不信誹謗道九幽永㝠㝠坐起誣說人萬劫不復生疾病官口舌盗賊由先刑今日祠五帝口章濟死生䖍恭西北禮聽我誦詠聲上方虚遼遼天人悉依依三洞化世愚佩者得雲飛口章治疾病疫鬼自然衰今時謁五帝詠此甚希㣲蕩除宅中瘴群魔自擁威專心佩符籙尊敬誦經師上方禮三十萬福自然歸下方世界君彌齡何苕苕兆運謂今夕萬載如一朝中有不死者口詠三洞謡建齋念神呪口章勑魔王玉女十萬衆疫鬼悉潜藏精誠祠五帝求生㧞先亡欲得除疾患專心禮下方三天帝君頌曰茫茫太初苕苕彌蒙中有賢者左右仙翁玄女下來仙靈萬重五嶽神仙來輔邕邕侍者八萬玄老青童治療世病殺鬼消凶今日口奏萬鬼投洪敢有干試斬之不容志心三禮令汝永隆九天玉女頌曰三洞流化炎炁拂天仐世淺薄愚不識賢見善棄之長夜緜緜道說良善七祖泯泯疾病官厄口舌紛紜佩符請籙心不自專兩舌誣謗却反怨人壞人善事破戒好婬如此等輩惡辱道門死入九幽殃及子孫曲取側入目前求㤙不知罪重萬劫牽纒先身無福長病聮緜不肯施惠急反求人元不積善悔復何言志心䖍禮萬聖賜㤙扶桑大帝頌曰玄玄三天上有神師五斗落落三辰暉暉仙人來下玉女遊嬉真皇劫壽兆運萬紀立功行道救病及私邪不干正曲直自歸今日口奏建福巍巍鬼王攝毒悉除患衰䖍心禮聖萬福來資金天真母頌曰世人紛紛自作紜紜三洞流布愚者不聞見法不修造惡凶存貪害目前十苦所纒三塗六賊五道八門依投口奏建福祈恩願解宿咎見在蒙原闔家禮拜䖍仰上天天女來降爲除災迍天真皇人頌曰三洞流演神兵驅除愚者不信自招禍餘聖人歎念嗟世頑夫悠悠三界徘徊天衢不知求道陞仙天㕑病苦緜緜乃覔生徒先身不善今世且殂心口自責割己又無賤身慕安入道自舒䖍請口奏以聞太虚建齋祈福衆惡消除青童玉女仙人下娱三十六天天女同俱三五七九二十四元一時行道萬惡消除志誠六拜善福有餘三十二天玉女頌曰天化愚癡世人不知殺害無辜令人神馳奉佩三洞天女來宜今日口奏勑神令知病者速瘥鬼王不違各專三禮積功無疪玄女親降福令齊施三天玉女頌曰黄赤紫府開道之文受巳不行壅塞鬼門三洞神呪飛仙元根受不奉遵七祖昬昬先世有罪病難去身今專解謝傾膽首陳先世所負咸乞蕩捐一如尊勑從師經言稽顙再拜上請天㤙十天真人頌曰三天玉女群仙下遊奉師遵道萬病自瘳水火劫運智人懷愁愚者不信千載同流柰何頑夫死入九幽今欲治病化示凢流三禮志心天女來稠五嶽仙人頌曰世人多惡愚鄙聚生不信三洞四九藏經因此𦤺病病苦縈丁先世今身罪謫不輕今請口奏建齋求生令得蒙恩獲見太平志心三禮永保康寧三十六天大梵王頌曰我見世愚人不信有聖真自作塗縁業殃及七祖親依師佩符籙反更如凡人三洞信不輸天租又逋陳嵗食年年替月料漸無殷以此及大罪罪積病居身欲除宿生債須勤建福田要却五瘟疫口章聞三天上奏北向啓勑下消宿愆三十六天天人頌曰我見世愚人愚者不信道見人受三洞謗之爲顛倒不知神呪文飛仙地神造教人受黃赤狐疑反受栲今身有重罪並是前生惱䖍誠禮至真請來爲解考十天大神頌曰我見世途人愚惡不知真一生謂千載不知有先身適口誹讟人謗師有三心自招加罪栲罪栲譴人身疾病常緜緜當此何所怨今特上口章志誠禮上仙三十六天天女頌曰我見世愚人自作行屍殃奉師心不正那得上天堂今身有重病乃是先身殃鞭撻百姓苦天乃賜凶𦍙今日萬種病建齋上口章遍禮諸真聖䖍敬謝十方九天天女頌曰十方太上尊慈念一切人乃行中元炁無一識仙真奉籙身行惡偷盗常居心是以投章奏過度此迷津䖍心禮髙聖乞垂赦罪源十天真人頌曰我見一切愚心不知已身貧窮行十惡見善如不聞貪惜小財貨遂𦤺大罪愆罪源日夜積愆積悔何言𦤺令人萬病病苦縈終身今日上口章章奏逹天門䖍心各各禮神仙降大恩西王母頌曰世俗紛紜自作紜紜三洞流布愚者不聞見法不修造惡因縁貪害目前十惡所纒三塗八難五道鬼間今日建福七祖生天見在長存歸向十天玉女來下爲汝留恩弟子三禮福慶千春三天玉女遊頌三首迢迢三界外中有仙官臺真人千萬兆乗龍駕鳳來三洞演化愚神呪除洪災五帝召魔王收惡束鬼骸敢有干試者天丁斬鬼形玉女詠十方鬼死人自生衆神聞妙法七祖生天庭悉皆蒙解脫俱遊紫鳳城奉道㑹仙真存子中心正念善乗龍飛不信墮幽夜萬劫處㝠㝠一去永無生若敬度三災奉師受妙經大道甚㝠㝠敬師如日月慈孝感天靈不信三洞經萬劫履刀霜七祖入幽府長夜何茫茫痛哉難可當身死子孫亡不說無口非不盗生天堂奉師入仙品面見太上皇弟子三禮拜長生永吉昌道言凡建齋行道轉經設醮誦呪呈章燒香存想思神念真上啓太上虚玄洞淵三昧神呪大經寳藴靈文上元太一空洞三天太真髙上玉皇玄中真人無極大道十方應感天尊太上老君天帝司命萬道聖君二十四尊賢天上地下神仙兵士三十六真人五帝神仙巳聖未聖通玄諸君一切天人普垂降下證質丹誠併心同力圍遶齋主宅舍千遭百匝張弓駕箭守鎮四方丈安一將尺𦤺一兵搜括齋主所居百里之内寸尺之間收取五瘟疫毒爲害之鬼獲便誅斬矜赦弟子家眷四時安泰萬禍氷消官司口舌永不相干無興水旱孳牲繁盛墓宅昌吉人口隆康舉意營謀咸蒙稱遂鬼魔逺去邪魅潜奔若有一鬼一賊不欲去者吾遣三十六天神仙吏兵下來收縳次次斬之不令遺漏急急如太上口勑勑又准女青詔書律令道言自今以去天下國土若有頻年遭罹瘟疫悉是魔王烏鳴鳩等所部鬼衆爲於災禍遊行天下與民親七祖逝魂同行瘟疫殺害國民若有善心之者能發保全之心詣請三洞法師置立道塲轉經念呪依法陳章設齋祭醮祈禱五帝神仙功德無量除瘟降福功無比儔七世亡魂遊神碧落九玄宗祖擢質朱陵出三界以超然坐六虚而自在人民康泰老少安寧益筭延年長生度世田收再熟蠶吐八絲墓宅宜人孳牲盤黨公私静貼災瘴消沉國主帝王德逾堯舜金枝茂盛玉葉常春天下太平干戈静息州牧縣宰用道安民災害不生禍亂不作四蛇攝毒六賊停嗔吾今故傳此經爲汝衆解災却患何不奉受受者䖍敬獲福無邉若有欺師負道不依經言五逆不孝殺害無辜割剥孤貧侵傷良善罪積山海若乃先亡後化見在今身男女老少貴賤之流年七以來有此莫大之罪今故燒香普爲懴悔悉乞除蕩不賜謫罰從今轉經之後汝等鬼衆并及魔王部屬一切精魅悉從真經所指若有强豪鬼賤不依吾勑命者即遣十天大神兵一時斬絶不留種裔急急如太上口勑殺鬼安民律令太上洞淵神呪經卷之十四
