front:
  text: 太上洞淵神呪經卷之一
  hash: sha256:0edabe8986509a0da3889c20d2fc4c943e29210cedc22fd5fa177e7d326473d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_SJB_001-060002b, image: sjb/06/060002b.png}
body:
  text: 誓魔品道言吾昔在三天之上爲諸男女說無量經教化一切時有下方世界真人蔚明羅等諸天大衆四十九萬人到于三天之上聽說無量大經内外安穩明羅等發心更起三禮太上問訊天尊教化難乎弟子等區區以展下情太上曰子從閻浮來乎明羅等曰然太上曰世間之人詎有遵道奉經學仙者否明羅等曰世人積惡不信道法但聞有哭尸之音不聞有仙歌之響人民垢濁三洞壅塞百六之災刀兵疫疾魔王縦毒殺害良善門門凶衰哀聲相尋衆生相殘自作苦惱相牽而死懷愚受苦了不知出此等之人將何度之太上聞明羅等說此語巳乃告諸天人曰衆生何念不知道法不知其受自共作惡更相誹謗三洞流布不知受持亦如盲人逰乎日月日月豈不明也盲人不見法師宣化愚人不悟太上將天人玉女八千萬億人來下救之過乎玉亰玉亰山上有一桃樹樹髙三百九億萬里東枝覆東方南枝蓋南國西枝䕃西方北枝蓋北國四十九億萬年一花八十億萬年結一子子熟大如車輪人一食之三千年無飢也鬼見此桃樹則自死矣天人各各持此桃木下以殺疫鬼一切衆𦍙焉道言自辛巳壬午年鬼兵縦泆魔王行毒毒病生民我今遣四十九億禁官攝三十六天魔王來下共誓曰自今以去若國土之人枉死急病刑獄囚徒者悉是魔王等不攝下鬼使賊害種民也自今以往太上金口所勑若有不禁者令國土之人遭其疫癘刀兵困苦刑獄囚徒死亡不以理者斯是魔王先坐不禁卞鬼故斬之不恕也太上乃遣十方主者四十九萬人天女大梵王三千萬人布行召三十六天一切魔王及小鬼王等八十億萬玉妻子眷屬悉共惡誓玄女麻姑王妃三千六萬人悉同來爲太上勑魔王魔王悉伏各各遣魔子力士廵行國界擁護國中之人恐太上誅之九天梵子及天人大魔王王及夫人綵女悉三禮奉太上教矣道言自伏羲以來至于漢末人民大樂多不信道悉受天炁自然邪魔不知有道不知有法不知有經直奉自然也後時有信經者少耳大晉之世世欲末時人民無淳苗胤生起統領天下人民先有多苦上僥下急然後轉盛盛在江左天人合集道炁興焉天運劫近其中往往有得值三寳無量上清黄庭記仙太素靈寳三昧者此人等皆先世大福福流後身聞見此經得度三河洪災之厄善哉善哉子等男女之人若國王帝主方伯二千石下至愚人不問奴婢能及此經受此契録名入仙品終不枉死也太上在玄景之宫說此神呪經九天大魔羅刹鬼賊諸天眷屬八億萬人悉集在坐聽天尊說法各各檢手一心伏地天尊乃爲演其記仙大經四衆聞之無不身上覺異也道言汝等諦聽吾今爲汝等說來世劫盡之運自伏羲三千年大水流溢人民半死三十六年萬姓叛亂自共相殺至周秦之滅人民頓無及漢魏末時人民流移其死亦半至劉氏五世子孫紹其先基尒時四方嗸嗸危殆天下人民悉不安居爲六夷驅逼逃竄江左人氏國跡亦避地淮海至甲午之年人氏還住中國長安開覇秦川大樂六夷賔伏悉居山藪不在中川道法盛矣木子弓口當復起焉道言大劫欲至治王不整人民吁嗟風雨不時五糓不熟民生惡心叛亂悖逆父子兄弟更相圖謀以𦤺滅亡怨賊流行殺害無辜當此之世疫炁衆多天下九十種病病殺惡人此有赤頭殺鬼鬼王身長萬丈領三十六億殺鬼鬼各持赤棒逰歴世間專取生人日月候之青炁者人卒死赤炁者腫病黄炁者下痢白炁者霍亂黒炁者官事此鬼等持此炁布行天下殺其愚人唯有道士法師受此神呪經有九十億萬大神自然力士天人玉女悉來侍衛若有奉持供養者萬病自消終不横死也及鄰國有大賊來逼者轉讀此經賊自去矣坐中男女聞太上說此經各各驚起三禮弟子等願受此經道言劫運垂至人民多惡其中有信道奉經者悉是天人非世間愚人大聖見世間濁亂遣天人來下生乎中國助時教化矣天子大臣公王令長及兵吏之中雖處卑賤一心信道聞經信用仙人導之若聞見此經不欲受持將知此人六畜中來與經無縁是以大水之災魚鼈所食與泥同流萬不出矣道言自今以去若男若女聞見此經及有受持者不問男女奴婢公私之人有受之者寫持經卷供養生生有利仕宦日遷疾病除愈萬願從心若有受持此經之人三天大魔九天大魔三十六世之魔十方殺鬼神王領鬼大王三十八萬人各各自勑汝等下人無得枉害受此經神呪之人若今日世間有男女之人疾病危急之者法師將此經到家救病者汝等鬼王收汝下鬼一切勿令犯此主人當爲和喻中外之神家親丈人殃𦍙嫉妬分别解脫使令病人得差官事解散三十六萬神守護病人若不如吾言汝鬼王等聽吾呪之焉道言目今以去若世人有疾病官事刑獄囚徒困苦轉此經處不蒙其福者將是汝等鬼王之過耳何以故小鬼不信大法縱暴凶心汝等聽之東來神西來神南來神北來神各三億萬徒若有鬼王不承告下縱放下人來犯受經之人及法師所救之身及其一門故令遭毒者斬此鬼等令作萬分矣不恕之急急如律令道言三天大邪王領四十八萬人專行赤種六天大邪王八十萬人領七百萬人專行白腫九天大邪王三天大邪王各六十萬人將從三萬九千人專行黒腫三十六天大邪王領七十萬人專行黄腫七天大邪王領九億萬人專行青腫縁人身體流溢四肢面目青赤黄白黒乍寒乍熱乍來乍去引日沈困氣來愴心心下堅實不欲飲食飲食轉少妨逆無味或先世呪詛考來逮人如此罪縁乃有官事刑獄過咎當欲消者先受經供養奉師汝等如此之後亦得昇仙耳道言汝等大邪王汝等先世無福不信大道作罪山積今在邪中專行瘧疾毒苦萬姓或有身體寒熱反目白黒狂走妄語歌嗥哭泣四肢癕腫惚惚闘氣如此之疾流滿天下或迷亂人心令人遭公事枉入刑獄荼害萬民如是之病悉汝等邪王爲之自今以去奉佩此經契者汝等助護之莫令有惡若轉此經之處鬼兵逺之善神祐護若不信大法故復來犯此法師者汝等邪王入淵汝等邪王入水汝等邪王入火汝等邪王萬斬汝等邪王頭破作八十分急攝汝精攝汝靈不得干犯尅害疫病枉攪天下良善人民急急如律令道言大劫垂至疫鬼流行汝等道士勤化愚人令聞此經令受此經契受者大水將來九龍迎之不有厄也三災垂及三災者水火刀兵也一切着汝等身因汝等不知不能得受此二十卷經殺一切邪魔邪魔不敢近人但受此經家中供養不用宅籙何以故此經有無量仙人玉女天人龍鬼常守護此經有人久病多凶少吉衆事不利者亦可奉持此經能消一切大災有病受持者萬事善矣魔王及邪王此間鬼王等聞太上說神呪經心中惻然嘆曰我等自昔以來專行惡事與道有反今日聞天尊說此語當奉行之若有世人受此經者亦自追逐護之若有世間鬼賊欲來侵欺此道士者我當誅之耳自今以去有人疾病官事轉經者我等亦當助之爲福矣若不存誓故來犯者頭破作萬分不足以謝也道言大劫將近水流中國天下蕩除人民死盡唯有道士受經之人九龍來迎天人百億選擇善惡汝等信之若有人病先考所加受持此經若有官事刑獄仍常有厄者當受此經若邪狂口舌萬端亦受此經一切不宜亦受此經受此經者魔王不敢干人道言五濁之世世官撓急不矝下人下人吁嗟萬民懷怨天下悠悠日月失度五榖不成人多流亡大水皆起有智之人見經急受書其經卷竹箱筐笥髙座盛之不尒者亦可五色囊盛之有能轉誦鬼兵自散官事解了受此經者一家一人受之辟一門災禍矣縱使目不識字但受之雇人寫之淨室供養邪鬼自伏一切不敢近人也道言自今以去轉此經處若有疾病官事口舌宅中虛耗聞此經誡勑魔神呪若一鬼不去妄稱大神山林社祀世間廟主壞軍死將脫籍之鬼來助邪王病痛世人不從大法者十方殺神收而誅之若復故來縱暴專行苦毒害者鬼王等斬之魔王等身作萬分不得恕之急急如律令道言世促人惡信法者少大水來近恐汝等沈溺死亡者衆不知出期吾念甚哀故於玄景之宫九合之室爲將來一切衆生建其橋梁開於法徑示之以道導之以法令免三災消其九厄去離八難生天人中昇仙之縁世世無盡勑下魔王令安萬姓預爲呪之禁斷惡鬼自今以去有受持此經及轉讀之處皆有一切福利後世男女若受經奉師者亦得昇仙矣道言五世之孫劉子佐治天下係紹仙基大漢人民多有值三寳者何以故此世世吉人能起道心故也山材隱士不可稱數見大劫欲盡受經者十有七八矣三災垂及汝等道士有縁之者乃能信奉太上爲一切衆生故涕泣五行汝等若信吾言者九龍之輦輿來迎子身若不信者孟津三河汝等着之坐中男女三億萬人悉來受此經矣道言汝等受此經二十卷供養行住持之身中萬病自瘥仕宦髙遷所願從心亦可見當來真君真君不逺甲申災起大亂天下天下蕩除更生天地真君乃出真君旣來聖腎仙人及受經之者一切來助左右東西南北道士爲佐無有愚人汝等世人但受此經自然見真君矣道言真君者木子弓口王治天下天下大樂一種九收人更益壽三千嵗乃復更易天地平整日月光明明於常時純有先世今世受經之人來輔真君耳是以智人道士誘化愚人令受此經消一切疫病鬼賊伏散萬願自果所向合矣若受此經所行之處魔王助化終不令人有惡也道言男女道士有骨應仙者得值此經有其壽相應見真君者得受此經此經有神令人心開真君出世無爲而治無有刀兵刑獄之苦聖人治世人民豐樂不貪錢財無有雞豚犬䑕牛馬六畜也鳳凰白鶴爲家雞麒麟獅子爲家畜純以道法爲事道士爲大臣男女貞潔無有淫心人民長大亦不復是今之道士耳不覺自異其形端正長大人長一丈三尺真君長一丈六尺面目光澤人中無有姿醜了了視之無厭矣坐中大衆聞太上說此真君其國大樂各各心中歡喜悉自俱起稽首三禮弟子等亦當奉持此經耳太上洞淵神呪經卷之一
