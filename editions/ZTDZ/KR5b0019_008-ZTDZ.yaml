front:
  text: 太上洞淵神呪經卷之八始八
  hash: sha256:5652843ba9c81807e9376d0f3991c67f3199dd3f16b7601f5f777d2de959c2d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_SJB_008-060028a, image: sjb/06/060028a.png}
body:
  text: 召鬼品道言三界之中有信經之者稀耳是以不生賢人多有惡人聚生耳時有信法奉經者天上來也甲申之災天上來迎道士也不迎罪人罪人不信法故不迎之壬午庚辰年有疫鬼刀兵殺人天下活者稀耳疾病之時得三洞法師爲轉經行道之處天尊召十方大神令病得瘥官事自了若不從命鬼王先坐矣道言辛巳年有都盧那鬼身長三丈目縦口横耳長六寸手提鐵杖專行人間打殺惡人疫癘官事仍有六萬九千鬼或爲大鳥鳥行之處令人悉病便至死不可治之到壬辰年人民大困甲申死盡若國法師得治之爲其轉經行道者三天大兵悉來保護不使遭毒也道士化人令受三洞經矣道言甲申垂至鬼兵殺人令天下力士烏玄四十九萬人遊行國界若有三洞法師轉經之處行三五之法一一護之不令有惡鬼惡鬼逺走助其道士宣化愚人若國王帝主方伯二千石令長貴人貧賤兆庶有奉三洞之者後獲大福福延子孫世世不絶生天人中常值聖人不作貧人帝王不棄常佐人主道言世間惡處善人不生矣若今有貴人善人天上來耳何以故惡人不信大法不解經文雖得爲人先身有小福今爲貴人得有錢財然而不識法典與法無縁此罪人耳吾亦知之世俗官榮譬之朝露日出則乾榮華不久須㬰則死不如學仙萬劫不傾道言道士化人令奉三洞飛騰不久若有疾病官事轉經大吉則所行之處疫鬼自死勉力相勸之乎道言自戊寅年有赤鼻大鬼鬼名附子身長九尺三面一目復有一鬼兩頭一身身長三尺各各赤目復有一鬼鬼名大野三頭一身身長七尺萬萬爲羣手提白刄專行天下取人小兒遊行雲中臃腫赤炁令人寒熱吐血心脹闘炁慴恊當爾之時得三洞之師來轉經者病人則瘥官事自了若不瘥者鬼王先坐矣道言自今以去至庚辰之歳有三萬六千惡鬼鬼名天池從者三萬常行世間枉殺良善至壬午年復有三千九百赤頭鬼鬼名大頭來下殺人刀兵交興世間云云不可久處四方災逆六夷死盡道法興盛俗門衰㣲甲申之年人民死盡欲知度災唯有道士奉三洞尊師敬經天神來護故得生天天人迎之耳道言至壬午年天下悠悠百姓苦惱六夷交侵人民不安士女奔波蜀漢浩浩人民頓死道士入山修習三洞得見真君真君不逺壬辰之間也自今以去天殺愚人道士救之其命乃全矣道言壬午年有八萬卑身鬼鬼名大旦身長三尺六寸三萬九億爲侣手提赤棒專行人中殺其惡人復有白鳥鳥如車輪千萬飛來入人家中殺人兒女人或見之或有大魚死於水中人取食之者便至死矣復有鹿死於山野人取食之皆𦤺死矣道士奉此經教化天人勿犯此也道言天下運盡水來不久男女之人無不死矣唯有奉三洞之人乃得全耳自今以去若有道士救之官事疾病之處天人玉女四十萬人來下助之不令有厄道士勤化人焉道言大劫欲至人民多愚不知災來道士先見此文急爲化民令入三洞三洞之人天人迎之聖不虚言也道言大劫將至人民更易天地造立道士化人人不信者亦如六畜何異太上念汝爲其慈憫奈何奈何衆生染着愚迷不自求出守迷至死其奈何乎急召十方大神三洞道士徃化愚人令知經法其福無量道士入山自静其志不得化人此爲無福矣道言道士欲自度世當入名山欲度一切人者當在人中愚人令得度脫道士入山山途玄隔世人不見無處歸依雖有本心無處相度是以智人道士不必山中矣道言自非是三洞法師不得妄讀此經何以故神呪殺鬼治民一切大魔王名字在此經中受此經法自受度之各自一箱盛之及人有官事刑獄重病久困不瘥爲作齋一日一夜者吾當爲汝等召百鬼考問之令其病人瘥乃放之耳汝等道士勤化萬民受經道士治病之處大魔王小鬼王等助此道士治病治病瘥者令汝等上遷終不負口自今以去與汝大魔王等分契誓矣道言自今甲辰之年有三十六萬黒鬼行下痢赤病鬼子夜來殺人六夷之鬼萬萬爲群多有化爲女子老人入人宅中取人小口六畜暴死國不恤人人民流離大臣小吏枉人年命當爾之時鬼兵亂病汝等道士但與行道轉經一日一夜吾當遣三天大兵三十六萬人爲生人召十方鬼等問之爲復何鬼病人各自揀擇令善惡分别大兵斬之誅其黨𩔖悉斷其種終不恕之矣急急如太上口勑律令道言山林之鬼名玄子都領二千九十萬鬼常行卒死病殺人小口老人入人宅中驚人雞犬小兒復有赤幘鬼三萬九千人仍入人宅中取人六畜復有八十萬青蟲鬼鬼長三尺六寸常持天火燒人宅舍令人遭官事口舌復有大運青鬼鬼長三丈四十九萬人手持赤棒棒殺萬民有善人信法者不敢近之惡人無義殺生逆道不存父毋誑說道士罵辱師徒者斬之不恕死付地獄或令身病不瘥萬殃併集苦痛難言道士不救救之無益也道言此惡人不敬師父不遵道法阿枉道士僻處罵師稱其名諱此人罪重牽落赤沙地獄獄中萬劫不出出爲護田鳥常在水中護人萬頃田或未死之時疾病困苦痛不去身田蠶不果所爲不允人所𥬇之此人悉先世之時罵辱師徒罪來對之耳自今以去若有如此之人大魔王亦疾之若有不敬師徒不承三洞者大魔王小鬼王等遶縛斬之不恕矣道言汝等道士奉師當一心矣心常不改自作苦本輕師罵辱五逆不孝阿枉百姓强取人財教人作惡言訟殺人如此輩等三洞經出大魔王小鬼王等悉共收之繫著二天獄中考其三魂七魄女子十四魄今萬苦俱受求死不得汝等道士男女深自慎之道言甲寅旬之年有三萬九千人大驅殺之坐不敬師父枉濫人命談說道士指師名姓如此之人落大驅除刀兵水火之中汝等道士及世間之人當一心供養師徒受經三洞化行一切救療厄人有病之家轉經治之吾當爲汝等召十方大鬼一切諸神問之若不伏故令生人之家病死不瘥官事不了者大魔王及小鬼王斬汝等之身萬段不恕之一一如太上口勑律令道言道士奉師當敬之如天四時八節來徃問訊安否世人受事之時一一如法自爾不復遵師師復不徃神不附人夫爲人師人中最大師之爲上當奉之如父母不可輕慢輕慢者天人誅汝魔王不救汝等罪人一一如太上口勑律令道言道士不遵師父天兵來考考及子孫亦入俗鬼輩中庚申壬午之年有道士輕師者鬼兵三十六萬人一時誅治死矣復有四十九萬赤鼻之鬼乙巳之年殺天下惡人三十九萬人至癸巳之年壬辰之歳世人不信道法不受經者入十八驅除之中枉死者日有三萬九千人太上亦自分别之耳若此年天下有疫病道士救病之者即瘥若不瘥者魔王那律等身作萬段不恕之矣道言男女道士自今以去勤化天下愚人令受三洞大經人人共受符籙身佩名契貫籍玉暦師徒相承不得輕慢若有違盟天兵誅汝㓕門身死謫居疫癘悔亦無及也吾今遣三萬六千赤騎手提鐡杖遊行天下取無義五逆之人若有病人令道士治者悉令鬼王赦之若復不赦此等鬼王悉皆貶責更無容恕矣道言壬戌癸亥之年有八千考鬼殺人坐不供大道至癸未甲辰之年有十二萬赤鬼殺人刀兵亦半坐𥬇人受道壊亂人心打罵道士言道無神口是心非誣𠣖師徒如此之罪人令悉入沸灰地獄刀山劒樹無有出期矣道言巳卯丙寅丁亥之年有八千人横死坐不遵道法天租不輸跪願不還許而不與妄向鬼神取人財物不作功德不經齋戒雖爲道士不行香火不赴人急貪作不往令人怨道與師作食食不精潔或有而不出出而不好如此之人當入大驅除水獄之中萬劫不出縦得還生六情不具人見不喜六畜之例大驅除斬殺之魔王等不救之矣道言大宗法師遊行天下見世人多愚故說三昧大經經凡有二十卷此太上流傳若受之者面見太上不受神呪不可入山不名真道士矣不得治病自今法師先受此經此經乃伏一切大魔王小鬼王及夫人千子萬孫悉助道士化人治病耳何以故一切魔王亦與太上併治化萬姓故善人智士一一思吾言矣道言汝等後世之人不奉大道況世俗俗師打鼔祀神殺猪犬雞豘三牲草水之上召喚百鬼祠祀野神此爲亂邪神不祐人家親被繫謫及三官考掠萬毒死人不逮來取生人大小死亡後𦤺滅門勿復怨道也道言奉道之家一心專謹凡欲所爲當一心歸向行道香火萬品由師齋饈解了不得外引俗師邪祀之家來至交亂家神不安坐考生人其生人轉惡家破滅門此亦道士化之令人悟矣道言世人多愚不見善不識法爲此多死自今以去有人受道世人急病迎此法師一切道士作齋行壇布施救療病人若有刑獄天遣力士三天玉女十方大神仙人來助道士令此病人速得治瘥官事解了令主人萬願從心若爾者上遷汝等萬等千等不負金口若復不瘥徒勞道士主人𦤺災禍殃集者大魔王夫人及子孫主人病不瘥者一切鬼王悉斬不恕矣道言一切魔王及今世人有病之者道士救治之處汝等悉回化其主人家親太祖父母三十六世以來悉爲㧞之令主人病瘥官事釋散萬願從心吾當召百鬼考問病人之鬼何鬼也一一告下三官問之得便和喻令瘥若不瘥者一一收斬之不恕告下急急如大上口勑律令道言自今以去有疾病者遣大㦸將軍領赤騎兵三十九億萬人手持赤棒專行人間伺取行病小鬼自稱三公五帝之神得便斬之若有小鬼不去者三天魔王魔王子孫悉斬之不恕汝等自今以去若不信吾呪者汝頭破作七分矣道言自今以去國中有一人病者悉是小鬼小邪所爲之汝等急攝汝下兵悉令消散使生人無他汝魔王令千等萬等若復不瘥令生人死者一切内外大鬼悉被斬不恕也啄頭大魔王烏延大王長鼻大王中祥大王小眼大王白面大王赤面大王等四十九萬人各各被考考及子孫急勑小鬼令生人病瘥者吾當令汝等上遷若不瘥者斬汝小鬼不恕矣道言自今以去國中有人病者及官事口舌刑徒厄在三官不得自在者悉是汝等大魔王不加用意自今以後告下小鬼勿犯吾民急勑汝下兵速放文牒令病者自瘥官事消散口舌不起急急如太上口勑律令道言世間有六十九種病大鬼萇須少功哀圖慕川慕川有惡鬼國人疾病死亡今來作耗亂世間令人疾病興一切瘟氣黄奴七子合來殺人已識汝等小鬼名字自今以去斤去千里急急如律令道言自今以去三天之上三十六天魔王悉來下叩頭七十下求攝下鬼一切小鬼自從太上勑下以來不敢復來世間取百姓也若復有疾病者魔王等受萬斬矣道言吾良民悠悠處在國中或有不信道法今一人受道佩三洞者有人疾病法師爲其疾病者汝等魔王助道士令瘥矣汝等上遷若不瘥者斬汝等小鬼不恕矣太上說此功之時一切大魔王等各各來下稽首曰自今以去誓死不敢縦小鬼若世間故有一人病困者我等頭破作四十九分矣太上洞淵神呪經卷之八
