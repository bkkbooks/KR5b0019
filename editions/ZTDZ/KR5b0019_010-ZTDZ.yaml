front:
  text: 太上洞淵神呪經卷之十始十
  hash: sha256:1ca8f845138d3b3991346ef247bd44946ba9f7593520ba7e6f6c9214573373cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0019_SJB_010-060035a, image: sjb/06/060035a.png}
body:
  text: 殺鬼品道言吾在玄都山爲一切魔王說大驅除經時有三天王子求說上元中元下元經復有十國真人亦求說三昧無量太素經復有十始十一方仙人亦求說道化黄庭内外二景玉經復有四方運集閻浮有三萬真人俱來聽經說經未竟各各下坐曰世間之人不解道法令疫鬼殺之刀兵暴虐人民苦惱門門有死無有三洞不自㧞度願請此法師流演天下唯願天尊垂心道化太上曰善哉善哉万遣三萬真人持經化行天下復有真人尼和將三萬九千人持經亦布化天下中國之人悉各受之有急疾病官事之家悉爲轉之一日一夜三時行道官事者解疾病者瘥疫鬼盤旋不去者一一斬之不有恕也道言此真人等與國中之人有大因縁故遣之令轉經耳令受三洞經者皆悉先身有福縁應上仙方得值此師也自今以去若有奉佩此經之人我亦天人護之終不有惡也道言壬午年大災起動人民悠悠六夷不安疫鬼殺人可作神符依法施安宅内三家五家十家百家共於水上一日大㑹作一土壇縦廣八尺髙六尺東向三十六拜禮五帝及上章書奏告天人必記子之志心矣道言辛巳年六月壬午年九月癸未年七月必有疫鬼八萬來下殺人鬼名烏塗倫那倫那身長七十丈千萬爲羣復有大赤鳥形如車輪飛來食人人奉有三洞之經經行人間者此疫鳥悉死矣道士爲信之焉道言大劫垂至國主貪殘不恤下民民皆困窮使役無道人民苦厄哭聲盈路死亡蓋野男女失時不好道法出門奔亡六夷紛紜大賊縦横以氣相伐父子相疑天遣疫鬼誅殺此罪人此人罪重值此大水水來不久不自覺知法師道士於今有化人之家三天大王一切仙人十方玉女悉來助之令道士强徤所救之家天人護之令疾病官事速得解了鬼炁消歇病時得瘥若有一鬼不去者請爲斬之不聽恕也道言十方主者曰此來世人多惡信道者稀天下不化今壬午年遣疫鬼八千萬衆行七十種病殺人人知者家家當建是齋於大水上拜謁五帝西北向拜及作大符置大門上懸之疫鬼不敢近人也自非有符籙之家不懸此符者疫鬼害人此符有八千萬大力士守之也懸之大門道言至甲戌壬午之年有八千九百赤面鬼鬼名明真各將三萬九千小鬼鬼悉提赤棒棒殺惡人惡人多故故不信有水災不信有道法當入三塗五厄之中太上玄見心念一切乃爲度之矣道言壬午之年爲一切人作齋轉無量三昧經者有疫鬼來者必不得前也道士有受三洞布化之人天帝來助之終不落惡道之中矣道言癸未年至甲申有三十九萬黒鳥之鬼來翔中川放毒入於人家令人水病病不可治之若有身佩符籙十家五家水上作治舍一間供養三寳晨夕香燈朝謝禮拜并謁五帝一日二日七日作㑹天人必記子之名名入玉曆耳道言大災垂至水來不久愚人不知悠悠過日天帝綵女十二萬人仍來化之人不知之矣若辛巳之年有值此女子化者子等即得仙度若有人疾病官事口舌法師道士但爲化之綵女等亦來助子終不令主人有厄矣道言至癸未之年道炁日盛三洞流布四海九州信樂道士心正國主受持洒掃偏闕闕有經臺旦夕然燈燒香禮拜疫鬼奔走病者自瘥官事自解三天大兵擁護法師法師行處鬼賊斥去千里天人下助道士矣道言甲申之年大龍上天九萬爲群人有見者大水必來近也道士入山可全今身世人多惡淫泆貪財殺生無度兇心不移不信大道不作仙行見人受經反更互𥬇此人入無盡地獄獄中有一日七死七生乃復令活如此四十二劫劫運乃出出得爲人六情不具癡聾瘖瘂加復癭㿗眼瞎唇缺耳聾瘤背折傴老患鹿面麞脚無有手足人不喜見見者吐逆此之罪人本行所來矣道言善人生處聦明過人皆因先身習學中來世有形殘之人先身有大罪故有此身此身復不受化者無有見善也道士但化之天人必記子之志若不度者違前人元元丹誠非大士度人之法矣道言至壬午年已有三萬白頭鬼鬼名千轉身長三丈面黒頭白萬萬爲群下三萬九千種病病殺惡人人有不信道法誹謗道士評論經書言是言非言經無神不知大道淵深廣逺若天叵及如海難量乃以愚人之心道說妙典輕慢道士言世無神心懷兩端壞亂真心此之罪人罪合萬死死入倒立地獄獄中倒立三十劫劫盡乃出爲六畜復出世矣道言世人多愚是以天令萬神惡炁殺之所以殺之者由以誹謗道士殺害良人故也今有不信大道不敬三寳不肯受經者天兵誅之耳今有三千六十種病殺人有肉鬼三萬石鬼十萬木鬼二萬水鬼三千六十萬土鬼六十萬蟲鬼十六萬六千悉能殺人也所以能殺人者鬼悉附此物之上殺人入水水死入山石死斫樹木死食肉炁死起土土死入草蟲傷此悉非法之炁也道士自今以去勤化萬姓愚人男女令悉奉道鬼不近之矣若不信者大驅之日恐鬼兵來誅子耳道言壬午之年有帝主六夷悉奉大道三洞流布入山之人處處有之汝等受法奉經不必大小不必老少無論男女唯有心奉之者天人移壽終不横死也自然得入仙品矣道言自今以去若有道士男女之官勤化萬民遊行國界救療百病者汝等魔王天人子息小鬼王等悉共佐助道士治病不令生人病厄枉其筭壽殺鬼安人耳道言自今以去當令一切鬼王隨遂道士安人療治萬病病無不瘥若有不瘥斬之萬段吾今遣五方神將九天大兵三千九萬人一合來下助道士所治之家令百病官事一時了了若不從者鬼王先坐一一如太上金口所勑不待違科急急如律令道言世人不信道又不受經生於世俗自招罪本見人作善笑人行道不敬三寳天人誅之奄然而去悔亦何及吾今遣十方力士三千萬人一合助此道士所行之處安人斷邪若有欺辱道士罵詈拍打圖謀偷盗者一一收此人等魂魄付所在地獄治之令自知罪負以明天憲矣鬼王者用吾此言語爲此道士殺戮此惡人若不殺者天人不喜大道不神也一切魔王曰唯然一一奉命今爲殺如此之人等道言自今以去道士悉行化他國邊遊之處道士求覔病人一一爲作齋轉經行道吾當遣十方大兵八十萬人助子治之勑一切大魔王令天下無惡風雨不淋浪人鬼和恱百姓歡忻國王信道凡庶受經七日入山進仙若不爾者吾不名大道也不復化人矣道言大法師治病但口章不必紙黙治之又轉經行道無不瘥也若病人大重者亦可併上口章仰謝往愆解釋羅網㧞罪替伐矣道士三洞之師但入静室啓得同志道士行九一之炁亦行三五之炁諸天力士神王金剛無不降也此天真及天人天女之術天人靈妃一切天人來下助子之心官事疾病無不瘥也自今以去道士行道之家大魔王小鬼王等悉遂佐助救之令瘥若不瘥者小王與大魔王慰真等頭破作八十分矣一一如太上口勑斬之不恕矣道言道士悉奉三洞之人不得與黄赤之道士俱遊也奉經道士三洞法師當入山逺避濁世若在人間男女黄赤道士自别立治舍若欲同之取求良日庚申甲子丁卯巳卯八日十二日二十二日九日一日十八日合日也道言一切魔王自今道士往處所行救人之地當令生人所苦自痊官事解了人有惡事一切遏之百福歸身安人殺鬼若疾病得瘥昇入大道若不助道士令生人死者汝等各斬之萬碎終不恕之一一奉行如太上口勑急急如律令道言今有八千黒身鬼鬼長六寸託鳥而飛來在水中或因風雨來着人身人着即死復有三萬九千沙地胡鬼鬼長三寸其色赤白因水泛漲便着於人復有八十萬大濕鬼鬼名天頭其主亦好暴亂各領三萬鬼賊入人宅中令人失火火不可救如此之鬼大水之運國主酷治便可殺人有受經道士心務山林不取生官如此之人及黄赤之男女亦乃不殺矣道言自今方有大鬼鬼名崩周十萬大鬼名李子史兒桃姜壬午年各領十二萬人來殺惡人唯真人道士不敢犯耳自今爲始至甲戌之年以去萬萬鬼兵來殺惡人愚軰若有道士轉經治救者天人助之鬼王哀汝自來護之矣道言自今以去壬午之年至壬辰年子丑之嵗大鬼殺人中有男女活者十中不有三四惡人多矣故天誅之刀兵水死柰何柰何唯道士受經之者天人來迎大劫將盡必來速矣鬼亦競起人當疫死若有人得三洞法師爲之行道者大鬼魔王一切護助令治病即瘥爲攝天下橫鬼内外之𦍙入地千尺主人若復不瘥死亡狼藉官事不了田蠶不收仕宦不遷其不如意者吏兵先坐大魔王及小鬼子等斬之千段不恕之矣一一告下如太上金口所勑之急急如律令道言今有八萬九千黒面大鬼鬼名赤鬚身長七丈四十九萬爲群每詐稱黄帝恐人家親將一切無藉之鬼世間魍魎男女之𦍙領羅丁勒掌南陽葉公石毋太子雲中李子敖三天無着之鬼千萬兆億來入人家取人小口老嫗男女令天下人疾病死亡處處有之門門皆死鬼兵屯集住人隣陌捉人六畜鳥獸作其凶恠令人遭官口舌刑徒囚獄枉濫田蠶不收觸事皆凶自今以去汝等魔王小鬼一切鬼王急爲道士佐治生人令官事解了疾病者瘥若不從命汝等魔王各斬之萬㱼矣一一如太上口勑律令太上洞淵神呪經卷之十
